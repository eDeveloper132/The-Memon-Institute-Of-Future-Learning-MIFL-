<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Email Request - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.3" type="module" defer></script>
    <script src="/components/auth-components.js?v=1.1" type="module" defer></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <auth-card>
        <auth-header title="Change Email" subtitle="Enter your current verified email to receive a secure link."></auth-header>
        
        <form id="requestForm" class="space-y-6">
            <auth-input type="email" label="Current Email Address" name="email" icon="envelope" placeholder="current@example.com" required></auth-input>
            <auth-button type="submit">Send Verification Link</auth-button>
        </form>

        <div class="text-center">
            <a href="/api/auth/login" class="text-sm font-medium text-blue-600 hover:text-blue-500 transition">
                <i class="fa-solid fa-arrow-left mr-2"></i>Back to Login
            </a>
        </div>
    </auth-card>

    <script type="module">
        const form = document.getElementById('requestForm');
        const submitBtn = form.querySelector('auth-button');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.loading = true;
            const email = form.querySelector('auth-input[name="email"]').value;
            
            try {
                const response = await fetch('/api/auth/request-email-change', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const result = await response.json();
                showToast(result.message, response.ok ? 'success' : 'error');
                if (response.ok) {
                    setTimeout(() => window.location.href = '/api/auth/login', 3000);
                } else {
                    submitBtn.loading = false;
                }
            } catch (err) {
                showToast('A connection error occurred', 'error');
                submitBtn.loading = false;
            }
        });
    </script>
</body>
</html>
