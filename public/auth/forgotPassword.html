<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.3" type="module" defer></script>
    <script src="/components/auth-components.js?v=1.1" type="module" defer></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <auth-card>
        <div class="text-center">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-blue-100 text-blue-600 mb-4">
                <i class="fa-solid fa-key text-xl"></i>
            </div>
            <auth-header title="Forgot Password?" subtitle="Enter your email and we'll send you a link to reset your password."></auth-header>
        </div>
        
        <form id="forgotForm" class="space-y-6">
            <auth-input type="email" label="Email Address" name="email" icon="envelope" placeholder="you@example.com" required></auth-input>
            <auth-button type="submit">Send Reset Link</auth-button>
        </form>

        <div class="text-center">
            <a href="/api/auth/login" class="text-sm font-medium text-blue-600 hover:text-blue-500 transition">
                <i class="fa-solid fa-arrow-left mr-2"></i>Back to Login
            </a>
        </div>
    </auth-card>

    <script type="module">
        const form = document.getElementById('forgotForm');
        const submitBtn = form.querySelector('auth-button');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.loading = true;
            
            const email = form.querySelector('[name="email"]').value;
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const result = await response.json();
                showToast(result.message, response.ok ? 'success' : 'error');
                
                if (response.ok) {
                    form.reset();
                }
            } catch (err) {
                console.error('Forgot password error:', err);
                showToast('Failed to connect to server', 'error');
            } finally {
                submitBtn.loading = false;
            }
        });
    </script>
</body>
</html>
