<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.3" type="module" defer></script>
    <script src="/components/auth-components.js?v=1.1" type="module" defer></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <auth-card>
        <auth-header title="New Password" subtitle="Please enter your new password below."></auth-header>
        
        <form id="resetForm" class="space-y-6">
            <auth-input type="password" label="New Password" name="password" icon="lock" placeholder="••••••••" required></auth-input>
            <auth-input type="password" label="Confirm Password" name="confirmPassword" icon="lock" placeholder="••••••••" required></auth-input>

            <div id="errorMessage" class="hidden text-red-500 text-sm text-center">Passwords do not match</div>

            <auth-button type="submit">Update Password</auth-button>
        </form>
    </auth-card>

    <script type="module">
        const form = document.getElementById('resetForm');
        const submitBtn = form.querySelector('auth-button');
        const token = window.location.pathname.split('/').pop();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = form.querySelector('[name="password"]').value;
            const confirmPassword = form.querySelector('[name="confirmPassword"]').value;

            if (password !== confirmPassword) {
                document.getElementById('errorMessage').classList.remove('hidden');
                return;
            }

            submitBtn.loading = true;

            try {
                const response = await fetch(`/api/auth/reset-password/${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const result = await response.json();
                showToast(result.message || (response.ok ? 'Password updated' : 'Failed to update'), response.ok ? 'success' : 'error');

                if (response.ok) {
                    setTimeout(() => window.location.href = '/api/auth/success', 2000);
                }
            } catch (err) {
                console.error('Reset password error:', err);
                showToast('Failed to connect to server', 'error');
            } finally {
                submitBtn.loading = false;
            }
        });
    </script>
</body>
</html>
