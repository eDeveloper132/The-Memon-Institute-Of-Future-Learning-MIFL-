<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
    <script src="/components/auth-components.js?v=1.1" type="module" defer></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <auth-card>
        <auth-header title="New Password" subtitle="Please enter your new password below."></auth-header>
        
        <form id="resetForm" class="space-y-4">
            <auth-input type="password" label="New Password" name="password" icon="lock" placeholder="••••••••" required toggle-password></auth-input>
            
            <div id="passwordRequirements" class="bg-gray-100 p-4 rounded-xl space-y-2 text-[11px] font-medium transition-all duration-300">
                <p class="text-gray-500 font-bold uppercase tracking-widest text-[9px] mb-2">Password Requirements</p>
                <div class="flex items-center gap-2" id="req-length">
                    <i class="fa-solid fa-circle-dot text-[8px]"></i> At least 8 characters
                </div>
                <div class="flex items-center gap-2" id="req-upper">
                    <i class="fa-solid fa-circle-dot text-[8px]"></i> One uppercase letter
                </div>
                <div class="flex items-center gap-2" id="req-number">
                    <i class="fa-solid fa-circle-dot text-[8px]"></i> One number
                </div>
                <div class="flex items-center gap-2" id="req-special">
                    <i class="fa-solid fa-circle-dot text-[8px]"></i> One special character (@$!%*?&)
                </div>
            </div>

            <auth-input type="password" label="Confirm Password" name="confirmPassword" icon="lock" placeholder="••••••••" required toggle-password></auth-input>

            <div id="matchMessage" class="hidden text-[11px] font-bold">
                <i class="fa-solid fa-circle-info mr-1"></i> Passwords do not match
            </div>

            <auth-button type="submit">Update Password</auth-button>
        </form>
    </auth-card>

    <script type="module">
        const form = document.getElementById('resetForm');
        const submitBtn = form.querySelector('auth-button');
        const passwordInput = form.querySelector('auth-input[name="password"]');
        const confirmInput = form.querySelector('auth-input[name="confirmPassword"]');
        const token = window.location.pathname.split('/').pop();

        const requirements = {
            length: { re: /.{8,}/, el: document.getElementById('req-length') },
            upper: { re: /[A-Z]/, el: document.getElementById('req-upper') },
            number: { re: /[0-9]/, el: document.getElementById('req-number') },
            special: { re: /[@$!%*?&]/, el: document.getElementById('req-special') }
        };

        const validatePassword = (val) => {
            let allValid = true;
            for (const key in requirements) {
                const isValid = requirements[key].re.test(val);
                const el = requirements[key].el;
                const icon = el.querySelector('i');
                
                if (isValid) {
                    el.classList.add('text-green-600');
                    el.classList.remove('text-gray-500');
                    icon.classList.replace('fa-circle-dot', 'fa-circle-check');
                } else {
                    el.classList.remove('text-green-600');
                    el.classList.add('text-gray-500');
                    icon.classList.replace('fa-circle-check', 'fa-circle-dot');
                    allValid = false;
                }
            }
            return allValid;
        };

        const checkMatch = () => {
            const matchMsg = document.getElementById('matchMessage');
            if (confirmInput.value && passwordInput.value !== confirmInput.value) {
                matchMsg.classList.remove('hidden');
                matchMsg.classList.add('text-red-500');
                return false;
            } else {
                matchMsg.classList.add('hidden');
                return true;
            }
        };

        passwordInput.addEventListener('input', (e) => {
            validatePassword(e.target.value);
            checkMatch();
        });

        confirmInput.addEventListener('input', checkMatch);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = passwordInput.value;

            if (!validatePassword(password)) {
                showToast('Please fulfill all password requirements', 'error');
                return;
            }

            if (!checkMatch()) {
                showToast('Passwords do not match', 'error');
                return;
            }

            submitBtn.loading = true;

            try {
                const response = await fetch(`/api/auth/reset-password/${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const result = await response.json();
                showToast(result.message || (response.ok ? 'Password updated' : 'Failed to update'), response.ok ? 'success' : 'error');

                if (response.ok) {
                    setTimeout(() => window.location.href = '/api/auth/success', 2000);
                }
            } catch (err) {
                console.error('Reset password error:', err);
                showToast('Failed to connect to server', 'error');
            } finally {
                submitBtn.loading = false;
            }
        });
    </script>
</body>
</html>
