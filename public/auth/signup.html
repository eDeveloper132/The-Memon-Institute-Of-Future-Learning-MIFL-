<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
    <script src="/components/auth-components.js?v=1.1" type="module" defer></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <ui-public-navbar title="MIFL"></ui-public-navbar>

    <div class="flex-1 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <auth-card>
        <auth-header title="Create Account" subtitle="Join our school management system"></auth-header>
        
        <form id="signupForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <auth-input label="Full Name" name="name" required></auth-input>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Role</label>
                    <select name="role" title="Select your role" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="student" selected>Student</option>
                        <!-- <option value="teacher">Teacher</option> -->
                    </select>
                </div>
            </div>

            <auth-input type="email" label="Email Address" name="email" placeholder="you@example.com" required></auth-input>
            <auth-input type="tel" label="Phone Number" name="phoneNumber" required></auth-input>

            <div>
                <label class="block text-sm font-medium text-gray-700">Address</label>
                <textarea required name="address" rows="2"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" title="Enter your address here" placeholder="Enter your address"></textarea>
            </div>

            <auth-input type="password" label="Password" name="password" placeholder="••••••••" required toggle-password></auth-input>

            <div id="passwordRequirements" class="bg-gray-100 p-4 rounded-xl space-y-2 text-[11px] font-medium transition-all duration-300">
                <p class="text-gray-500 font-bold uppercase tracking-widest text-[9px] mb-2">Password Requirements</p>
                <div class="flex items-center gap-2" id="req-length">
                    <i class="fa-solid fa-circle-dot text-[8px]"></i> At least 8 characters
                </div>
                <div class="flex items-center gap-2" id="req-upper">
                    <i class="fa-solid fa-circle-dot text-[8px]"></i> One uppercase letter
                </div>
                <div class="flex items-center gap-2" id="req-number">
                    <i class="fa-solid fa-circle-dot text-[8px]"></i> One number
                </div>
                <div class="flex items-center gap-2" id="req-special">
                    <i class="fa-solid fa-circle-dot text-[8px]"></i> One special character (@$!%*?&)
                </div>
            </div>

            <auth-button type="submit">Register</auth-button>
        </form>

        <p class="text-center text-sm text-gray-600">
            Already have an account? 
            <a href="/api/auth/login" class="font-medium text-blue-600 hover:text-blue-500">Sign in here</a>
        </p>
    </auth-card>

    <script type="module">
        const form = document.getElementById('signupForm');
        const submitBtn = form.querySelector('auth-button');
        const passwordInput = form.querySelector('auth-input[name="password"]');
        
        const requirements = {
            length: { re: /.{8,}/, el: document.getElementById('req-length') },
            upper: { re: /[A-Z]/, el: document.getElementById('req-upper') },
            number: { re: /[0-9]/, el: document.getElementById('req-number') },
            special: { re: /[@$!%*?&]/, el: document.getElementById('req-special') }
        };

        const validatePassword = (val) => {
            let allValid = true;
            for (const key in requirements) {
                const isValid = requirements[key].re.test(val);
                const el = requirements[key].el;
                const icon = el.querySelector('i');
                
                if (isValid) {
                    el.classList.add('text-green-600');
                    el.classList.remove('text-gray-500');
                    icon.classList.replace('fa-circle-dot', 'fa-circle-check');
                } else {
                    el.classList.remove('text-green-600');
                    el.classList.add('text-gray-500');
                    icon.classList.replace('fa-circle-check', 'fa-circle-dot');
                    allValid = false;
                }
            }
            return allValid;
        };

        // Listen for input on the underlying input element
        passwordInput.addEventListener('input', (e) => {
            const val = e.target.value;
            validatePassword(val);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            if (!validatePassword(data.password)) {
                showToast('Please fulfill all password requirements', 'error');
                return;
            }

            submitBtn.loading = true;
            
            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    window.location.href = '/api/auth/success';
                } else {
                    const error = await response.json();
                    showToast(error.message || 'Signup failed', 'error');
                    submitBtn.loading = false;
                }
            } catch (err) {
                console.error('Signup error:', err);
                showToast('A connection error occurred', 'error');
                submitBtn.loading = false;
            }
        });
    </script>
</body>
</html>
