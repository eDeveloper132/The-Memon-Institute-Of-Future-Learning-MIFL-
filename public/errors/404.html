<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .bouncing {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6 text-gray-900 font-sans">
    <div class="max-w-md w-full text-center">
        <!-- Icon -->
        <div class="mb-10 relative">
            <div class="text-9xl font-black text-blue-100 absolute inset-0 flex items-center justify-center -z-10">404</div>
            <div class="w-32 h-32 bg-white rounded-3xl shadow-xl flex items-center justify-center mx-auto border border-gray-100 bouncing">
                <i class="fa-solid fa-map-location-dot text-blue-600 text-5xl"></i>
            </div>
        </div>

        <!-- Text -->
        <h1 class="text-3xl font-black mb-3">Lost in the System?</h1>
        <p class="text-gray-500 mb-10 leading-relaxed">
            We couldn't find the page you're looking for. It might have been moved, deleted, or you might have mistyped the address.
        </p>

        <!-- Action -->
        <div class="space-y-4">
            <a href="/" class="block w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200 active:scale-95">
                Go back to Dashboard
            </a>
            <button id="backBtn" class="w-full bg-gray-200 text-gray-700 py-4 rounded-xl font-bold hover:bg-gray-300 transition active:scale-95">
                Previous Page
            </button>
        </div>

        <div class="mt-16 pt-8 border-t border-gray-100">
            <p class="text-xs text-gray-400 font-medium tracking-widest uppercase">MIFL School Management</p>
        </div>
    </div>
    <script>
        document.getElementById('backBtn').addEventListener('click', () => history.back());
    </script>
</body>
</html>
