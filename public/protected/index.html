<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="MIFL Dashboard"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <!-- Dashboard Content -->
        <div id="dashboardContent" class="hidden">
            <div id="roleBadge" class="inline-block px-3 py-1 rounded-full text-xs font-bold uppercase mb-6"></div>
            
            <div id="welcomeMessage" class="mb-8">
                <h2 class="text-4xl font-bold text-gray-900">Welcome, <span id="displayFirstName">User</span>!</h2>
                <p class="text-gray-500 mt-2">Here is what's happening today in your school management system.</p>
            </div>

            <!-- Role-Specific Sections -->
            <div id="adminSection" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
                <ui-card id="adminTotalStudents" title="Total Students" value="..." color="blue"></ui-card>
                <ui-card id="adminTotalTeachers" title="Total Teachers" value="..." color="green"></ui-card>
                <ui-card id="adminPendingFees" title="Pending Fees" value="..." color="red"></ui-card>
            </div>

            <div id="teacherSection" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
                <ui-card id="teacherClasses" title="My Classes" value="..." color="orange"></ui-card>
                <ui-card id="teacherStudents" title="Total Students" value="..." color="green"></ui-card>
                <ui-card id="teacherGrading" title="Pending Grading" value="..." color="red"></ui-card>
            </div>

            <div id="studentSection" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
                <ui-card id="studentAttendance" title="Overall Attendance" value="..." color="indigo"></ui-card>
                <ui-card id="studentFees" title="Pending Fees" value="..." color="red"></ui-card>
            </div>
        </div>

        <ui-spinner id="loading" text="Fetching your profile..."></ui-spinner>
    </main>

    <script type="module">
        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) {
                    window.location.href = '/api/auth/login';
                    return;
                }
                const { user } = await response.json();
                
                // Initialize Socket.IO
                if (window.initSocket) {
                    window.initSocket(user);
                }
                
                renderDashboard(user);
            } catch (err) {
                console.error('Failed to fetch profile:', err);
                window.location.href = '/api/auth/login';
            }
        }

        function renderDashboard(user) {
            if (user.role === 'admin') {
                window.location.href = '/protected/admin/index.html';
                return;
            }
            if (user.role === 'teacher') {
                window.location.href = '/protected/teacher/index.html';
                return;
            }
            if (user.role === 'student') {
                window.location.href = '/protected/student/index.html';
                return;
            }
            if (user.role === 'parent') {
                window.location.href = '/protected/parent/index.html';
                return;
            }
            
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('dashboardContent').classList.remove('hidden');
            
            document.getElementById('displayFirstName').textContent = user.name.split(' ')[0];
            
            customElements.whenDefined('ui-navbar').then(() => {
                const navbar = document.querySelector('ui-navbar');
                if (navbar && navbar.renderLinks) {
                    navbar.renderLinks(user);
                }
            });

            const badge = document.getElementById('roleBadge');
            badge.textContent = user.role;
            
            const sections = ['admin', 'teacher', 'student'];
            sections.forEach(role => {
                const element = document.getElementById(role + 'Section');
                if (role === user.role) {
                    element.classList.remove('hidden');
                    const colors = {
                        admin: 'bg-blue-100 text-blue-600',
                        teacher: 'bg-orange-100 text-orange-600',
                        student: 'bg-indigo-100 text-indigo-600',
                        parent: 'bg-purple-100 text-purple-600'
                    };
                    badge.className = `inline-block px-3 py-1 rounded-full text-xs font-bold uppercase mb-6 ${colors[role] || 'bg-gray-100 text-gray-600'}`;
                } else {
                    if (element) element.classList.add('hidden');
                }
            });

            fetchStats(user.role);
        }

        async function fetchStats(role) {
            try {
                if (role === 'admin') {
                    const res = await fetch('/api/admin/stats');
                    if (res.ok) {
                        const stats = await res.json();
                        document.getElementById('adminTotalStudents').setAttribute('value', stats.totalStudents);
                        document.getElementById('adminTotalTeachers').setAttribute('value', stats.totalTeachers);
                        document.getElementById('adminPendingFees').setAttribute('value', `PKR ${stats.pendingFeesAmount.toLocaleString()}`);
                    }
                } else if (role === 'teacher') {
                    const res = await fetch('/api/teacher/stats');
                    if (res.ok) {
                        const stats = await res.json();
                        document.getElementById('teacherClasses').setAttribute('value', stats.classesCount);
                        document.getElementById('teacherStudents').setAttribute('value', stats.totalStudents);
                        document.getElementById('teacherGrading').setAttribute('value', stats.pendingGrading);
                    }
                } else if (role === 'student') {
                    const [attRes, feeRes] = await Promise.all([
                        fetch('/api/student/attendance'),
                        fetch('/api/student/fees')
                    ]);
                    if (attRes.ok && feeRes.ok) {
                        const { records } = await attRes.json();
                        const { vouchers } = await feeRes.json();
                        const present = records.filter(r => r.status === 'present').length;
                        const percent = records.length ? ((present / records.length) * 100).toFixed(0) + '%' : '0%';
                        const pendingFees = vouchers.filter(v => v.status !== 'paid').length;
                        document.getElementById('studentAttendance').setAttribute('value', percent);
                        document.getElementById('studentFees').setAttribute('value', pendingFees);
                    }
                }
            } catch (err) {
                console.error('Error fetching dashboard stats');
            }
        }

        // Attach listener for logout (navbar component uses this ID)
        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });

        fetchProfile();
    </script>
</body>
</html>
