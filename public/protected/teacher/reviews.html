<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Reviews - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Student Reviews"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Performance Feedback</h2>
            <p class="text-gray-500 mt-2">View anonymous reviews and feedback from your students.</p>
        </div>

        <div id="reviewsList" class="space-y-6">
            <div class="col-span-full text-center py-20 text-gray-500 font-bold italic">
                <ui-spinner text="Loading performance feedback..."></ui-spinner>
            </div>
        </div>
    </main>

    <script type="module">
        const list = document.getElementById('reviewsList');

        async function fetchReviews() {
            try {
                // Proposed endpoint, might need implementation in TeacherController
                const res = await fetch('/api/teacher/results'); // Using results as a fallback or proxy
                if (res.ok) {
                    const { reviews } = await res.json();
                    renderReviews(reviews || []);
                }
            } catch (err) {
                list.innerHTML = '<p class="text-center text-red-500 py-10">Feedback module is currently being finalized.</p>';
            }
        }

        function renderReviews(reviews) {
            if (!reviews.length) {
                list.innerHTML = `
                    <div class="bg-blue-50 border-l-4 border-blue-500 p-8 rounded-r-2xl text-center">
                        <i class="fa-solid fa-face-smile text-blue-600 text-4xl mb-4"></i>
                        <h3 class="text-xl font-bold text-blue-900">No student reviews yet.</h3>
                        <p class="text-blue-700">Student feedback will appear here once an administrator initiates a review session.</p>
                    </div>`;
                return;
            }

            list.innerHTML = reviews.map(r => `
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                    <div class="flex items-center mb-4">
                        <div class="flex text-yellow-400">
                            ${Array(5).fill(0).map((_, i) => `<i class="fa-${i < r.rating ? 'solid' : 'regular'} fa-star"></i>`).join('')}
                        </div>
                        <span class="ml-3 text-xs font-bold text-gray-400 uppercase tracking-widest">${new Date(r.createdAt).toLocaleDateString()}</span>
                    </div>
                    <p class="text-gray-700 italic font-medium">"${r.comment}"</p>
                </div>
            `).join('');
        }

        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (user.role !== 'teacher' && user.role !== 'admin') { window.location.href = '/'; return; }
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) { navbar.renderLinks(user.role); }
                fetchReviews();
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });
        fetchProfile();
    </script>
</body>
</html>
