<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Reviews - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Student Reviews"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Performance Feedback</h2>
            <p class="text-gray-500 mt-2">View anonymous reviews and feedback from your students.</p>
        </div>

        <div id="reviewsList" class="space-y-6">
            <!-- Review Session Info -->
            <div class="bg-blue-50 border-l-4 border-blue-500 p-6 rounded-r-xl shadow-sm mb-10">
                <div class="flex items-center">
                    <i class="fa-solid fa-calendar-check text-blue-600 text-2xl mr-4"></i>
                    <div>
                        <h3 class="text-lg font-bold text-blue-900">Active Review Session: Q2 Feedback</h3>
                        <p class="text-blue-700">Started: May 15 | Ends: May 30</p>
                    </div>
                </div>
            </div>

            <!-- Placeholder Review -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex items-center mb-4">
                    <div class="flex text-yellow-400">
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-solid fa-star"></i>
                        <i class="fa-regular fa-star"></i>
                    </div>
                    <span class="ml-3 text-sm text-gray-500">2 days ago</span>
                </div>
                <p class="text-gray-800 italic">"The lessons are very clear, but I would appreciate more practical examples during the algebra session."</p>
            </div>
        </div>
    </main>

    <script type="module">
        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (user.role !== 'teacher' && user.role !== 'admin') { window.location.href = '/'; return; }
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) { navbar.renderLinks(user.role); }
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });
        fetchProfile();
    </script>
</body>
</html>
