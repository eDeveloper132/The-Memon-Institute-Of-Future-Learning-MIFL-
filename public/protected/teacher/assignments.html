<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Management - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Assignment Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Assignments</h2>
                <p class="text-gray-500 mt-2">Create and track student assignments and submissions.</p>
            </div>
            <button id="openAssignmentModal" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition flex items-center">
                <i class="fa-solid fa-plus mr-2"></i> New Assignment
            </button>
        </div>

        <div id="assignmentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-gray-500 font-bold italic">
                <ui-spinner text="Loading assignments..."></ui-spinner>
            </div>
        </div>
    </main>

    <!-- Add Assignment Modal -->
    <div id="addAssignmentModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
            <div class="p-6 bg-blue-600 text-white flex justify-between items-center">
                <h3 class="text-xl font-bold">Post New Assignment</h3>
                <button id="closeAssignmentModal" class="text-2xl">&times;</button>
            </div>
            <form id="addAssignmentForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Title</label>
<input type="text" name="title" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter the title of the assignment" title="Enter the title of the assignment">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Description</label>
<textarea name="description" title="Enter the description of the assignment" required class="w-full px-4 py-2 border rounded-lg outline-none h-24"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
<div>
    <label class="block text-sm font-bold text-gray-700 mb-1" for="title">Title</label>
    <input type="text" id="title" name="title" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter the title of the assignment">
</div>
<div>
    <label class="block text-sm font-bold text-gray-700 mb-1" for="class">Class ID</label>
    <input type="text" id="class" name="class" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter the class ID">
</div>
<div>
    <label class="block text-sm font-bold text-gray-700 mb-1">Due Date</label>
    <input type="date" name="dueDate" required class="w-full px-4 py-2 border rounded-lg outline-none" placeholder="Enter the due date">
</div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition mt-4">Post Assignment</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { showToast } from '/components/ui-components.js?v=1.6';

        const addForm = document.getElementById('addAssignmentForm');
        const modal = document.getElementById('addAssignmentModal');
        const openBtn = document.getElementById('openAssignmentModal');
        const closeBtn = document.getElementById('closeAssignmentModal');
        const assignmentGrid = document.getElementById('assignmentGrid');

        if (openBtn) openBtn.onclick = () => modal.classList.remove('hidden');
        if (closeBtn) closeBtn.onclick = () => modal.classList.add('hidden');
        window.onclick = (e) => { if (e.target === modal) modal.classList.add('hidden'); };

        async function fetchAssignments() {
            try {
                const res = await fetch('/api/teacher/assignments');
                if (res.ok) {
                    const { assignments } = await res.json();
                    renderAssignments(assignments);
                }
            } catch (err) {
                assignmentGrid.innerHTML = '<p class="text-center text-red-500 py-10 font-bold">Failed to load assignments.</p>';
            }
        }

        function renderAssignments(assignments) {
            if (!assignments.length) {
                assignmentGrid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500 font-bold italic">No assignments posted yet. Click "New Assignment" to start.</div>';
                return;
            }

            assignmentGrid.innerHTML = assignments.map(a => `
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col h-full hover:shadow-md transition">
                    <div class="flex justify-between items-start mb-4">
                        <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-[10px] font-bold uppercase truncate max-w-[120px]">${a.course?.title || 'General'}</span>
                        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Due: ${new Date(a.dueDate).toLocaleDateString()}</span>
                    </div>
                    <h3 class="text-lg font-bold text-gray-900 mb-2 truncate">${a.title}</h3>
                    <p class="text-gray-600 text-sm mb-6 flex-1 line-clamp-3">${a.description}</p>
                    <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                        <span class="text-xs font-bold text-gray-400">${a.class?.name || 'Class'}</span>
                        <button class="text-blue-600 hover:text-blue-800 font-bold text-xs uppercase tracking-wider">Submissions</button>
                    </div>
                </div>
            `).join('');
        }

        if (addForm) {
            addForm.onsubmit = async (e) => {
                e.preventDefault();
                const data = Object.fromEntries(new FormData(addForm));
                try {
                    const res = await fetch('/api/teacher/assignments', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    if (res.ok) {
                        showToast('Assignment posted successfully');
                        modal.classList.add('hidden');
                        addForm.reset();
                        fetchAssignments();
                    } else {
                        showToast('Error posting assignment', 'error');
                    }
                } catch (err) { showToast('Connection error', 'error'); }
            };
        }

        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (window.initSocket) window.initSocket(user);
                if (user.role !== 'teacher' && user.role !== 'admin') { window.location.href = '/'; return; }
                
                customElements.whenDefined('ui-navbar').then(() => {
                    const navbar = document.querySelector('ui-navbar');
                    if (navbar && navbar.renderLinks) {
                        navbar.renderLinks(user);
                    }
                });
                
                fetchAssignments();
            } catch (err) {
                console.error('Failed to fetch profile:', err);
                window.location.href = '/api/auth/login';
            }
        }
        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });
        fetchProfile();
    </script>
</body>
</html>
