<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Management - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Assignment Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Assignments</h2>
                <p class="text-gray-500 mt-2">Create and track student assignments and submissions.</p>
            </div>
            <button class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition flex items-center">
                <i class="fa-solid fa-plus mr-2"></i> New Assignment
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Placeholder Assignment Card -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-start mb-4">
                    <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs font-bold uppercase">Mathematics</span>
                    <span class="text-xs text-gray-500">Due: May 25</span>
                </div>
                <h3 class="text-xl font-bold text-gray-900 mb-2">Algebraic Equations P2</h3>
                <p class="text-gray-600 text-sm mb-4">Complete the exercises on page 45-50 of the textbook.</p>
                <div class="flex justify-between items-center mt-6 pt-4 border-t border-gray-50">
                    <span class="text-sm font-medium text-gray-700">12/30 Submitted</span>
                    <button class="text-blue-600 hover:text-blue-800 font-bold text-sm">View Details</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (user.role !== 'teacher' && user.role !== 'admin') { window.location.href = '/'; return; }
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) { navbar.renderLinks(user.role); }
            } catch (err) {
                console.error('Failed to fetch profile:', err);
                window.location.href = '/api/auth/login';
            }
        }
        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });
        fetchProfile();
    </script>
</body>
</html>
