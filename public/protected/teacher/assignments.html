<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Management - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Assignment Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Assignments</h2>
                <p class="text-gray-500 mt-2">Create and track student assignments and submissions.</p>
            </div>
            <button id="openAssignmentModal" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition flex items-center shadow-lg active:scale-95">
                <i class="fa-solid fa-plus mr-2"></i> New Assignment
            </button>
        </div>

        <div id="assignmentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-gray-500 font-bold italic">
                <ui-spinner text="Loading assignments..."></ui-spinner>
            </div>
        </div>
    </main>

    <!-- Add Assignment Modal -->
    <div id="addAssignmentModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden my-auto">
            <div class="p-6 bg-blue-600 text-white flex justify-between items-center">
                <h3 class="text-xl font-bold">Post New Assignment</h3>
                <button id="closeAssignmentModal" class="text-2xl hover:opacity-70 transition">&times;</button>
            </div>
            <form id="addAssignmentForm" class="p-6 space-y-4 max-h-[80vh] overflow-y-auto">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Assignment Title</label>
                    <input type="text" name="title" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="e.g., Midterm Project">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Description</label>
                    <textarea name="description" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl outline-none h-24 focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Enter instructions..."></textarea>
                </div>

                <div class="space-y-4 pt-4 border-t border-gray-100">
                    <!-- STEP 1: Global Course Selection -->
                    <div>
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-1">1. Select Subject / Course</label>
                        <select id="globalCourseSelect" name="course" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-white cursor-pointer text-sm font-bold text-blue-600">
                            <option value="">Choose a subject...</option>
                        </select>
                    </div>

                    <!-- STEP 2: Target Selection (Hidden until course is chosen) -->
                    <div id="audienceSection" class="hidden animate-in fade-in slide-in-from-top-2 duration-300">
                        <label class="block text-xs font-bold text-gray-700 uppercase mb-2">2. Target Audience</label>
                        <div class="flex bg-gray-100 p-1 rounded-xl mb-4">
                            <button type="button" id="targetClassBtn" class="flex-1 py-2 rounded-lg text-xs font-bold transition-all bg-white text-blue-600 shadow-sm">
                                Standard Class
                            </button>
                            <button type="button" id="targetBatchBtn" class="flex-1 py-2 rounded-lg text-xs font-bold transition-all text-gray-500 hover:text-gray-700">
                                Course Batch
                            </button>
                        </div>

                        <!-- Target Options -->
                        <div id="targetClassGroup" class="space-y-3">
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Select Targeted Class</label>
                            <select id="targetClassSelect" name="class" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-white cursor-pointer text-sm">
                                <option value="">Choose a class...</option>
                            </select>
                        </div>

                        <div id="targetBatchGroup" class="hidden space-y-3">
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Select Specific Batch</label>
                            <select id="targetBatchSelect" name="batch" class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-white cursor-pointer text-sm">
                                <option value="">Choose a batch...</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-2">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Due Date</label>
                        <input type="date" name="dueDate" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Max Points</label>
                        <input type="number" name="maxPoints" value="100" min="1" required class="w-full px-4 py-2.5 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 transition shadow-md active:scale-[0.98] tracking-wide mt-2">
                    Post Assignment
                </button>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
            <div class="p-6 bg-red-600 text-white flex justify-between items-center">
                <h3 class="text-xl font-bold">Delete Assignment</h3>
                <button id="closeDeleteModal" class="text-2xl hover:opacity-70 transition">&times;</button>
            </div>
            <div class="p-8 text-center">
                <div class="w-16 h-16 bg-red-50 text-red-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <p class="text-gray-600 font-medium">Are you sure you want to delete this assignment? All student submissions will also be removed.</p>
                <div class="flex gap-4 mt-8">
                    <button type="button" id="cancelDeleteBtn" class="flex-1 py-3 rounded-xl border border-gray-200 font-bold text-gray-500 hover:bg-gray-50 transition">Cancel</button>
                    <button id="confirmDeleteBtn" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-700 transition shadow-md">Yes, Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Submissions Modal -->
    <div id="submissionsModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col">
            <div class="p-6 bg-gray-900 text-white flex justify-between items-center shrink-0">
                <div>
                    <h3 class="text-xl font-bold" id="submissionsModalTitle">Assignment Submissions</h3>
                    <p class="text-xs text-gray-400 mt-1" id="submissionsModalSubtitle">Review and grade student work</p>
                </div>
                <button id="closeSubmissionsModal" class="text-2xl hover:opacity-70 transition">&times;</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-6 bg-gray-50">
                <div id="submissionsList" class="space-y-4">
                    <ui-spinner text="Fetching submissions..."></ui-spinner>
                </div>
            </div>
        </div>
    </div>

    <!-- Grading Modal (Nested) -->
    <div id="gradingModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-[70] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden my-auto">
            <div class="p-6 bg-blue-600 text-white flex justify-between items-center">
                <h3 class="text-xl font-bold">Grade Submission</h3>
                <button id="closeGradingModal" class="text-2xl hover:opacity-70 transition">&times;</button>
            </div>
            <form id="gradingForm" class="p-8 space-y-6">
                <input type="hidden" id="gradingSubmissionId">
                <div>
                    <label class="block text-sm font-black text-gray-700 uppercase tracking-widest mb-2">Student Score</label>
                    <div class="flex items-center gap-4">
                        <input type="number" id="gradingScore" required class="flex-1 px-4 py-3 rounded-2xl border border-gray-200 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition text-2xl font-black" placeholder="0">
                        <span class="text-2xl font-black text-gray-400">/ <span id="gradingMaxPoints">100</span></span>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-black text-gray-700 uppercase tracking-widest mb-2">Feedback / Comments</label>
                    <textarea id="gradingFeedback" rows="4" class="w-full px-4 py-3 rounded-2xl border border-gray-200 outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition resize-none" placeholder="Provide constructive feedback..."></textarea>
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-700 transition shadow-lg shadow-blue-100 active:scale-95">
                        Submit Grade
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { showToast } from '/components/ui-components.js?v=1.6';

        // DOM Elements
        const addForm = document.getElementById('addAssignmentForm');
        const modal = document.getElementById('addAssignmentModal');
        const openBtn = document.getElementById('openAssignmentModal');
        const closeBtn = document.getElementById('closeAssignmentModal');
        const assignmentGrid = document.getElementById('assignmentGrid');

        // Targeting UI Elements
        const audienceSection = document.getElementById('audienceSection');
        const targetClassBtn = document.getElementById('targetClassBtn');
        const targetBatchBtn = document.getElementById('targetBatchBtn');
        const targetClassGroup = document.getElementById('targetClassGroup');
        const targetBatchGroup = document.getElementById('targetBatchGroup');
        const globalCourseSelect = document.getElementById('globalCourseSelect');
        const targetClassSelect = document.getElementById('targetClassSelect');
        const targetBatchSelect = document.getElementById('targetBatchSelect');

        // State
        let activeTargetMode = 'class'; // 'class' or 'batch'
        let allCourses = [];
        let allClasses = [];
        let currentAssignments = [];
        let isEditMode = false;
        let editingAssignmentId = null;

        // Modal Controls
        if (openBtn) openBtn.onclick = () => {
            isEditMode = false;
            editingAssignmentId = null;
            modal.querySelector('h3').textContent = 'Post New Assignment';
            document.getElementById('submitBtn').textContent = 'Post Assignment';
            addForm.reset();
            audienceSection.classList.add('hidden');
            setTargetMode('class');
            modal.classList.remove('hidden');
            fetchTargetingData();
        };

        if (closeBtn) closeBtn.onclick = () => {
            modal.classList.add('hidden');
            addForm.reset();
        };

        /**
         * TARGETING LOGIC
         */
        function setTargetMode(mode) {
            activeTargetMode = mode;
            
            targetClassBtn.classList.toggle('bg-white', mode === 'class');
            targetClassBtn.classList.toggle('text-blue-600', mode === 'class');
            targetClassBtn.classList.toggle('shadow-sm', mode === 'class');
            targetClassBtn.classList.toggle('text-gray-500', mode !== 'class');

            targetBatchBtn.classList.toggle('bg-white', mode === 'batch');
            targetBatchBtn.classList.toggle('text-blue-600', mode === 'batch');
            targetBatchBtn.classList.toggle('shadow-sm', mode === 'batch');
            targetBatchBtn.classList.toggle('text-gray-500', mode !== 'batch');

            targetClassGroup.classList.toggle('hidden', mode !== 'class');
            targetBatchGroup.classList.toggle('hidden', mode !== 'batch');

            targetClassSelect.required = (mode === 'class');
            targetBatchSelect.required = (mode === 'batch');

            syncDependentDropdowns();
        }

        targetClassBtn.onclick = () => setTargetMode('class');
        targetBatchBtn.onclick = () => setTargetMode('batch');

        async function fetchTargetingData() {
            globalCourseSelect.innerHTML = '<option value="">Loading subjects...</option>';
            targetClassSelect.innerHTML = '<option value="">Choose a class...</option>';
            targetBatchSelect.innerHTML = '<option value="">Choose a batch...</option>';

            try {
                const [classRes, courseRes] = await Promise.all([
                    fetch('/api/teacher/classes'),
                    fetch('/api/teacher/courses')
                ]);

                if (courseRes.ok) {
                    const { courses } = await courseRes.json();
                    allCourses = courses;
                    if (courses.length === 0) {
                        globalCourseSelect.innerHTML = '<option value="">No courses assigned</option>';
                    } else {
                        globalCourseSelect.innerHTML = '<option value="">Choose a subject...</option>' + 
                            courses.map(c => `<option value="${c._id}">${c.title}</option>`).join('');
                    }
                }

                if (classRes.ok) {
                    const { classes } = await classRes.json();
                    allClasses = classes;
                    targetClassSelect.innerHTML = '<option value="">Choose a class...</option>' + 
                        classes.map(c => `<option value="${c._id}">${c.name} (${c.section})</option>`).join('');
                }
                
                // If in Edit Mode, we need to ensure the sequence is maintained
                if (isEditMode) syncDependentDropdowns();

            } catch (err) {
                console.error('Failed to load targeting data:', err);
                showToast('Error loading targeting data', 'error');
            }
        }

        globalCourseSelect.onchange = () => syncDependentDropdowns();

        function syncDependentDropdowns() {
            const courseId = globalCourseSelect.value;
            
            if (!courseId) {
                audienceSection.classList.add('hidden');
                return;
            }

            // Show target audience section
            audienceSection.classList.remove('hidden');

            if (activeTargetMode === 'batch') {
                const course = allCourses.find(c => String(c._id) === String(courseId));
                if (course && course.batches && course.batches.length > 0) {
                    targetBatchSelect.innerHTML = '<option value="">Choose a batch...</option>' + 
                        course.batches.map(b => `<option value="${b._id}">${b.name}</option>`).join('');
                } else {
                    targetBatchSelect.innerHTML = '<option value="">No specific batches found</option>';
                }
            }
        }

        /**
         * CRUD LOGIC
         */
        async function fetchAssignments() {
            try {
                const res = await fetch('/api/teacher/assignments');
                if (res.ok) {
                    const { assignments } = await res.json();
                    currentAssignments = assignments;
                    renderAssignments(assignments);
                }
            } catch (err) {
                assignmentGrid.innerHTML = '<p class="text-center text-red-500 py-10 font-bold">Failed to load assignments.</p>';
            }
        }

        function renderAssignments(assignments) {
            if (!assignments.length) {
                assignmentGrid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500 font-bold italic">No assignments posted yet.</div>';
                return;
            }

            assignmentGrid.innerHTML = assignments.map(a => {
                let targetDisplay = a.class ? a.class.name : 'Specific Batch';
                if (a.batch && a.course) {
                    const batch = a.course.batches?.find(b => String(b._id) === String(a.batch));
                    if (batch) targetDisplay = batch.name;
                }

                return `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col h-full hover:shadow-lg transition-all duration-300">
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-[10px] font-black uppercase tracking-widest border border-blue-100">
                                ${a.course?.title || 'Course'}
                            </span>
                            <span class="text-[10px] text-gray-400 font-bold">
                                Due: ${new Date(a.dueDate).toLocaleDateString()}
                            </span>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900 mb-2 truncate">${a.title}</h3>
                        <p class="text-gray-600 text-sm mb-6 flex-1 line-clamp-2">${a.description}</p>
                        <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                            <div>
                                <p class="text-[9px] text-gray-400 font-black uppercase tracking-tighter">Target</p>
                                <p class="text-xs font-bold text-gray-700">${targetDisplay}</p>
                            </div>
                            <div class="flex gap-2">
                                <button data-action="edit" data-id="${a._id}" class="text-gray-400 hover:text-blue-600 transition"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button data-action="delete" data-id="${a._id}" class="text-gray-400 hover:text-red-600 transition"><i class="fa-solid fa-trash-can"></i></button>
                                <button data-action="submissions" data-id="${a._id}" class="bg-gray-900 text-white px-3 py-1.5 rounded-lg font-bold text-[10px] uppercase">Submissions</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        assignmentGrid.onclick = (e) => {
            const btn = e.target.closest('button[data-action]');
            if (!btn) return;
            const { action, id } = btn.dataset;
            if (action === 'edit') openEditModal(id);
            else if (action === 'delete') openDeleteModal(id);
            else if (action === 'submissions') openSubmissionsModal(id, btn.closest('.bg-white').querySelector('h3').textContent);
        };

        async function openEditModal(id) {
            isEditMode = true;
            editingAssignmentId = id;
            const a = currentAssignments.find(item => item._id === id);
            if (!a) return;

            await fetchTargetingData();

            addForm.title.value = a.title;
            addForm.description.value = a.description;
            addForm.dueDate.value = new Date(a.dueDate).toISOString().split('T')[0];
            addForm.maxPoints.value = a.maxPoints;
            globalCourseSelect.value = a.course._id || a.course;

            if (a.class) {
                setTargetMode('class');
                targetClassSelect.value = a.class._id || a.class;
            } else if (a.batch) {
                setTargetMode('batch');
                syncDependentDropdowns();
                targetBatchSelect.value = a.batch;
            }

            modal.querySelector('h3').textContent = 'Update Assignment';
            document.getElementById('submitBtn').textContent = 'Update Assignment';
            modal.classList.remove('hidden');
        }

        addForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(addForm);
            const data = {
                title: formData.get('title'),
                description: formData.get('description'),
                dueDate: formData.get('dueDate'),
                maxPoints: Number(formData.get('maxPoints')),
                course: formData.get('course'),
                class: activeTargetMode === 'class' ? formData.get('class') : undefined,
                batch: activeTargetMode === 'batch' ? formData.get('batch') : undefined
            };

            const url = isEditMode ? `/api/teacher/assignments/${editingAssignmentId}` : '/api/teacher/assignments';
            const method = isEditMode ? 'PATCH' : 'POST';

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    showToast(isEditMode ? 'Updated' : 'Posted');
                    modal.classList.add('hidden');
                    fetchAssignments();
                } else {
                    const err = await res.json();
                    showToast(err.message || 'Failed', 'error');
                }
            } catch (err) { showToast('Error', 'error'); }
        };

        /**
         * DELETE / SUBMISSIONS / GRADING (Placeholders for logic already implemented)
         */
        const deleteModal = document.getElementById('deleteModal');
        let assignmentToDeleteId = null;
        function openDeleteModal(id) { assignmentToDeleteId = id; deleteModal.classList.remove('hidden'); }
        document.getElementById('closeDeleteModal').onclick = () => deleteModal.classList.add('hidden');
        document.getElementById('cancelDeleteBtn').onclick = () => deleteModal.classList.add('hidden');
        document.getElementById('confirmDeleteBtn').onclick = async () => {
            const res = await fetch(`/api/teacher/assignments/${assignmentToDeleteId}`, { method: 'DELETE' });
            if (res.ok) { showToast('Deleted'); deleteModal.classList.add('hidden'); fetchAssignments(); }
        };

        const submissionsModal = document.getElementById('submissionsModal');
        const submissionsList = document.getElementById('submissionsList');
        const gradingModal = document.getElementById('gradingModal');
        const gradingForm = document.getElementById('gradingForm');
        let activeAssignment = null;
        let allSubmissions = [];

        async function openSubmissionsModal(id, title) {
            activeAssignment = currentAssignments.find(a => a._id === id);
            document.getElementById('submissionsModalTitle').textContent = `Submissions: ${title}`;
            submissionsModal.classList.remove('hidden');
            submissionsList.innerHTML = '<ui-spinner text="Fetching..."></ui-spinner>';
            const res = await fetch(`/api/teacher/assignments/${id}/submissions`);
            if (res.ok) {
                const { submissions } = await res.json();
                allSubmissions = submissions;
                renderSubmissions(submissions);
            }
        }

        function renderSubmissions(submissions) {
            if (!submissions.length) { submissionsList.innerHTML = '<p class="text-center py-20 text-gray-400">No submissions yet.</p>'; return; }
            submissionsList.innerHTML = submissions.map(s => `
                <div class="bg-white p-4 rounded-xl border border-gray-100 flex justify-between items-center hover:border-blue-200 transition">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center font-bold">${s.student.name.charAt(0)}</div>
                        <div><p class="font-bold text-sm">${s.student.name}</p><p class="text-[10px] text-gray-400">${new Date(s.submittedAt).toLocaleString()}</p></div>
                    </div>
                    <div class="flex items-center gap-4">
                        ${s.status === 'graded' ? `<div class="text-right"><p class="text-[10px] font-black text-green-600 uppercase">Graded</p><p class="font-black">${s.grade} / ${activeAssignment.maxPoints}</p></div>` : '<span class="text-[10px] font-black text-orange-500 uppercase">Pending</span>'}
                        <button data-action="grade" data-id="${s._id}" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-[10px]">Grade</button>
                    </div>
                </div>
            `).join('');
        }

        submissionsList.onclick = (e) => {
            const btn = e.target.closest('button[data-action="grade"]');
            if (btn) {
                const sub = allSubmissions.find(s => s._id === btn.dataset.id);
                document.getElementById('gradingSubmissionId').value = sub._id;
                document.getElementById('gradingScore').value = sub.grade || 0;
                document.getElementById('gradingFeedback').value = sub.feedback || '';
                document.getElementById('gradingMaxPoints').textContent = activeAssignment.maxPoints;
                gradingModal.classList.remove('hidden');
            }
        };

        gradingForm.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('gradingSubmissionId').value;
            const res = await fetch(`/api/teacher/assignments/grade/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ grade: document.getElementById('gradingScore').value, feedback: document.getElementById('gradingFeedback').value })
            });
            if (res.ok) { showToast('Graded'); gradingModal.classList.add('hidden'); openSubmissionsModal(activeAssignment._id, activeAssignment.title); }
        };

        document.getElementById('closeSubmissionsModal').onclick = () => submissionsModal.classList.add('hidden');
        document.getElementById('closeGradingModal').onclick = () => gradingModal.classList.add('hidden');

        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (window.initSocket) window.initSocket(user);
                if (user.role !== 'teacher' && user.role !== 'admin') { window.location.href = '/'; return; }
                
                customElements.whenDefined('ui-navbar').then(() => {
                    const navbar = document.querySelector('ui-navbar');
                    if (navbar && navbar.renderLinks) navbar.renderLinks(user);
                });
                
                fetchAssignments();
            } catch (err) { window.location.href = '/api/auth/login'; }
        }

        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });

        fetchProfile();
    </script>
