<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Studio - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        
        .sidebar-item.active { background-color: #eff6ff; color: #2563eb; border-right: 4px solid #2563eb; }
        .module-row:hover .ghost-controls, .day-row:hover .ghost-controls { opacity: 1; }
        .ghost-controls { opacity: 0; transition: opacity 0.2s; }
        
        @media (max-width: 1024px) {
            .sidebar-open #sidebar { transform: translateX(0); }
            .sidebar-open #overlay { display: block; }
        }

        .editor-section { scroll-margin-top: 100px; }
        .day-row { border-left: 2px solid #e5e7eb; }
        .day-row:hover { border-left-color: #3b82f6; }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col font-sans text-gray-900">
    
    <ui-navbar title="Curriculum Studio"></ui-navbar>

    <!-- Hidden File Input for PDF Uploads -->
    <input type="file" id="globalPdfInput" accept="application/pdf" class="hidden">

    <!-- Overlay for mobile sidebar -->
    <div id="overlay" class="fixed inset-0 bg-black/40 z-[40] hidden backdrop-blur-sm transition-opacity"></div>

    <div class="flex-1 flex overflow-hidden">
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="w-80 border-r border-gray-100 bg-white flex flex-col shrink-0 fixed lg:static inset-y-0 left-0 z-[50] -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="p-6 border-b border-gray-50">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em]">Curriculum Tree</h2>
                    <button id="closeSidebar" class="lg:hidden text-gray-400 hover:text-gray-600 text-xl">&times;</button>
                </div>
                
                <div class="space-y-4">
                    <select id="courseSelect" class="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl text-sm font-bold text-gray-700 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        <option value="">Choose a course...</option>
                    </select>
                    <div id="classTabToggle" class="hidden">
                         <button id="switchToClass" class="w-full py-2.5 px-4 rounded-xl text-xs font-bold bg-indigo-50 text-indigo-600 border border-indigo-100 hover:bg-indigo-100 transition flex items-center justify-center gap-2">
                            <i class="fa-solid fa-chalkboard-user"></i> Switch to Class View
                         </button>
                    </div>
                </div>

                <div class="relative mt-6">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-300 text-xs"></i>
                    <input type="text" id="treeSearch" placeholder="Filter sections..." class="w-full pl-9 pr-3 py-2 bg-gray-50 border-none rounded-lg text-xs outline-none focus:ring-1 focus:ring-blue-500">
                </div>
            </div>

            <div id="sidebarContent" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                <!-- Tree Injected Here -->
                <div class="p-10 text-center text-gray-300 italic text-xs">Select a course to view roadmap</div>
            </div>

            <div class="p-4 border-t border-gray-50">
                <button id="addSectionSidebar" class="w-full py-3 bg-blue-50 text-blue-600 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:bg-blue-100 transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus-circle"></i> New Learning Path
                </button>
            </div>
        </aside>

        <!-- Main Editor -->
        <main class="flex-1 flex flex-col min-w-0 bg-white">
            <!-- Editor Header -->
            <header class="h-16 border-b border-gray-50 flex items-center justify-between px-8 shrink-0">
                <div class="flex items-center gap-4">
                    <button id="toggleSidebar" class="lg:hidden w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 text-gray-500">
                        <i class="fa-solid fa-bars-staggered"></i>
                    </button>
                    <div class="flex items-center gap-2">
                        <span id="editorBadge" class="px-2 py-0.5 bg-blue-50 text-blue-600 text-[9px] font-black uppercase rounded border border-blue-100 hidden">Drafting</span>
                        <h3 id="editingTitle" class="text-sm font-bold text-gray-500 italic">No course selected</h3>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <div id="adminControls" class="hidden flex items-center gap-2">
                        <button id="lockToggleBtn" class="px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest transition-all border border-gray-100 active:scale-95 flex items-center gap-2">
                            <i id="lockIcon" class="fa-solid fa-lock-open"></i> <span id="lockText">Lock</span>
                        </button>
                    </div>
                    <button id="previewBtn" class="p-2 text-gray-400 hover:text-blue-600 transition" title="Preview Syllabus">
                        <i class="fa-solid fa-eye text-lg"></i>
                    </button>
                    <button id="saveBtn" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-sm hover:bg-blue-700 transition shadow-lg shadow-blue-200 active:scale-95 ml-2">
                        Deploy Syllabus
                    </button>
                </div>
            </header>

            <!-- Editor Content -->
            <div id="editorScrollContainer" class="flex-1 overflow-y-auto custom-scrollbar bg-gray-50/30">
                <div id="editorContent" class="max-w-4xl mx-auto py-12 px-8 space-y-12 hidden">
                    <section id="summarySection" class="editor-section bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-sm">
                        <div class="flex items-center gap-3 mb-4">
                            <i class="fa-solid fa-align-left text-blue-500"></i>
                            <h4 class="text-xs font-black text-gray-400 uppercase tracking-widest">Executive Summary</h4>
                        </div>
                        <textarea id="curriculumOutline" class="w-full p-6 bg-white border border-gray-50 rounded-3xl focus:ring-2 focus:ring-blue-500 outline-none h-32 text-gray-600 leading-relaxed font-medium shadow-inner" placeholder="Provide a high-level overview..."></textarea>
                    </section>

                    <div id="sectionsContainer" class="space-y-12">
                        <!-- Sections and Modules -->
                    </div>
                </div>

                <!-- Empty State -->
                <div id="editorEmptyState" class="h-full flex flex-col items-center justify-center text-center p-12">
                    <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center text-blue-200 text-4xl mb-6">
                        <i class="fa-solid fa-microchip"></i>
                    </div>
                    <h3 class="text-2xl font-black text-gray-900 mb-2 tracking-tight">Curriculum IDE</h3>
                    <p class="text-gray-400 max-w-sm font-medium">Select an academic entity from the sidebar to begin architecting the learning path.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Syllabus Preview Modal -->
    <div id="previewModal" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden z-[2000] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-5xl h-[90vh] overflow-hidden flex flex-col border border-white/20">
            <div class="p-8 bg-gray-900 text-white flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-2xl shadow-xl">
                        <i class="fa-solid fa-file-signature"></i>
                    </div>
                    <div>
                        <h3 class="text-2xl font-black tracking-tight" id="modalPreviewTitle">Academic Syllabus</h3>
                        <p class="text-[9px] uppercase font-black tracking-widest text-gray-500 mt-1">Official Course Roadmap</p>
                    </div>
                </div>
                <button id="closePreviewBtn" class="w-12 h-12 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center text-3xl transition-all">&times;</button>
            </div>
            <div id="previewBody" class="flex-1 overflow-y-auto p-12 bg-white custom-scrollbar text-gray-800"></div>
        </div>
    </div>

    <script type="module">
        import { showToast } from '/components/ui-components.js?v=1.6';

        // --- STATE ---
        let allCourses = [];
        let myClass = null;
        let activeEntity = null; // { type: 'course'|'class', data: any }
        let currentUser = null;
        let workingSections = [];

        // --- ELEMENTS ---
        const els = {
            courseSelect: document.getElementById('courseSelect'),
            sidebarContent: document.getElementById('sidebarContent'),
            editorContent: document.getElementById('editorContent'),
            editorEmptyState: document.getElementById('editorEmptyState'),
            editingTitle: document.getElementById('editingTitle'),
            editorBadge: document.getElementById('editorBadge'),
            sectionsContainer: document.getElementById('sectionsContainer'),
            outline: document.getElementById('curriculumOutline'),
            saveBtn: document.getElementById('saveBtn'),
            classTabToggle: document.getElementById('classTabToggle'),
            switchToClass: document.getElementById('switchToClass'),
            treeSearch: document.getElementById('treeSearch'),
            previewModal: document.getElementById('previewModal'),
            previewBody: document.getElementById('previewBody'),
            modalPreviewTitle: document.getElementById('modalPreviewTitle'),
            globalPdfInput: document.getElementById('globalPdfInput')
        };

        // --- INIT ---
        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) { window.location.href = '/api/auth/login'; return; }
                currentUser = (await res.json()).user;
                
                customElements.whenDefined('ui-navbar').then(() => {
                    document.querySelector('ui-navbar').renderLinks(currentUser);
                });

                await Promise.all([loadCourses(), loadClass()]);
            } catch (err) { console.error('Init failed', err); }
        }

        async function loadCourses() {
            const res = await fetch('/api/teacher/courses');
            const data = await res.json();
            allCourses = data.courses || [];
            els.courseSelect.innerHTML = '<option value="">Choose a course...</option>' + 
                allCourses.map(c => `<option value="${c._id}">${c.title}</option>`).join('');
        }

        async function loadClass() {
            const res = await fetch('/api/teacher/classes');
            const data = await res.json();
            if (data.classes?.length) {
                myClass = data.classes[0];
                els.classTabToggle.classList.remove('hidden');
            }
        }

        // --- NAVIGATION ---
        els.courseSelect.onchange = (e) => {
            const id = e.target.value;
            if (id) openEntity('course', allCourses.find(c => c._id === id));
        };

        els.switchToClass.onclick = () => {
            els.courseSelect.value = '';
            openEntity('class', myClass);
        };

        function openEntity(type, data) {
            activeEntity = { type, data };
            workingSections = JSON.parse(JSON.stringify(type === 'course' ? (data.curriculumSections || []) : (data.classCurriculumSections || [])));
            
            els.editingTitle.textContent = type === 'course' ? data.title : `${data.name} (${data.section})`;
            els.editingTitle.classList.remove('italic');
            els.editorBadge.classList.remove('hidden');
            els.editorEmptyState.classList.add('hidden');
            els.editorContent.classList.remove('hidden');
            
            els.outline.value = type === 'course' ? (data.outline || '') : (data.classOutline || '');
            
            els.saveBtn.textContent = type === 'course' ? 'Deploy Syllabus' : 'Save Class Roadmap';
            
            const isLocked = type === 'course' ? data.curriculumLocked : data.classCurriculumLocked;
            updateLockUI(isLocked);
            renderEditor();
            renderSidebar();
        }

        function updateLockUI(isLocked) {
            const canEdit = currentUser?.role === 'admin' || !isLocked;
            els.outline.disabled = !canEdit;
            els.saveBtn.classList.toggle('hidden', !canEdit);
            document.getElementById('addSectionSidebar').classList.toggle('hidden', !canEdit);
            
            if (currentUser?.role === 'admin') {
                const btn = document.getElementById('lockToggleBtn');
                const icon = document.getElementById('lockIcon');
                const text = document.getElementById('lockText');
                
                btn.className = `px-4 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest transition-all active:scale-95 flex items-center gap-2 ${isLocked ? 'bg-orange-600 text-white border-orange-600' : 'bg-white text-orange-600 border-orange-100'}`;
                icon.className = `fa-solid fa-${isLocked ? 'lock' : 'lock-open'}`;
                text.textContent = isLocked ? 'Unlock' : 'Lock';
                
                btn.onclick = () => toggleLock(!isLocked);
                document.getElementById('adminControls').classList.remove('hidden');
            }
        }

        async function toggleLock(isLocked) {
            const res = await fetch('/api/admin/curriculum/lock', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: activeEntity.type, id: activeEntity.data._id, isLocked })
            });
            if (res.ok) {
                showToast(`Curriculum ${isLocked ? 'Locked' : 'Unlocked'}`);
                // Simple refresh
                if (activeEntity.type === 'course') await loadCourses(); else await loadClass();
                const updated = activeEntity.type === 'course' ? allCourses.find(c => c._id === activeEntity.data._id) : myClass;
                openEntity(activeEntity.type, updated);
            }
        }

        // --- RENDERING ---
        function renderSidebar() {
            if (!workingSections.length) {
                els.sidebarContent.innerHTML = '<div class="p-10 text-center text-gray-300 italic text-xs">No sections created</div>';
                return;
            }

            els.sidebarContent.innerHTML = workingSections.map((sec, sIdx) => `
                <div class="mb-1">
                    <button class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left hover:bg-gray-50 transition-all group" data-sec="${sIdx}">
                        <span class="w-5 h-5 rounded-lg bg-gray-100 flex items-center justify-center text-[9px] font-black text-gray-400 group-hover:bg-blue-600 group-hover:text-white transition-all">${sIdx + 1}</span>
                        <span class="text-xs font-bold truncate flex-1">${sec.title || 'Weekly Path'}</span>
                        ${sec.isOptional ? '<i class="fa-solid fa-circle-nodes text-[8px] text-orange-400"></i>' : ''}
                    </button>
                    <div class="pl-12 space-y-1 mt-1">
                        ${(sec.modules || []).map((mod, mIdx) => `
                            <button class="w-full text-left py-1.5 px-3 text-[10px] font-medium text-gray-400 hover:text-blue-600 transition truncate border-l border-gray-100 hover:border-blue-200" data-sec="${sIdx}" data-mod="${mIdx}">
                                ${mod.title || 'Untitled milestone'}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            // Sidebar Click Events
            els.sidebarContent.querySelectorAll('button[data-sec]').forEach(btn => {
                btn.onclick = () => {
                    const sIdx = btn.dataset.sec;
                    const mIdx = btn.dataset.mod;
                    const id = mIdx !== undefined ? `mod-${sIdx}-${mIdx}` : `sec-${sIdx}`;
                    document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
                    
                    // Highlight active
                    els.sidebarContent.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
                    btn.closest('.mb-1').querySelector('.sidebar-item').classList.add('active');
                };
            });
        }

        function renderEditor() {
            els.sectionsContainer.innerHTML = '';
            const isLocked = activeEntity.type === 'course' ? activeEntity.data.curriculumLocked : activeEntity.data.classCurriculumLocked;
            const canEdit = currentUser?.role === 'admin' || !isLocked;

            workingSections.forEach((sec, sIdx) => {
                const secDiv = document.createElement('div');
                secDiv.id = `sec-${sIdx}`;
                secDiv.className = "dynamic-section editor-section bg-white p-8 rounded-[2.5rem] border border-gray-100 shadow-sm space-y-8";
                secDiv.innerHTML = `
                    <div class="flex justify-between items-center border-b border-gray-50 pb-6">
                        <div class="flex-1">
                            <input type="text" class="sec-title w-full bg-transparent border-none text-2xl font-black text-gray-900 outline-none p-0 focus:text-blue-600 transition-colors" value="${sec.title}" ${!canEdit ? 'readonly' : ''} placeholder="Section Header">
                            <div class="flex items-center gap-4 mt-2">
                                <label class="flex items-center gap-2 cursor-pointer group">
                                    <input type="checkbox" class="sec-opt sr-only peer" ${sec.isOptional ? 'checked' : ''} ${!canEdit ? 'disabled' : ''}>
                                    <div class="w-8 h-4 bg-gray-200 rounded-full peer peer-checked:bg-orange-400 relative after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:after:translate-x-4"></div>
                                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Optional</span>
                                </label>
                            </div>
                        </div>
                        <div class="flex gap-2 ${!canEdit ? 'hidden' : ''}">
                            <button class="add-mod-btn p-2 text-blue-600 hover:bg-blue-50 rounded-xl transition" title="Add Milestone"><i class="fa-solid fa-plus-circle"></i></button>
                            <button class="move-sec-up p-2 text-gray-300 hover:text-blue-600 transition" title="Move Up"><i class="fa-solid fa-chevron-up"></i></button>
                            <button class="remove-sec-btn p-2 text-gray-200 hover:text-red-500 transition" title="Delete Section"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="modules-list space-y-6"></div>
                `;

                const modulesList = secDiv.querySelector('.modules-list');
                (sec.modules || []).forEach((mod, mIdx) => {
                    const modDiv = createModuleRow(sec, mod, sIdx, mIdx, canEdit);
                    modulesList.appendChild(modDiv);
                });

                // Events
                secDiv.querySelector('.sec-title').oninput = (e) => { sec.title = e.target.value; renderSidebar(); };
                secDiv.querySelector('.sec-opt').onchange = (e) => { sec.isOptional = e.target.checked; renderSidebar(); };
                secDiv.querySelector('.add-mod-btn').onclick = () => { 
                    sec.modules.push({ title: '', description: '', duration: '', learningObjectives: [], resources: [], daySchedules: [] }); 
                    renderEditor(); renderSidebar(); 
                };
                secDiv.querySelector('.move-sec-up').onclick = () => { if (sIdx > 0) { [workingSections[sIdx], workingSections[sIdx-1]] = [workingSections[sIdx-1], workingSections[sIdx]]; renderEditor(); renderSidebar(); } };
                secDiv.querySelector('.remove-sec-btn').onclick = () => { if (confirm('Delete section?')) { workingSections.splice(sIdx, 1); renderEditor(); renderSidebar(); }};

                els.sectionsContainer.appendChild(secDiv);
            });
        }

        function createModuleRow(sec, mod, sIdx, mIdx, canEdit) {
            const div = document.createElement('div');
            div.id = `mod-${sIdx}-${mIdx}`;
            div.className = "module-row bg-gray-50/50 p-6 rounded-3xl border border-transparent hover:border-blue-100 hover:bg-white hover:shadow-xl hover:shadow-blue-900/5 transition-all duration-300 relative group";
            div.innerHTML = `
                <div class="flex flex-col gap-6">
                    <div class="flex flex-col lg:flex-row gap-6">
                        <div class="lg:w-1/3 space-y-4">
                            <div class="flex items-center gap-3">
                                <span class="w-8 h-8 rounded-xl bg-white shadow-sm flex items-center justify-center text-xs font-black text-blue-600 border border-gray-100">${mIdx + 1}</span>
                                <input type="text" class="mod-title w-full bg-transparent border-none font-bold text-gray-900 outline-none p-0 focus:text-blue-600" value="${mod.title}" placeholder="Milestone Title" ${!canEdit ? 'readonly' : ''}>
                            </div>
                            <input type="text" class="mod-dur w-full p-2 bg-white border border-gray-100 rounded-xl text-[10px] font-black uppercase tracking-widest text-gray-500 outline-none" value="${mod.duration}" placeholder="Timing (e.g. Week 1)" ${!canEdit ? 'readonly' : ''}>
                            <div class="space-y-2">
                                <div class="mod-objs flex flex-wrap gap-1.5"></div>
                                ${canEdit ? '<button class="add-obj-btn text-[9px] font-black text-blue-600 hover:underline">+ Learning Outcome</button>' : ''}
                            </div>
                        </div>
                        <div class="lg:w-2/3 space-y-4 border-t lg:border-t-0 lg:border-l border-gray-100 lg:pl-6 pt-4 lg:pt-0">
                            <textarea class="mod-desc w-full p-4 bg-white border border-gray-50 rounded-2xl text-sm font-medium text-gray-600 outline-none focus:ring-1 focus:ring-blue-500 h-24 shadow-inner" placeholder="Pedagogical details..." ${!canEdit ? 'readonly' : ''}>${mod.description}</textarea>
                            <div class="mod-res flex flex-wrap gap-4"></div>
                            <div class="flex gap-4">
                                ${canEdit ? '<button class="add-res-btn text-[9px] font-black text-blue-600 hover:underline">+ Link Resource</button>' : ''}
                                ${canEdit ? '<button class="upload-pdf-btn text-[9px] font-black text-indigo-600 hover:underline"><i class="fa-solid fa-file-pdf mr-1"></i> Upload PDF to Sanity</button>' : ''}
                            </div>
                        </div>
                    </div>

                    <!-- Day Schedules Section -->
                    <div class="pt-6 border-t border-gray-100">
                        <div class="flex justify-between items-center mb-4">
                            <h5 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">Daily Schedule</h5>
                            ${canEdit ? '<button class="add-day-btn px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg text-[9px] font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">+ Add Day</button>' : ''}
                        </div>
                        <div class="days-list space-y-3"></div>
                    </div>
                </div>
                <div class="ghost-controls absolute -right-3 top-4 flex flex-col gap-2 ${!canEdit ? 'hidden' : ''}">
                    <button class="remove-mod-btn w-8 h-8 rounded-full bg-white shadow-md text-red-400 hover:bg-red-500 hover:text-white transition-all"><i class="fa-solid fa-times"></i></button>
                </div>
            `;

            // Sub-items rendering
            const objsCont = div.querySelector('.mod-objs');
            const resCont = div.querySelector('.mod-res');
            const daysCont = div.querySelector('.days-list');

            const renderObjs = () => {
                objsCont.innerHTML = (mod.learningObjectives || []).map((o, oIdx) => `
                    <span class="px-2 py-0.5 bg-white text-[10px] font-bold text-gray-600 rounded-lg border border-gray-100 flex items-center gap-2">
                        ${canEdit ? `<input type="text" class="bg-transparent border-none p-0 outline-none w-16" value="${o}" data-oidx="${oIdx}"> <button class="rem-obj text-gray-300 hover:text-red-500" data-oidx="${oIdx}">&times;</button>` : o}
                    </span>
                `).join('');
            };

            const renderRes = () => {
                resCont.innerHTML = (mod.resources || []).map((r, rIdx) => `
                    <div class="flex items-center gap-2 text-[10px] font-bold text-gray-400 bg-white px-3 py-1.5 rounded-xl border border-gray-50">
                        <i class="fa-solid fa-link text-blue-500"></i>
                        ${canEdit ? 
                            `<input type="text" class="bg-transparent border-none p-0 outline-none w-16 text-gray-700" value="${r.title}" placeholder="Title" data-ridx="${rIdx}" data-field="title">
                             <input type="text" class="bg-transparent border-none p-0 outline-none w-24 text-blue-400" value="${r.url}" placeholder="URL" data-ridx="${rIdx}" data-field="url">
                             <button class="rem-res text-gray-300 hover:text-red-500" data-ridx="${rIdx}">&times;</button>` 
                            : `<a href="${r.url}" target="_blank" class="hover:text-blue-600">${r.title}</a>`}
                    </div>
                `).join('');
            };

            const renderDays = () => {
                daysCont.innerHTML = (mod.daySchedules || []).map((d, dIdx) => `
                    <div class="day-row flex items-center gap-4 p-3 bg-white/50 rounded-2xl group/day relative">
                        <div class="flex flex-col gap-1 w-24 shrink-0">
                            <select class="day-dow bg-transparent border-none text-[10px] font-black text-blue-600 uppercase outline-none" data-didx="${dIdx}" ${!canEdit ? 'disabled' : ''}>
                                ${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(day => `<option value="${day}" ${d.dayOfWeek === day ? 'selected' : ''}>${day}</option>`).join('')}
                            </select>
                            <input type="date" class="day-date bg-transparent border-none text-[9px] text-gray-400 outline-none" value="${d.date ? new Date(d.date).toISOString().split('T')[0] : ''}" data-didx="${dIdx}" ${!canEdit ? 'readonly' : ''}>
                        </div>
                        <div class="flex-1 flex flex-col">
                            <input type="text" class="day-topic w-full bg-transparent border-none font-bold text-sm text-gray-800 outline-none focus:text-blue-600" value="${d.topic}" placeholder="What will be learned?" data-didx="${dIdx}" ${!canEdit ? 'readonly' : ''}>
                            <input type="text" class="day-desc w-full bg-transparent border-none text-[10px] text-gray-500 outline-none" value="${d.description || ''}" placeholder="Brief description..." data-didx="${dIdx}" ${!canEdit ? 'readonly' : ''}>
                        </div>
                        <div class="ghost-controls flex gap-2 ${!canEdit ? 'hidden' : ''}">
                            <button class="rem-day text-gray-300 hover:text-red-500 transition" data-didx="${dIdx}"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                `).join('');
            };

            renderObjs(); renderRes(); renderDays();

            // Row Events
            div.querySelector('.mod-title').oninput = (e) => { mod.title = e.target.value; renderSidebar(); };
            div.querySelector('.mod-dur').oninput = (e) => { mod.duration = e.target.value; };
            div.querySelector('.mod-desc').oninput = (e) => { mod.description = e.target.value; };
            div.querySelector('.remove-mod-btn').onclick = () => { if (confirm('Delete module?')) { sec.modules.splice(mIdx, 1); renderEditor(); renderSidebar(); }};
            
            if (canEdit) {
                div.querySelector('.add-obj-btn').onclick = () => { mod.learningObjectives.push(''); renderObjs(); };
                div.querySelector('.add-res-btn').onclick = () => { mod.resources.push({ title: '', url: '' }); renderRes(); };
                div.querySelector('.add-day-btn').onclick = () => { 
                    if (!mod.daySchedules) mod.daySchedules = [];
                    mod.daySchedules.push({ dayOfWeek: 'Monday', topic: '', description: '' }); 
                    renderDays(); 
                };
                
                div.querySelector('.upload-pdf-btn').onclick = () => {
                    const fileInput = els.globalPdfInput;
                    fileInput.onchange = async () => {
                        const file = fileInput.files[0];
                        if (!file) return;
                        const formData = new FormData();
                        formData.append('file', file);
                        try {
                            showToast('Uploading PDF...', 'info');
                            const res = await fetch('/api/teacher/materials/upload', { method: 'POST', body: formData });
                            if (res.ok) {
                                const asset = await res.json();
                                mod.resources.push({ title: file.name, url: asset.url });
                                renderRes();
                                showToast('PDF uploaded and linked!', 'success');
                            } else { showToast('Upload failed', 'error'); }
                        } catch (err) { showToast('Connection error', 'error'); }
                        finally { fileInput.value = ''; }
                    };
                    fileInput.click();
                };

                div.addEventListener('input', (e) => {
                    const el = e.target;
                    const dIdx = el.dataset.didx;
                    if (el.dataset.oidx !== undefined) mod.learningObjectives[el.dataset.oidx] = el.value;
                    if (el.dataset.ridx !== undefined) mod.resources[el.dataset.ridx][el.dataset.field] = el.value;
                    
                    if (dIdx !== undefined) {
                        if (el.classList.contains('day-topic')) mod.daySchedules[dIdx].topic = el.value;
                        if (el.classList.contains('day-desc')) mod.daySchedules[dIdx].description = el.value;
                        if (el.classList.contains('day-date')) mod.daySchedules[dIdx].date = el.value ? new Date(el.value) : null;
                    }
                });

                div.addEventListener('change', (e) => {
                   const el = e.target;
                   if (el.classList.contains('day-dow')) mod.daySchedules[el.dataset.didx].dayOfWeek = el.value;
                });

                div.addEventListener('click', (e) => {
                    const btn = e.target.closest('button');
                    if (btn?.classList.contains('rem-obj')) { mod.learningObjectives.splice(btn.dataset.oidx, 1); renderObjs(); }
                    if (btn?.classList.contains('rem-res')) { mod.resources.splice(btn.dataset.ridx, 1); renderRes(); }
                    if (btn?.classList.contains('rem-day')) { mod.daySchedules.splice(btn.dataset.didx, 1); renderDays(); }
                });
            }

            return div;
        }

        // --- GLOBAL ACTIONS ---
        document.getElementById('addSectionSidebar').onclick = () => {
            if (!activeEntity) return;
            workingSections.push({ title: 'New Learning Path', modules: [], isOptional: false, order: workingSections.length });
            renderEditor();
            renderSidebar();
            document.getElementById(`sec-${workingSections.length-1}`).scrollIntoView({ behavior: 'smooth' });
        };

        function scrapeCurriculum() {
            const sections = [];
            document.querySelectorAll('.dynamic-section').forEach((secEl, sIdx) => {
                const modules = [];
                secEl.querySelectorAll('.module-row').forEach((modEl, mIdx) => {
                    // Scrape Objectives
                    const learningObjectives = [];
                    modEl.querySelectorAll('.mod-objs input').forEach(input => {
                        if (input.value.trim()) learningObjectives.push(input.value.trim());
                    });

                    // Scrape Resources
                    const resources = [];
                    modEl.querySelectorAll('.mod-res div').forEach(resEl => {
                        const title = resEl.querySelector('input[data-field="title"]')?.value;
                        const url = resEl.querySelector('input[data-field="url"]')?.value;
                        if (title && url) resources.push({ title, url });
                    });

                    // NEW: Scrape Day Schedules
                    const daySchedules = [];
                    modEl.querySelectorAll('.day-row').forEach(dayEl => {
                        const dayOfWeek = dayEl.querySelector('.day-dow').value;
                        const date = dayEl.querySelector('.day-date').value;
                        const topic = dayEl.querySelector('.day-topic').value;
                        const description = dayEl.querySelector('.day-desc').value;
                        
                        if (topic.trim()) {
                            daySchedules.push({
                                dayOfWeek,
                                topic: topic.trim(),
                                description: description.trim(),
                                date: date ? new Date(date) : null
                            });
                        }
                    });

                    modules.push({
                        title: modEl.querySelector('.mod-title').value,
                        description: modEl.querySelector('.mod-desc').value,
                        duration: modEl.querySelector('.mod-dur').value,
                        learningObjectives,
                        resources,
                        daySchedules,
                        order: mIdx
                    });
                });

                sections.push({
                    title: secEl.querySelector('.sec-title')?.value || 'Untitled Section',
                    isOptional: secEl.querySelector('.sec-opt')?.checked || false,
                    modules,
                    order: sIdx
                });
            });
            return sections;
        }

        els.saveBtn.onclick = async () => {
            const sections = scrapeCurriculum();
            const data = {
                [activeEntity.type === 'course' ? 'outline' : 'classOutline']: els.outline.value,
                [activeEntity.type === 'course' ? 'curriculumSections' : 'classCurriculumSections']: sections
            };

            els.saveBtn.disabled = true;
            els.saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Deploying...';

            try {
                const res = await fetch(`/api/teacher/${activeEntity.type}s/${activeEntity.data._id}/curriculum`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    showToast('Roadmap deployed successfully!');
                    const updated = (await res.json())[activeEntity.type];
                    openEntity(activeEntity.type, updated);
                }
            } catch (err) { showToast('Network error', 'error'); }
            finally {
                els.saveBtn.disabled = false;
                els.saveBtn.textContent = activeEntity.type === 'course' ? 'Deploy Syllabus' : 'Save Class Roadmap';
            }
        };

        // Sidebar Toggle
        document.getElementById('toggleSidebar').onclick = () => document.body.classList.add('sidebar-open');
        document.getElementById('closeSidebar').onclick = () => document.body.classList.remove('sidebar-open');
        document.getElementById('overlay').onclick = () => document.body.classList.remove('sidebar-open');

        // Search
        els.treeSearch.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.sidebar-item').forEach(item => {
                const matches = item.textContent.toLowerCase().includes(term);
                item.closest('.mb-1').classList.toggle('hidden', !matches);
            });
        };

        // Preview
        document.getElementById('previewBtn').onclick = () => {
            if (!activeEntity) return;
            els.modalPreviewTitle.textContent = `${activeEntity.type === 'course' ? 'Syllabus' : 'Class Roadmap'}: ${els.editingTitle.textContent}`;
            els.previewBody.innerHTML = generateSyllabusHTML(els.editingTitle.textContent, els.outline.value, workingSections);
            els.previewModal.classList.remove('hidden');
        };
        document.getElementById('closePreviewBtn').onclick = () => els.previewModal.classList.add('hidden');

        function generateSyllabusHTML(title, outline, sections) {
            return `
                <div class="space-y-12">
                    <div class="text-center">
                        <h2 class="text-4xl font-black text-gray-900">${title}</h2>
                        <div class="h-1 w-20 bg-blue-600 mx-auto mt-4 rounded-full"></div>
                    </div>
                    <div class="bg-gray-50 p-8 rounded-3xl border border-gray-100">
                        <p class="text-gray-700 font-medium italic leading-relaxed text-lg">"${outline || 'No summary provided.'}"</p>
                    </div>
                    <div class="space-y-10">
                        ${sections.map((s, i) => `
                            <div class="space-y-4">
                                <h3 class="text-xl font-bold text-gray-900 flex items-center gap-3">
                                    <span class="text-gray-200 font-black text-2xl">0${i+1}</span>
                                    ${s.title}
                                </h3>
                                <div class="pl-10 space-y-4">
                                    ${s.modules.map(m => `
                                        <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                                            <div class="flex justify-between items-start mb-2">
                                                <h4 class="font-bold text-gray-900">${m.title}</h4>
                                                <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase">${m.duration}</span>
                                            </div>
                                            <p class="text-xs text-gray-500 mb-4">${m.description}</p>
                                            
                                            ${m.daySchedules?.length ? `
                                                <div class="space-y-2 border-t pt-4">
                                                    ${m.daySchedules.map(d => `
                                                        <div class="flex gap-4 items-baseline">
                                                            <span class="text-[10px] font-black text-blue-500 uppercase w-16 shrink-0">${d.dayOfWeek}</span>
                                                            <div class="flex-1">
                                                                <p class="text-xs font-bold text-gray-800">${d.topic}</p>
                                                                ${d.description ? `<p class="text-[10px] text-gray-400">${d.description}</p>` : ''}
                                                            </div>
                                                        </div>
                                                    `).join('')}
                                                </div>
                                            ` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        init();
    </script>
</body>
</html>
