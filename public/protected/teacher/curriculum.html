<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Management - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Curriculum & Outlines"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Curriculum & Course Outlines</h2>
            <p class="text-gray-500 mt-2">Manage your teaching roadmap and student learning objectives.</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
            <div class="space-y-6">
                <!-- Placeholder Subject -->
                <div class="p-4 border border-gray-200 rounded-lg hover:border-blue-300 transition">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-bold text-gray-900">Advanced Mathematics - Grade 12</h3>
                        <button class="text-blue-600 hover:bg-blue-50 px-3 py-1 rounded transition text-sm font-bold">Edit Outline</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="flex items-center text-gray-600">
                            <i class="fa-solid fa-book-open mr-3"></i>
                            <span>Unit 1: Calculus Foundations</span>
                        </div>
                        <div class="flex items-center text-gray-600">
                            <i class="fa-solid fa-check-circle text-green-500 mr-3"></i>
                            <span>Completed: 65%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (user.role !== 'teacher' && user.role !== 'admin') { window.location.href = '/'; return; }
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) { navbar.renderLinks(user.role); }
            } catch (err) {
                console.error('Failed to fetch profile:', err);
                window.location.href = '/api/auth/login';
            }
        }
        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });
        fetchProfile();
    </script>
</body>
</html>
