<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Management - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Attendance Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Class Attendance</h2>
                <p class="text-gray-500 mt-2">Mark and manage student attendance for your classes.</p>
            </div>
            
            <div class="flex flex-col gap-4 w-full md:w-auto">
                <!-- Mode Toggle -->
                <div class="flex bg-white p-1 rounded-xl shadow-sm border border-gray-200 self-end">
                    <button id="modeClassBtn" class="px-4 py-2 rounded-lg text-sm font-bold transition-all bg-blue-600 text-white shadow-md">
                        Standard Class
                    </button>
                    <button id="modeBatchBtn" class="px-4 py-2 rounded-lg text-sm font-bold transition-all text-gray-500 hover:bg-gray-50">
                        Course Batch
                    </button>
                </div>

                <div class="flex flex-wrap justify-end gap-3">
                    <!-- Standard Class Select -->
                    <div id="classSelectContainer">
                        <select id="classSelect" class="bg-white border border-gray-300 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium shadow-sm transition-all cursor-pointer min-w-[180px]">
                            <option value="">Select Class</option>
                        </select>
                    </div>

                    <!-- Course Batch Selects (Hidden by default) -->
                    <div id="batchSelectContainer" class="hidden flex gap-3">
                        <select id="courseSelect" class="bg-white border border-gray-300 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium shadow-sm transition-all cursor-pointer min-w-[180px]">
                            <option value="">Select Course</option>
                        </select>
                        <select id="batchSelect" class="bg-white border border-gray-300 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium shadow-sm transition-all cursor-pointer min-w-[150px]" disabled>
                            <option value="">Select Batch</option>
                        </select>
                    </div>

                    <input type="date" id="attendanceDate" class="bg-white border border-gray-300 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium shadow-sm transition-all cursor-pointer">
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-6">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Student ID</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Name</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Status</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody" class="divide-y divide-gray-200">
                    <tr>
                        <td colspan="3" class="px-6 py-10 text-center text-gray-500">Please select a class to load students.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="flex justify-end">
            <button id="saveAttendanceBtn" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-lg hidden">
                Save Attendance
            </button>
        </div>
    </main>

    <script type="module">
        import { showToast } from '/components/ui-components.js?v=1.6';

        // DOM Elements
        const modeClassBtn = document.getElementById('modeClassBtn');
        const modeBatchBtn = document.getElementById('modeBatchBtn');
        const classSelectContainer = document.getElementById('classSelectContainer');
        const batchSelectContainer = document.getElementById('batchSelectContainer');
        const classSelect = document.getElementById('classSelect');
        const courseSelect = document.getElementById('courseSelect');
        const batchSelect = document.getElementById('batchSelect');
        const attendanceDate = document.getElementById('attendanceDate');
        const studentTableBody = document.getElementById('studentTableBody');
        const saveAttendanceBtn = document.getElementById('saveAttendanceBtn');

        // State
        let activeMode = 'class'; // 'class' or 'batch'
        let allCourses = [];
        let currentUser = null;

        // Set default date to today
        attendanceDate.value = new Date().toISOString().split('T')[0];

        /**
         * MODE SWITCHING
         */
        function setMode(mode) {
            activeMode = mode;
            
            // UI Toggle
            modeClassBtn.classList.toggle('bg-blue-600', mode === 'class');
            modeClassBtn.classList.toggle('text-white', mode === 'class');
            modeClassBtn.classList.toggle('shadow-md', mode === 'class');
            modeClassBtn.classList.toggle('text-gray-500', mode !== 'class');
            
            modeBatchBtn.classList.toggle('bg-blue-600', mode === 'batch');
            modeBatchBtn.classList.toggle('text-white', mode === 'batch');
            modeBatchBtn.classList.toggle('shadow-md', mode === 'batch');
            modeBatchBtn.classList.toggle('text-gray-500', mode !== 'batch');

            classSelectContainer.classList.toggle('hidden', mode !== 'class');
            batchSelectContainer.classList.toggle('hidden', mode !== 'batch');

            // Reset Table
            studentTableBody.innerHTML = `<tr><td colspan="3" class="px-6 py-10 text-center text-gray-400 italic">Please select a ${mode === 'class' ? 'class' : 'batch'} to load students.</td></tr>`;
            saveAttendanceBtn.classList.add('hidden');
        }

        modeClassBtn.onclick = () => setMode('class');
        modeBatchBtn.onclick = () => {
            setMode('batch');
            if (allCourses.length === 0) fetchTeacherCourses();
        };

        /**
         * DATA FETCHING
         */
        async function fetchClasses() {
            try {
                // Fetch classes where current user is class teacher
                const res = await fetch('/api/teacher/classes');
                if (!res.ok) throw new Error('Failed to fetch classes');
                
                const data = await res.json();
                const myClasses = data.classes || [];
                
                classSelect.innerHTML = '<option value="">Select Class</option>' + 
                    myClasses.map(c => `<option value="${c._id}">${c.name} (${c.section})</option>`).join('');
            } catch (err) {
                console.error('Failed to fetch classes:', err);
                showToast('Error loading classes', 'error');
            }
        }

        async function fetchTeacherCourses() {
            try {
                const res = await fetch('/api/teacher/courses');
                if (!res.ok) throw new Error('Failed to fetch courses');
                
                const data = await res.json();
                allCourses = data.courses || [];

                courseSelect.innerHTML = '<option value="">Select Course</option>' + 
                    allCourses.map(c => `<option value="${c._id}">${c.title}</option>`).join('');
            } catch (err) {
                console.error('Failed to fetch courses:', err);
                showToast('Error loading courses', 'error');
            }
        }

        courseSelect.addEventListener('change', () => {
            const courseId = courseSelect.value;
            console.log('[Attendance] Course selected:', courseId);
            
            if (!courseId) {
                batchSelect.innerHTML = '<option value="">Select Batch</option>';
                batchSelect.disabled = true;
                return;
            }

            const course = allCourses.find(c => String(c._id) === String(courseId));
            console.log('[Attendance] Found course object:', course);

            if (course && Array.isArray(course.batches) && course.batches.length > 0) {
                console.log('[Attendance] Populating batches:', course.batches);
                batchSelect.innerHTML = '<option value="">Select Batch</option>' + 
                    course.batches.map(b => `<option value="${b._id}">${b.name}</option>`).join('');
                batchSelect.disabled = false;
            } else {
                console.warn('[Attendance] No batches found for course or batches array is empty.');
                batchSelect.innerHTML = '<option value="">No Batches Found</option>';
                batchSelect.disabled = true;
            }
        });

        async function loadStudents() {
            const classId = classSelect.value;
            const courseId = courseSelect.value;
            const batchId = batchSelect.value;
            const date = attendanceDate.value;

            if (activeMode === 'class' && !classId) return;
            if (activeMode === 'batch' && (!courseId || !batchId)) return;

            studentTableBody.innerHTML = '<tr><td colspan="3" class="px-6 py-20 text-center"><div class="animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent mx-auto"></div></td></tr>';

            try {
                let query = `date=${date}`;
                if (activeMode === 'class') query += `&classId=${classId}`;
                else query += `&courseId=${courseId}&batchId=${batchId}`;

                const response = await fetch(`/api/teacher/attendance?${query}`);
                if (response.ok) {
                    const { students, records } = await response.json();
                    renderStudents(students, records);
                    saveAttendanceBtn.classList.remove('hidden');
                } else {
                    const err = await response.json();
                    showToast(err.message || 'Failed to load students', 'error');
                }
            } catch (err) {
                showToast('Failed to load students', 'error');
            }
        }

        function renderStudents(students, records) {
            if (!students || !students.length) {
                studentTableBody.innerHTML = '<tr><td colspan="3" class="px-6 py-10 text-center text-gray-500">No students found for this selection.</td></tr>';
                saveAttendanceBtn.classList.add('hidden');
                return;
            }

            studentTableBody.innerHTML = students.map(student => {
                const record = records.find(r => String(r.student._id || r.student) === String(student._id));
                const status = record ? record.status : 'present';

                return `
                    <tr data-student-id="${student._id}" class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 text-xs font-black text-gray-400 uppercase tracking-tighter">
                            ${student._id.slice(-8)}
                        </td>
                        <td class="px-6 py-4">
                            <div class="font-bold text-gray-900">${student.name}</div>
                            <div class="text-[10px] text-gray-400">${student.email}</div>
                        </td>
                        <td class="px-6 py-4">
                            <select class="status-select bg-white border border-gray-200 rounded-lg px-3 py-1.5 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                                <option value="present" ${status === 'present' ? 'selected' : ''}>Present</option>
                                <option value="absent" ${status === 'absent' ? 'selected' : ''} class="text-red-600">Absent</option>
                                <option value="late" ${status === 'late' ? 'selected' : ''} class="text-orange-600">Late</option>
                                <option value="excused" ${status === 'excused' ? 'selected' : ''} class="text-blue-600">Excused</option>
                            </select>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function saveAttendance() {
            const classId = classSelect.value;
            const courseId = courseSelect.value;
            const date = attendanceDate.value;
            const rows = studentTableBody.querySelectorAll('tr[data-student-id]');
            
            const attendanceData = Array.from(rows).map(row => ({
                studentId: row.dataset.studentId,
                status: row.querySelector('.status-select').value
            }));

            saveAttendanceBtn.disabled = true;
            saveAttendanceBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Saving...';

            try {
                const response = await fetch('/api/teacher/attendance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        ...(activeMode === 'class' ? { classId } : { courseId }), 
                        attendanceData, 
                        date 
                    })
                });

                if (response.ok) {
                    showToast('Attendance recorded successfully');
                } else {
                    const err = await response.json();
                    showToast(err.message || 'Failed to save', 'error');
                }
            } catch (err) {
                showToast('An error occurred', 'error');
            } finally {
                saveAttendanceBtn.disabled = false;
                saveAttendanceBtn.innerHTML = 'Save Attendance';
            }
        }

        /**
         * EVENT LISTENERS
         */
        classSelect.addEventListener('change', loadStudents);
        batchSelect.addEventListener('change', loadStudents);
        attendanceDate.addEventListener('change', loadStudents);
        saveAttendanceBtn.addEventListener('click', saveAttendance);

        /**
         * INITIALIZATION
         */
        async function init() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                currentUser = user;

                if (window.initSocket) window.initSocket(user);
                
                customElements.whenDefined('ui-navbar').then(() => {
                    const navbar = document.querySelector('ui-navbar');
                    if (navbar && navbar.renderLinks) {
                        navbar.renderLinks(user);
                    }
                });

                await fetchClasses();
            } catch (err) {
                console.error('Failed to fetch profile:', err);
                window.location.href = '/api/auth/login';
            }
        }

        init();
    </script>
</body>
</html>
