<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Management - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.3" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Attendance Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Class Attendance</h2>
                <p class="text-gray-500 mt-2">Mark and manage student attendance for your classes.</p>
            </div>
            <div class="flex space-x-4">
<select id="classSelect" class="bg-white border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" title="Select a class">
    <option value="">Select Class</option>
    <!-- Classes will be loaded here -->
</select>
<input type="date" id="attendanceDate" class="bg-white border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Select a date">
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-6">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Student ID</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Name</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Status</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody" class="divide-y divide-gray-200">
                    <tr>
                        <td colspan="3" class="px-6 py-10 text-center text-gray-500">Please select a class to load students.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="flex justify-end">
            <button id="saveAttendanceBtn" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-lg hidden">
                Save Attendance
            </button>
        </div>
    </main>

    <script type="module">
        import { showToast } from '/components/ui-components.js?v=1.3';

        const classSelect = document.getElementById('classSelect');
        const attendanceDate = document.getElementById('attendanceDate');
        const studentTableBody = document.getElementById('studentTableBody');
        const saveAttendanceBtn = document.getElementById('saveAttendanceBtn');

        // Set default date to today
        attendanceDate.value = new Date().toISOString().split('T')[0];

        async function fetchClasses() {
            try {
                const response = await fetch('/api/teacher/stats'); // We can use stats to get class count, but we need actual classes.
                // For now, let's assume we have a dedicated endpoint or we fetch from teacher stats if expanded.
                // Given the current controller, we might need a getClasses endpoint.
                // Let's use the attendance endpoint which might return classes if no classId is provided, or a separate call.
                
                // Let's assume we have /api/teacher/classes (I should have added this to the controller)
                // For this demo, I'll add placeholder logic or fetch from a likely endpoint.
                const res = await fetch('/api/teacher/results'); // Results usually returns courses/classes
                const data = await res.json();
                // This is a placeholder since I haven't implemented getClasses yet.
            } catch (err) {
                console.error('Failed to fetch classes:', err);
            }
        }

        async function loadStudents() {
            const classId = classSelect.value;
            const date = attendanceDate.value;
            if (!classId) return;

            studentTableBody.innerHTML = '<tr><td colspan="3" class="px-6 py-10 text-center text-gray-500">Loading students...</td></tr>';

            try {
                const response = await fetch(`/api/teacher/attendance?classId=${classId}&date=${date}`);
                if (response.ok) {
                    const { students, records } = await response.json();
                    renderStudents(students, records);
                    saveAttendanceBtn.classList.remove('hidden');
                }
            } catch (err) {
                showToast('Failed to load students', 'error');
            }
        }

        function renderStudents(students, records) {
            if (!students.length) {
                studentTableBody.innerHTML = '<tr><td colspan="3" class="px-6 py-10 text-center text-gray-500">No students found in this class.</td></tr>';
                return;
            }

            studentTableBody.innerHTML = students.map(student => {
                const record = records.find(r => r.student === student._id);
                const status = record ? record.status : 'present';

                return `
                    <tr data-student-id="${student._id}">
                        <td class="px-6 py-4 text-sm text-gray-600">${student._id.slice(-6)}</td>
                        <td class="px-6 py-4 font-medium text-gray-900">${student.name}</td>
                        <td class="px-6 py-4">
                            <select class="status-select bg-gray-50 border border-gray-200 rounded px-3 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="present" ${status === 'present' ? 'selected' : ''}>Present</option>
                                <option value="absent" ${status === 'absent' ? 'selected' : ''}>Absent</option>
                                <option value="late" ${status === 'late' ? 'selected' : ''}>Late</option>
                                <option value="excused" ${status === 'excused' ? 'selected' : ''}>Excused</option>
                            </select>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function saveAttendance() {
            const classId = classSelect.value;
            const date = attendanceDate.value;
            const rows = studentTableBody.querySelectorAll('tr');
            const attendanceData = Array.from(rows).map(row => ({
                studentId: row.dataset.studentId,
                status: row.querySelector('.status-select').value
            }));

            try {
                const response = await fetch('/api/teacher/attendance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ classId, attendanceData, date })
                });

                if (response.ok) {
                    showToast('Attendance saved successfully');
                } else {
                    showToast('Failed to save attendance', 'error');
                }
            } catch (err) {
                showToast('An error occurred', 'error');
            }
        }

        classSelect.addEventListener('change', loadStudents);
        attendanceDate.addEventListener('change', loadStudents);
        saveAttendanceBtn.addEventListener('click', saveAttendance);

        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (window.initSocket) window.initSocket(user);
                if (user.role !== 'teacher' && user.role !== 'admin') {
                    window.location.href = '/';
                    return;
                }
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) {
                    navbar.renderLinks(user.role);
                }
                
                // For demo purposes, we'll manually add some class options if API isn't ready
                // classSelect.innerHTML += '<option value="some-id">Demo Class 10-A</option>';
            } catch (err) {
                console.error('Failed to fetch profile:', err);
                window.location.href = '/api/auth/login';
            }
        }

        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });

        fetchProfile();
    </script>
</body>
</html>
