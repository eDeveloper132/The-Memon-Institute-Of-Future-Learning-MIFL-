<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Teacher Dashboard"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div id="welcomeMessage" class="mb-10">
            <h2 class="text-4xl font-bold text-gray-900">Hello, <span id="displayFirstName">Teacher</span>!</h2>
            <p class="text-gray-500 mt-2">Here's an overview of your academic activities.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <ui-card id="classesCard" title="Today's Classes" value="..." color="blue"></ui-card>
            <ui-card id="gradingCard" title="Pending Grading" value="..." color="orange"></ui-card>
            <ui-card id="studentsCard" title="Total Students" value="..." color="green"></ui-card>
            <ui-card id="feedbackCard" title="Avg. Feedback" value="..." color="purple"></ui-card>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Recent Activity -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-xl font-bold text-gray-900 mb-4">Upcoming Schedule</h3>
                <div id="scheduleList" class="space-y-4">
                    <p class="text-gray-500 italic">No classes scheduled for today.</p>
                </div>
            </div>

            <!-- Quick Links -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col h-full">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-gray-900">Recent Notifications</h3>
                    <button id="markAllReadDash" class="text-xs text-blue-600 hover:underline font-bold">Clear All</button>
                </div>
                <div id="notificationsList" class="space-y-4 overflow-y-auto flex-1 max-h-[300px] pr-2 custom-scrollbar">
                    <div class="flex flex-col items-center justify-center py-10 text-gray-300 italic">
                        <i class="fa-solid fa-bell fa-bounce mb-2"></i>
                        <p class="text-xs text-gray-400">Loading alerts...</p>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 lg:col-span-2">
                <h3 class="text-xl font-bold text-gray-900 mb-4">Quick Actions</h3>
                <div class="grid grid-cols-3 gap-4">
                    <a href="/protected/teacher/attendance.html" class="p-4 bg-gray-50 rounded-lg hover:bg-blue-50 transition group text-center">
                        <i class="fa-solid fa-clipboard-user text-blue-500 text-2xl mb-2"></i>
                        <p class="font-bold text-gray-700 group-hover:text-blue-600 text-sm">Mark Attendance</p>
                    </a>
                    <a href="/protected/teacher/assignments.html" class="p-4 bg-gray-50 rounded-lg hover:bg-blue-50 transition group text-center">
                        <i class="fa-solid fa-file-signature text-orange-500 text-2xl mb-2"></i>
                        <p class="font-bold text-gray-700 group-hover:text-blue-600 text-sm">Post Assignment</p>
                    </a>
                    <a href="/protected/messages.html" class="p-4 bg-gray-50 rounded-lg hover:bg-blue-50 transition group text-center">
                        <i class="fa-solid fa-comments text-indigo-500 text-2xl mb-2"></i>
                        <p class="font-bold text-gray-700 group-hover:text-blue-600 text-sm">Messages</p>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { showToast } from '/components/ui-components.js';

        async function fetchStats() {
            try {
                const response = await fetch('/api/teacher/stats');
                if (response.ok) {
                    const stats = await response.json();
                    
                    // Helper to update card value
                    const updateCard = (id, val) => {
                        const card = document.getElementById(id);
                        if (card) {
                            card.setAttribute('value', val);
                        }
                    };

                    updateCard('classesCard', stats.classesCount);
                    updateCard('gradingCard', stats.pendingGrading);
                    updateCard('studentsCard', stats.totalStudents);
                    updateCard('feedbackCard', "2"); // Placeholder
                }
            } catch (err) {
                console.error('Failed to fetch stats:', err);
            }
        }

        async function fetchNotifications() {
            const list = document.getElementById('notificationsList');
            try {
                const response = await fetch('/api/notifications?status=unread');
                if (!response.ok) throw new Error('Failed to fetch');
                const { notifications } = await response.json();

                if (notifications.length === 0) {
                    list.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-12 text-gray-300 border-2 border-dashed border-gray-50 rounded-2xl">
                            <i class="fa-solid fa-check-circle text-2xl mb-2 text-green-200"></i>
                            <p class="text-xs font-bold uppercase tracking-widest text-gray-400">All caught up</p>
                        </div>
                    `;
                    return;
                }

                const typeStyles = {
                    SYSTEM: { bg: 'bg-blue-50', border: 'border-blue-400', icon: 'fa-info-circle', iconColor: 'text-blue-600' },
                    FEE: { bg: 'bg-yellow-50', border: 'border-yellow-400', icon: 'fa-triangle-exclamation', iconColor: 'text-yellow-600' },
                    ENROLLMENT: { bg: 'bg-green-50', border: 'border-green-400', icon: 'fa-user-plus', iconColor: 'text-green-600' },
                    ACADEMIC: { bg: 'bg-indigo-50', border: 'border-indigo-400', icon: 'fa-book', iconColor: 'text-indigo-600' },
                    MESSAGE: { bg: 'bg-gray-50', border: 'border-gray-400', icon: 'fa-comment', iconColor: 'text-gray-600' }
                };

                list.innerHTML = notifications.map(n => {
                    const style = typeStyles[n.type] || typeStyles.SYSTEM;
                    return `
                        <div class="flex items-start p-3 ${style.bg} rounded-xl border-l-4 ${style.border} group relative hover:shadow-sm transition-all">
                            <i class="fa-solid ${style.icon} ${style.iconColor} mt-1 mr-3 text-sm"></i>
                            <div class="flex-1 pr-6">
                                <h4 class="text-xs font-bold text-gray-800 leading-tight">${n.title}</h4>
                                <p class="text-[10px] text-gray-600 mt-0.5 line-clamp-2">${n.content}</p>
                                <p class="text-[8px] text-gray-400 font-bold mt-1 uppercase">${new Date(n.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                            </div>
                            <button data-id="${n._id}" class="mark-read-btn absolute top-2 right-2 text-gray-300 hover:text-blue-600 opacity-0 group-hover:opacity-100 transition">
                                <i class="fa-solid fa-circle-check"></i>
                            </button>
                        </div>
                    `;
                }).join('');

                list.querySelectorAll('.mark-read-btn').forEach(btn => {
                    btn.onclick = async () => {
                        try {
                            const res = await fetch(`/api/notifications/${btn.dataset.id}/read`, { method: 'PATCH' });
                            if (res.ok) fetchNotifications();
                        } catch (err) { console.error(err); }
                    };
                });
            } catch (err) {
                list.innerHTML = '<p class="text-center text-red-500 py-6 text-[10px]">Error loading alerts</p>';
            }
        }

        async function fetchSchedule() {
            try {
                const res = await fetch('/api/teacher/classes');
                if (res.ok) {
                    const { classes } = await res.json();
                    const list = document.getElementById('scheduleList');
                    
                    if (classes.length === 0) {
                        list.innerHTML = '<p class="text-gray-500 italic">No classes assigned yet.</p>';
                        return;
                    }

                    list.innerHTML = classes.map(c => `
                        <div class="p-4 bg-gray-50 rounded-xl border border-gray-100 hover:border-blue-200 transition group flex justify-between items-center">
                            <div>
                                <p class="font-bold text-gray-800 group-hover:text-blue-600">${c.name} - ${c.section}</p>
                                <p class="text-xs text-gray-500 font-medium">Grade ${c.gradeLevel} • ${c.students.length} Students</p>
                            </div>
                            <a href="/protected/teacher/attendance.html?classId=${c._id}" class="text-xs font-bold text-blue-600 hover:underline">Mark Attendance</a>
                        </div>
                    `).join('');
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                
                if (window.initSocket) {
                    await window.initSocket(user);
                    document.addEventListener('newNotification', () => fetchNotifications());
                }

                if (user.role !== 'teacher' && user.role !== 'admin') { window.location.href = '/'; return; }
                
                document.getElementById('displayFirstName').textContent = user.name.split(' ')[0];
                
                customElements.whenDefined('ui-navbar').then(() => {
                    const navbar = document.querySelector('ui-navbar');
                    if (navbar && navbar.renderLinks) {
                        navbar.renderLinks(user);
                        navbar.userData = user;
                    }
                });
                
                fetchStats();
                fetchSchedule();
                fetchNotifications();
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }

        document.getElementById('markAllReadDash').onclick = async () => {
            try {
                const res = await fetch('/api/notifications/read-all', { method: 'PATCH' });
                if (res.ok) fetchNotifications();
            } catch (err) { console.error(err); }
        };

        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });

        fetchProfile();
    </script>
</body>
</html>
