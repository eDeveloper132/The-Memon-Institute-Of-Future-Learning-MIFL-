<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Management - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Result Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Exam Results</h2>
                <p class="text-gray-500 mt-2">Record and publish student marks and report cards.</p>
            </div>
            <div class="flex gap-4">
                <button id="openAddExamModalBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition flex items-center shadow-md">
                    <i class="fa-solid fa-plus mr-2"></i> Add Exam
                </button>
                <button class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700 transition flex items-center shadow-md">
                    <i class="fa-solid fa-file-export mr-2"></i> Export Reports
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Exam Title</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Course</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Date</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Max Marks</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Actions</th>
                    </tr>
                </thead>
                <tbody id="resultsTableBody" class="divide-y divide-gray-200">
                    <tr>
                        <td colspan="5" class="px-6 py-10 text-center text-gray-500">Loading exams...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Grading Modal -->
    <div id="gradingModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-[2rem] w-full max-w-4xl shadow-2xl overflow-hidden transform scale-95 transition-all duration-300 flex flex-col max-h-[90vh]">
            <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <div>
                    <h3 id="modalExamTitle" class="text-xl font-black text-gray-900 tracking-tight">Manage Marks</h3>
                    <p id="modalExamCourse" class="text-[10px] text-blue-500 font-black uppercase tracking-widest mt-0.5">Course Name</p>
                </div>
                <button id="closeModalBtn" class="w-10 h-10 rounded-full hover:bg-red-50 hover:text-red-500 text-gray-400 transition flex items-center justify-center text-2xl font-bold">&times;</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-8">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-4 py-3 text-xs font-semibold text-gray-700 uppercase">Student Name</th>
                            <th class="px-4 py-3 text-xs font-semibold text-gray-700 uppercase">Email</th>
                            <th class="px-4 py-3 text-xs font-semibold text-gray-700 uppercase w-32">Marks</th>
                            <th class="px-4 py-3 text-xs font-semibold text-gray-700 uppercase">Remarks</th>
                            <th class="px-4 py-3 text-xs font-semibold text-gray-700 uppercase w-24">Action</th>
                        </tr>
                    </thead>
                    <tbody id="gradingTableBody" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="5" class="px-6 py-10 text-center text-gray-500">Loading students...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Exam Modal -->
    <div id="addExamModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-[2rem] w-full max-w-md shadow-2xl overflow-hidden transform scale-95 transition-all duration-300 flex flex-col max-h-[90vh]">
            <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="text-xl font-black text-gray-900 tracking-tight">Create New Exam</h3>
                <button id="closeAddExamModalBtn" class="w-10 h-10 rounded-full hover:bg-red-50 hover:text-red-500 text-gray-400 transition flex items-center justify-center text-2xl font-bold">&times;</button>
            </div>
            
            <div class="p-8 overflow-y-auto">
                <form id="addExamForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Exam Title</label>
                        <input type="text" id="examTitle" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="e.g. Midterm Physics">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Course</label>
                        <select id="examCourse" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Loading courses...</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
                            <select id="examType" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                                <option value="midterm">Midterm</option>
                                <option value="final">Final</option>
                                <option value="quiz">Quiz</option>
                                <option value="assignment">Assignment</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                            <input type="date" id="examDate" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Max Marks</label>
                            <input type="number" id="examMaxMarks" min="1" value="100" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Weightage (%)</label>
                            <input type="number" id="examWeightage" min="1" max="100" value="20" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>
                    <div class="pt-4">
                        <button type="submit" id="submitExamBtn" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-blue-700 transition flex justify-center items-center">
                            Create Exam
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { showToast } from '/components/ui-components.js?v=1.6';

        const resultsTableBody = document.getElementById('resultsTableBody');
        const gradingModal = document.getElementById('gradingModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const gradingTableBody = document.getElementById('gradingTableBody');
        const modalExamTitle = document.getElementById('modalExamTitle');
        const modalExamCourse = document.getElementById('modalExamCourse');
        
        let currentExamId = null;
        let currentMaxMarks = 100;

        async function fetchExams() {
            try {
                const response = await fetch('/api/teacher/results');
                if (response.ok) {
                    const { exams } = await response.json();
                    renderExams(exams);
                }
            } catch (err) {
                resultsTableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-red-500">Failed to load exams.</td></tr>';
            }
        }

        function renderExams(exams) {
            if (!exams.length) {
                resultsTableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-gray-500">No exams found.</td></tr>';
                return;
            }

            resultsTableBody.innerHTML = exams.map(exam => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4 font-medium text-gray-900">${exam.title}</td>
                    <td class="px-6 py-4 text-gray-600">${exam.course?.title || 'Course'}</td>
                    <td class="px-6 py-4 text-gray-600">${new Date(exam.date).toLocaleDateString()}</td>
                    <td class="px-6 py-4 text-gray-600">${exam.maxMarks}</td>
                    <td class="px-6 py-4 flex gap-4">
                        <button class="text-blue-600 hover:underline font-bold" data-action="manage" data-id="${exam._id}" data-max="${exam.maxMarks}">Manage Marks</button>
                    </td>
                </tr>
            `).join('');
        }

        // Event Delegation for Exam Actions
        resultsTableBody.onclick = (e) => {
            const btn = e.target.closest('button[data-action="manage"]');
            if (btn) {
                currentMaxMarks = parseInt(btn.dataset.max) || 100;
                window.manageMarks(btn.dataset.id);
            }
        };

        window.manageMarks = async (examId) => {
            currentExamId = examId;
            gradingModal.classList.remove('hidden');
            gradingModal.classList.add('flex');
            setTimeout(() => {
                gradingModal.classList.remove('opacity-0');
                gradingModal.querySelector('div').classList.remove('scale-95');
            }, 10);

            gradingTableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-gray-500"><i class="fa-solid fa-circle-notch fa-spin"></i> Loading...</td></tr>';

            try {
                const res = await fetch(`/api/teacher/exams/${examId}/students`);
                if (!res.ok) throw new Error('Failed to load students');
                
                const { students, grades, exam } = await res.json();
                
                modalExamTitle.textContent = exam.title;
                modalExamCourse.textContent = exam.course?.title || 'Course';

                if (!students.length) {
                    gradingTableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-gray-500">No students enrolled in this course.</td></tr>';
                    return;
                }

                gradingTableBody.innerHTML = students.map(student => {
                    const grade = grades.find(g => String(g.student) === String(student._id));
                    const marks = grade ? grade.obtainedMarks : '';
                    const feedback = grade ? (grade.feedback || '') : '';

                    return `
                        <tr class="hover:bg-gray-50 transition" data-student-id="${student._id}">
                            <td class="px-4 py-3 font-bold text-gray-900">${student.name}</td>
                            <td class="px-4 py-3 text-xs text-gray-500">${student.email}</td>
                            <td class="px-4 py-3">
                                <input type="number" min="0" max="${currentMaxMarks}" value="${marks}" class="w-20 px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-blue-500 focus:border-blue-500 grade-input" placeholder="0-${currentMaxMarks}">
                            </td>
                            <td class="px-4 py-3">
                                <input type="text" value="${feedback}" class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-blue-500 focus:border-blue-500 feedback-input" placeholder="Remarks...">
                            </td>
                            <td class="px-4 py-3">
                                <button class="bg-blue-600 text-white px-3 py-1.5 rounded text-xs font-bold hover:bg-blue-700 transition save-grade-btn">Save</button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (err) {
                gradingTableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-red-500">Error loading data.</td></tr>';
            }
        };

        gradingTableBody.onclick = async (e) => {
            const btn = e.target.closest('.save-grade-btn');
            if (!btn) return;

            const row = btn.closest('tr');
            const studentId = row.dataset.studentId;
            const marksInput = row.querySelector('.grade-input');
            const feedbackInput = row.querySelector('.feedback-input');
            
            const obtainedMarks = parseFloat(marksInput.value);
            const remarks = feedbackInput.value;

            if (isNaN(obtainedMarks) || obtainedMarks < 0 || obtainedMarks > currentMaxMarks) {
                showToast(`Marks must be between 0 and ${currentMaxMarks}`, 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            try {
                const res = await fetch('/api/teacher/grades', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        examId: currentExamId,
                        studentId,
                        obtainedMarks,
                        remarks
                    })
                });

                if (res.ok) {
                    showToast('Grade saved successfully');
                    btn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                    btn.classList.add('bg-green-600', 'hover:bg-green-700');
                    setTimeout(() => {
                        btn.classList.remove('bg-green-600', 'hover:bg-green-700');
                        btn.classList.add('bg-blue-600', 'hover:bg-blue-700');
                    }, 2000);
                } else {
                    const err = await res.json();
                    showToast(err.message || 'Failed to save grade', 'error');
                }
            } catch (err) {
                showToast('Network error', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Save';
            }
        };

        const hideModal = () => {
            gradingModal.classList.add('opacity-0');
            gradingModal.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                gradingModal.classList.add('hidden');
                gradingModal.classList.remove('flex');
            }, 300);
        };

        closeModalBtn.onclick = hideModal;
        gradingModal.onclick = (e) => {
            if (e.target === gradingModal) hideModal();
        };

        // Add Exam Modal Logic
        const addExamModal = document.getElementById('addExamModal');
        const openAddExamModalBtn = document.getElementById('openAddExamModalBtn');
        const closeAddExamModalBtn = document.getElementById('closeAddExamModalBtn');
        const addExamForm = document.getElementById('addExamForm');
        const examCourseSelect = document.getElementById('examCourse');
        const submitExamBtn = document.getElementById('submitExamBtn');

        const hideAddExamModal = () => {
            addExamModal.classList.add('opacity-0');
            addExamModal.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                addExamModal.classList.add('hidden');
                addExamModal.classList.remove('flex');
                addExamForm.reset();
            }, 300);
        };

        openAddExamModalBtn.onclick = async () => {
            addExamModal.classList.remove('hidden');
            addExamModal.classList.add('flex');
            setTimeout(() => {
                addExamModal.classList.remove('opacity-0');
                addExamModal.querySelector('div').classList.remove('scale-95');
            }, 10);

            // Fetch courses if not already loaded
            if (examCourseSelect.options.length <= 1) {
                try {
                    const res = await fetch('/api/teacher/courses');
                    if (res.ok) {
                        const { courses } = await res.json();
                        examCourseSelect.innerHTML = '<option value="">Select Course</option>' + 
                            courses.map(c => `<option value="${c._id}">${c.title}</option>`).join('');
                    }
                } catch (err) {
                    showToast('Failed to load courses', 'error');
                }
            }
        };

        closeAddExamModalBtn.onclick = hideAddExamModal;
        addExamModal.onclick = (e) => {
            if (e.target === addExamModal) hideAddExamModal();
        };

        addExamForm.onsubmit = async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('examTitle').value;
            const course = document.getElementById('examCourse').value;
            const type = document.getElementById('examType').value;
            const date = document.getElementById('examDate').value;
            const maxMarks = parseInt(document.getElementById('examMaxMarks').value);
            const weightage = parseInt(document.getElementById('examWeightage').value);

            submitExamBtn.disabled = true;
            submitExamBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Creating...';

            try {
                const res = await fetch('/api/teacher/exams', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, course, type, date, maxMarks, weightage })
                });

                if (res.ok) {
                    showToast('Exam created successfully', 'success');
                    hideAddExamModal();
                    await fetchExams(); // Reload the table
                } else {
                    const err = await res.json();
                    showToast(err.message || 'Failed to create exam', 'error');
                }
            } catch (err) {
                showToast('Network error', 'error');
            } finally {
                submitExamBtn.disabled = false;
                submitExamBtn.innerHTML = 'Create Exam';
            }
        };

        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (window.initSocket) window.initSocket(user);
                if (user.role !== 'teacher' && user.role !== 'admin') { window.location.href = '/'; return; }

                customElements.whenDefined('ui-navbar').then(() => {
                    const navbar = document.querySelector('ui-navbar');
                    if (navbar && navbar.renderLinks) {
                        navbar.renderLinks(user);
                    }
                });

                await fetchExams();
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });
        fetchProfile();
    </script>
</body>
</html>
