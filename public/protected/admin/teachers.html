<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Management - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Teacher Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Faculty Management</h2>
                <p class="text-gray-500 mt-2">Oversee and manage teaching staff and designations.</p>
            </div>
            <button onclick="document.getElementById('addTeacherModal').classList.remove('hidden')" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-green-700 transition flex items-center shadow-lg">
                <i class="fa-solid fa-chalkboard-user mr-2"></i> Register Teacher
            </button>
        </div>

        <!-- Teacher Cards Grid -->
        <div id="teacherGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20">
                <ui-spinner text="Fetching faculty list..."></ui-spinner>
            </div>
        </div>
    </main>

    <!-- Add Teacher Modal -->
    <div id="addTeacherModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden">
            <div class="p-6 bg-green-600 text-white flex justify-between items-center">
                <h3 class="text-xl font-bold">Register New Faculty</h3>
                <button onclick="document.getElementById('addTeacherModal').classList.add('hidden')" class="hover:text-gray-200 text-2xl">&times;</button>
            </div>
            <form id="addTeacherForm" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Full Name</label>
                        <input type="text" name="name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Designation</label>
                        <input type="text" name="designation" placeholder="e.g. Senior Lecturer" class="w-full px-4 py-2 border rounded-lg outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Email Address</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Phone</label>
                        <input type="text" name="phoneNumber" required class="w-full px-4 py-2 border rounded-lg outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Staff ID</label>
                        <input type="text" name="staffId" placeholder="MFL-T-001" class="w-full px-4 py-2 border rounded-lg outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Address</label>
                    <textarea name="address" required class="w-full px-4 py-2 border rounded-lg outline-none h-20"></textarea>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition mt-4 shadow-lg">Onboard Faculty</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { showToast } from '/components/ui-components.js';

        const teacherGrid = document.getElementById('teacherGrid');
        const addForm = document.getElementById('addTeacherForm');

        async function fetchTeachers() {
            try {
                const res = await fetch('/api/admin/users?role=teacher');
                const data = await res.json();
                renderTeachers(data.users);
            } catch (err) {
                teacherGrid.innerHTML = '<div class="col-span-full text-center text-red-500">Failed to load teachers</div>';
            }
        }

        function renderTeachers(teachers) {
            if (!teachers.length) {
                teacherGrid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500">No teachers found. Click "Register Teacher" to add one.</div>';
                return;
            }

            teacherGrid.innerHTML = teachers.map(t => `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden group hover:shadow-md transition">
                    <div class="h-2 bg-green-500"></div>
                    <div class="p-6">
                        <div class="flex items-start justify-between mb-4">
                            <div class="w-16 h-16 rounded-2xl bg-green-100 text-green-600 flex items-center justify-center text-2xl font-bold">
                                ${t.name.split(' ').map(n => n[0]).join('')}
                            </div>
                            <div class="flex flex-col items-end">
                                <span class="px-2 py-1 rounded-md text-[10px] font-bold uppercase ${t.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} mb-2">
                                    ${t.status}
                                </span>
                                <span class="text-xs text-gray-400 font-mono">${t.staffId || 'NO-ID'}</span>
                            </div>
                        </div>
                        <h3 class="text-xl font-bold text-gray-900 truncate">${t.name}</h3>
                        <p class="text-green-600 text-sm font-semibold mb-4">${t.designation || 'Faculty Member'}</p>
                        
                        <div class="space-y-2 mb-6">
                            <div class="flex items-center text-sm text-gray-600">
                                <i class="fa-solid fa-envelope w-5 text-gray-400"></i>
                                <span class="truncate">${t.email}</span>
                            </div>
                            <div class="flex items-center text-sm text-gray-600">
                                <i class="fa-solid fa-phone w-5 text-gray-400"></i>
                                <span>${t.phoneNumber || 'N/A'}</span>
                            </div>
                        </div>

                        <div class="flex border-t border-gray-50 pt-4 gap-2">
                            <button class="flex-1 bg-gray-50 text-gray-700 py-2 rounded-lg font-bold text-sm hover:bg-gray-100 transition">View Details</button>
                            <button onclick="deleteTeacher('${t._id}')" class="w-10 h-10 bg-red-50 text-red-500 rounded-lg flex items-center justify-center hover:bg-red-500 hover:text-white transition">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        addForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(addForm);
            const data = Object.fromEntries(formData);
            data.role = 'teacher';

            try {
                const res = await fetch('/api/admin/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    showToast('Teacher onboarding complete');
                    document.getElementById('addTeacherModal').classList.add('hidden');
                    addForm.reset();
                    fetchTeachers();
                } else {
                    const err = await res.json();
                    showToast(err.message || 'Onboarding failed', 'error');
                }
            } catch (err) {
                showToast('An error occurred', 'error');
            }
        };

        window.deleteTeacher = async (id) => {
            if (confirm('Are you sure? This will remove the teacher from all assigned courses.')) {
                try {
                    const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        showToast('Teacher record removed');
                        fetchTeachers();
                    }
                } catch (err) {
                    showToast('Operation failed', 'error');
                }
            }
        };

        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                const { user } = await res.json();
                if (!res.ok || user.role !== 'admin') { window.location.href = '/'; return; }
                
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) navbar.renderLinks(user.role);
                
                fetchTeachers();
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }

        init();
    </script>
</body>
</html>
