<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Catalog - MIFL Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Course Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">System Course Catalog</h2>
                <p class="text-gray-500 mt-2">Manage the curriculum and subject offerings across all departments.</p>
            </div>
            <button class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition flex items-center shadow-lg">
                <i class="fa-solid fa-book-medical mr-2"></i> Add Course
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider">Course Code</th>
                        <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider">Title</th>
                        <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider">Department</th>
                        <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider">Credits</th>
                        <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="courseTableBody" class="divide-y divide-gray-100">
                    <tr>
                        <td colspan="5" class="p-10 text-center">
                            <ui-spinner text="Loading courses..."></ui-spinner>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        const tableBody = document.getElementById('courseTableBody');

        async function fetchCourses() {
            try {
                const res = await fetch('/api/admin/courses');
                const { courses } = await res.json();
                renderCourses(courses);
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-red-500">Failed to load course data</td></tr>';
            }
        }

        function renderCourses(courses) {
            if (!courses.length) {
                tableBody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-500">No courses defined in the system.</td></tr>';
                return;
            }

            tableBody.innerHTML = courses.map(c => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-8 py-5 font-mono font-bold text-blue-600 uppercase">${c.code}</td>
                    <td class="px-8 py-5 font-bold text-gray-900">${c.title}</td>
                    <td class="px-8 py-5 text-gray-500 font-medium">${c.department?.name || 'General'}</td>
                    <td class="px-8 py-5 font-bold text-gray-700">${c.credits || 3}</td>
                    <td class="px-8 py-5 text-right">
                        <button class="text-blue-600 hover:text-blue-800 mr-4"><i class="fa-solid fa-edit"></i></button>
                        <button class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                const { user } = await res.json();
                if (!res.ok || user.role !== 'admin') { window.location.href = '/'; return; }
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) navbar.renderLinks(user.role);
                fetchCourses();
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        init();
    </script>
</body>
</html>
