<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Catalog - MIFL Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Course Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">System Course Catalog</h2>
                <p class="text-gray-500 mt-2">Manage the curriculum and subject offerings across all departments.</p>
            </div>
            <button id="openCourseModal" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition flex items-center shadow-lg active:scale-95">
                <i class="fa-solid fa-book-medical mr-2"></i> Add Course
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider">Course Code</th>
                            <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider">Title</th>
                            <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider">Department</th>
                            <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider text-center">Credits</th>
                            <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="courseTableBody" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="5" class="p-20 text-center">
                                <ui-spinner text="Loading courses..."></ui-spinner>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Course Modal (Add/Edit) -->
    <div id="courseModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
            <div id="modalHeader" class="p-6 bg-blue-600 text-white flex justify-between items-center transition-colors">
                <h3 id="modalTitle" class="text-xl font-bold">Register New Course</h3>
                <button data-close-modal="courseModal" class="text-2xl leading-none">&times;</button>
            </div>
            <form id="courseForm" class="p-6 space-y-4">
                <input type="hidden" name="id">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1 font-black uppercase tracking-tight text-[10px]">Course Title</label>
                    <input type="text" name="title" placeholder="e.g. Advanced Physics" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1 font-black uppercase tracking-tight text-[10px]">Course Code</label>
                    <input type="text" name="code" placeholder="e.g. PHYS202" required class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1 font-black uppercase tracking-tight text-[10px]">Credits</label>
                        <input type="number" name="credits" value="3" required class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1 font-black uppercase tracking-tight text-[10px]">Department</label>
                        <select name="department" id="departmentSelect" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white text-sm">
                            <option value="">Select Dept</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1 font-black uppercase tracking-tight text-[10px]">Assigned Teacher</label>
                    <select name="teacher" id="teacherSelect" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white text-sm">
                        <option value="">Select Teacher</option>
                    </select>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 transition mt-4 shadow-md active:scale-95">Save Course</button>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
            <div class="p-6 bg-red-600 text-white text-center">
                <i class="fa-solid fa-triangle-exclamation text-4xl mb-2"></i>
                <h3 class="text-xl font-bold">Delete Course?</h3>
            </div>
            <div class="p-6 text-center">
                <p class="text-gray-500">Are you sure you want to remove <span id="deleteCourseTitle" class="font-bold text-gray-900"></span>? This action cannot be undone.</p>
                <div class="flex gap-3 mt-6">
                    <button data-close-modal="deleteModal" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition">Cancel</button>
                    <button id="confirmDeleteBtn" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold hover:bg-red-700 transition">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { showToast } from '/components/ui-components.js';

        const tableBody = document.getElementById('courseTableBody');
        const courseForm = document.getElementById('courseForm');
        const modal = document.getElementById('courseModal');
        const openBtn = document.getElementById('openCourseModal');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

        let allCourses = [];
        let courseToDeleteId = null;

        const openModal = (isEdit = false, course = null) => {
            const title = document.getElementById('modalTitle');
            const header = document.getElementById('modalHeader');
            const submitBtn = document.getElementById('submitBtn');

            courseForm.reset();
            courseForm.elements.id.value = '';

            if (isEdit && course) {
                title.textContent = 'Edit Course';
                header.classList.replace('bg-blue-600', 'bg-indigo-600');
                submitBtn.classList.replace('bg-blue-600', 'bg-indigo-600');
                submitBtn.textContent = 'Update Course';
                
                courseForm.elements.id.value = course._id;
                courseForm.elements.title.value = course.title || '';
                courseForm.elements.code.value = course.code || '';
                courseForm.elements.credits.value = course.credits || 3;
                courseForm.elements.department.value = course.department?._id || course.department || '';
                courseForm.elements.teacher.value = course.teacher?._id || course.teacher || '';
            } else {
                title.textContent = 'Register New Course';
                header.classList.replace('bg-indigo-600', 'bg-blue-600');
                submitBtn.classList.replace('bg-indigo-600', 'bg-blue-600');
                submitBtn.textContent = 'Save Course';
            }

            modal.classList.remove('hidden');
        };

        const closeModal = (id) => {
            document.getElementById(id).classList.add('hidden');
        };

        document.addEventListener('click', (e) => {
            if (e.target.closest('[data-close-modal]')) {
                closeModal(e.target.closest('[data-close-modal]').dataset.closeModal);
            }
            if (e.target === modal || e.target === document.getElementById('deleteModal')) {
                e.target.classList.add('hidden');
            }
        });

        openBtn.onclick = () => openModal(false);

        courseForm.onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(courseForm));
            const id = data.id;
            delete data.id;

            const url = id ? `/api/admin/courses/${id}` : '/api/admin/courses';
            const method = id ? 'PATCH' : 'POST';

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    showToast(id ? 'Course updated' : 'Course added');
                    closeModal('courseModal');
                    fetchCourses();
                } else {
                    const err = await res.json();
                    showToast(err.message || 'Operation failed', 'error');
                }
            } catch (err) { showToast('Server error', 'error'); }
        };

        async function fetchDepartments() {
            try {
                const res = await fetch('/api/admin/departments');
                const { departments } = await res.json();
                document.getElementById('departmentSelect').innerHTML = 
                    '<option value="">Select Dept</option>' + 
                    departments.map(d => `<option value="${d._id}">${d.name}</option>`).join('');
            } catch (err) {}
        }

        async function fetchTeachers() {
            try {
                const res = await fetch('/api/admin/users?role=teacher');
                const { users } = await res.json();
                document.getElementById('teacherSelect').innerHTML = 
                    '<option value="">Select Teacher</option>' + 
                    users.map(t => `<option value="${t._id}">${t.name}</option>`).join('');
            } catch (err) {}
        }

        async function fetchCourses() {
            try {
                const res = await fetch('/api/admin/courses');
                const data = await res.json();
                allCourses = data.courses || [];
                renderCourses(allCourses);
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-red-500 font-bold">Failed to load courses</td></tr>';
            }
        }

        function renderCourses(courses) {
            if (!courses.length) {
                tableBody.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-gray-400 font-medium italic">No courses available.</td></tr>';
                return;
            }

            tableBody.innerHTML = courses.map(c => `
                <tr class="hover:bg-gray-50 transition border-b border-gray-100 group">
                    <td class="px-8 py-5">
                        <span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-lg text-xs font-black uppercase tracking-widest border border-blue-100">
                            ${c.code}
                        </span>
                    </td>
                    <td class="px-8 py-5 font-bold text-gray-900">${c.title}</td>
                    <td class="px-8 py-5">
                        <div class="text-sm font-semibold text-gray-700">${c.department?.name || 'General'}</div>
                        <div class="text-[10px] text-gray-400 uppercase tracking-widest font-black">Department</div>
                    </td>
                    <td class="px-8 py-5 text-center">
                        <span class="text-sm font-black text-gray-700">${c.credits || 3}</span>
                    </td>
                    <td class="px-8 py-5 text-right">
                        <div class="flex justify-end gap-2">
                            <button data-action="edit" data-id="${c._id}" class="w-10 h-10 flex items-center justify-center text-blue-600 hover:bg-blue-600 hover:text-white rounded-xl transition-all border border-blue-100 shadow-sm active:scale-90">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>
                            <button data-action="delete" data-id="${c._id}" class="w-10 h-10 flex items-center justify-center text-red-400 hover:bg-red-600 hover:text-white rounded-xl transition-all border border-red-100 shadow-sm active:scale-90">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        tableBody.onclick = (e) => {
            const btn = e.target.closest('button[data-action]');
            if (!btn) return;

            const id = btn.dataset.id;
            const action = btn.dataset.action;
            const course = allCourses.find(c => c._id === id);

            if (action === 'edit') openModal(true, course);
            if (action === 'delete') {
                courseToDeleteId = id;
                document.getElementById('deleteCourseTitle').textContent = course?.title || 'this course';
                document.getElementById('deleteModal').classList.remove('hidden');
            }
        };

        confirmDeleteBtn.onclick = async () => {
            if (!courseToDeleteId) return;
            try {
                const res = await fetch(`/api/admin/courses/${courseToDeleteId}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('Course deleted');
                    closeModal('deleteModal');
                    fetchCourses();
                } else {
                    const err = await res.json();
                    showToast(err.message || 'Delete failed', 'error');
                }
            } catch (err) { showToast('Server error', 'error'); }
        };

        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await res.json();
                if (user.role !== 'admin') { window.location.href = '/'; return; }
                if (window.initSocket) window.initSocket(user);
                
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) navbar.renderLinks(user.role);
                
                await Promise.all([fetchDepartments(), fetchTeachers(), fetchCourses()]);
            } catch (err) { window.location.href = '/api/auth/login'; }
        }
        init();
    </script>
</body>
</html>
