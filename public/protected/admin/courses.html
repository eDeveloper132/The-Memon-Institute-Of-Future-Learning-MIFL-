<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Catalog - MIFL Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Course Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">System Course Catalog</h2>
                <p class="text-gray-500 mt-2">Manage the curriculum and subject offerings across all departments.</p>
            </div>
            <button id="openCourseModal" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition flex items-center shadow-lg">
                <i class="fa-solid fa-book-medical mr-2"></i> Add Course
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider">Course Code</th>
                        <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider">Title</th>
                        <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider">Department</th>
                        <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider">Credits</th>
                        <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="courseTableBody" class="divide-y divide-gray-100">
                    <tr>
                        <td colspan="5" class="p-10 text-center">
                            <ui-spinner text="Loading courses..."></ui-spinner>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Add Course Modal -->
    <div id="addCourseModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
            <div class="p-6 bg-blue-600 text-white flex justify-between items-center">
                <h3 class="text-xl font-bold">Register New Course</h3>
                <button id="closeCourseModal" class="text-2xl">&times;</button>
            </div>
            <form id="addCourseForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Course Title</label>
                    <input type="text" name="title" placeholder="e.g. Advanced Physics" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Course Code</label>
                    <input type="text" name="code" placeholder="e.g. PHYS202" required class="w-full px-4 py-2 border rounded-lg outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Credits</label>
                        <input type="number" name="credits" value="3" required class="w-full px-4 py-2 border rounded-lg outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Department ID</label>
                        <input type="text" name="department" placeholder="Dept ID" class="w-full px-4 py-2 border rounded-lg outline-none">
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition mt-4">Save Course</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { showToast } from '/components/ui-components.js';

        const tableBody = document.getElementById('courseTableBody');
        const addForm = document.getElementById('addCourseForm');
        const modal = document.getElementById('addCourseModal');
        const openBtn = document.getElementById('openCourseModal');
        const closeBtn = document.getElementById('closeCourseModal');

        if (openBtn) openBtn.onclick = () => modal.classList.remove('hidden');
        if (closeBtn) closeBtn.onclick = () => modal.classList.add('hidden');
        window.onclick = (e) => { if (e.target === modal) modal.classList.add('hidden'); };

        addForm.onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(addForm));
            try {
                const res = await fetch('/api/admin/courses', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    showToast('Course added successfully');
                    modal.classList.add('hidden');
                    addForm.reset();
                    fetchCourses();
                } else {
                    showToast('Failed to add course', 'error');
                }
            } catch (err) { showToast('An error occurred', 'error'); }
        };

        async function fetchCourses() {
            try {
                const res = await fetch('/api/admin/courses');
                const { courses } = await res.json();
                renderCourses(courses);
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-red-500">Failed to load course data</td></tr>';
            }
        }

        function renderCourses(courses) {
            if (!courses.length) {
                tableBody.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-500">No courses defined in the system.</td></tr>';
                return;
            }

            tableBody.innerHTML = courses.map(c => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-8 py-5 font-mono font-bold text-blue-600 uppercase">${c.code}</td>
                    <td class="px-8 py-5 font-bold text-gray-900">${c.title}</td>
                    <td class="px-8 py-5 text-gray-500 font-medium">${c.department?.name || 'General'}</td>
                    <td class="px-8 py-5 font-bold text-gray-700">${c.credits || 3}</td>
                    <td class="px-8 py-5 text-right">
                        <button class="text-blue-600 hover:text-blue-800 mr-4"><i class="fa-solid fa-edit"></i></button>
                        <button class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                const { user } = await res.json();
                if (!res.ok || user.role !== 'admin') { window.location.href = '/'; return; }
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) navbar.renderLinks(user.role);
                fetchCourses();
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        init();
    </script>
</body>
</html>
