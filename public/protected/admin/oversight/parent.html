<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Oversight - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-10">
            <h2 class="text-4xl font-bold text-gray-900" id="parentName">Loading Parent...</h2>
            <p class="text-gray-500 mt-2">Family Liaison and Student Linkage Oversight.</p>
        </div>

        <div id="childrenGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <ui-spinner text="Fetching family records..."></ui-spinner>
        </div>
    </main>

    <script type="module">
        import { showToast } from '/components/ui-components.js?v=1.6';
        import { injectOversightHeader } from './header.js';

        const params = new URLSearchParams(window.location.search);
        const parentId = params.get('id');

        async function fetchOversightData() {
            if (!parentId) {
                showToast('No parent ID provided', 'error');
                return;
            }

            try {
                const res = await fetch(`/api/admin/oversight/parent/${parentId}`);
                if (!res.ok) throw new Error('Failed to fetch data');
                
                const data = await res.json();
                renderOversight(data);
            } catch (err) {
                console.error(err);
                showToast('Failed to load oversight data', 'error');
            }
        }

        function renderOversight(data) {
            const { parent, children } = data;
            
            injectOversightHeader('Parent', parent.name);
            document.getElementById('parentName').textContent = parent.name;

            const grid = document.getElementById('childrenGrid');
            if (children.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400 italic">No students linked to this parent.</p>';
            } else {
                grid.innerHTML = children.map(c => `
                    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="bg-blue-600 p-6 flex items-center gap-4">
                            <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-blue-600 text-2xl font-bold uppercase">
                                ${c.student.name.charAt(0)}
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-white">${c.student.name}</h3>
                                <p class="text-blue-100 text-sm">ID: ${c.student.studentId || 'N/A'}</p>
                            </div>
                        </div>
                        <div class="p-6 space-y-4">
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-500 font-medium">Overall Attendance</span>
                                <span class="text-gray-900 font-bold">${c.summary.attendance}</span>
                            </div>
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-500 font-medium">Recent Marks</span>
                                <span class="text-blue-600 font-bold">${c.summary.recentGrade}</span>
                            </div>
                            <div class="pt-4 flex gap-2">
                                <a href="/protected/admin/oversight/student.html?id=${c.student._id}" class="flex-1 text-center bg-gray-900 text-white py-2 rounded-xl font-bold text-xs hover:bg-black transition">Full Student View</a>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        fetchOversightData();
    </script>
</body>
</html>
