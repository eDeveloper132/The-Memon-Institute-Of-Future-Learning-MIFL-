<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Time Tracking - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Time Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-10">
            <h2 class="text-3xl font-bold text-gray-900">Faculty Time Tracking</h2>
            <p class="text-gray-500 mt-2">Monitor login hours, active sessions, and teaching duration logs.</p>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-20 text-center flex flex-col items-center justify-center">
            <div class="w-32 h-32 bg-blue-50 rounded-full flex items-center justify-center text-blue-600 mb-8">
                <i class="fa-solid fa-business-time text-6xl opacity-50"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-900 mb-4">Under Development</h3>
            <p class="text-gray-600 max-w-md mx-auto leading-relaxed">
                The Time Tracking module is currently being finalized. This section will soon provide real-time logs of faculty activity and automated timesheet generation.
            </p>
            <div class="mt-10 flex gap-4">
                <div class="px-6 py-3 bg-gray-50 rounded-xl border border-gray-100 text-sm font-bold text-gray-400 uppercase tracking-widest">Version 1.2 Update</div>
            </div>
        </div>
    </main>

    <script type="module">
        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                const { user } = await res.json();
                if (!res.ok || user.role !== 'admin') { window.location.href = '/'; return; }
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) navbar.renderLinks(user.role);
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        init();
    </script>
</body>
</html>
