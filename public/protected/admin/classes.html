<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Management - MIFL Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Class Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Academic Classes</h2>
                <p class="text-gray-500 mt-2">Create and manage academic classes and their assigned teachers.</p>
            </div>
            <button id="openClassModal" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition flex items-center shadow-lg">
                <i class="fa-solid fa-plus mr-2"></i> Create Class
            </button>
        </div>

        <div id="classGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20">
                <ui-spinner text="Loading academic classes..."></ui-spinner>
            </div>
        </div>
    </main>

    <!-- Add Class Modal -->
    <div id="addClassModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
            <div class="p-6 bg-blue-600 text-white flex justify-between items-center">
                <h3 class="text-xl font-bold">New Academic Class</h3>
                <button id="closeClassModal" class="hover:text-gray-200 text-2xl">&times;</button>
            </div>
            <form id="addClassForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Class Name</label>
                    <input type="text" name="name" placeholder="e.g. Grade 10-A" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Grade Level</label>
                    <input type="number" name="gradeLevel" placeholder="e.g. 10" required class="w-full px-4 py-2 border rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Class Teacher ID</label>
                    <input type="text" name="classTeacher" placeholder="Teacher User ID" class="w-full px-4 py-2 border rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Academic Year</label>
                    <input type="text" name="academicYear" placeholder="e.g. 2026" required class="w-full px-4 py-2 border rounded-lg outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition mt-4">Create Class</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { showToast } from '/components/ui-components.js';

        const classGrid = document.getElementById('classGrid');
        const addForm = document.getElementById('addClassForm');
        const modal = document.getElementById('addClassModal');
        const openBtn = document.getElementById('openClassModal');
        const closeBtn = document.getElementById('closeClassModal');

        if (openBtn) openBtn.onclick = () => modal.classList.remove('hidden');
        if (closeBtn) closeBtn.onclick = () => modal.classList.add('hidden');
        window.onclick = (e) => { if (e.target === modal) modal.classList.add('hidden'); };

        async function fetchClasses() {
            try {
                const res = await fetch('/api/admin/classes');
                const { classes } = await res.json();
                renderClasses(classes);
            } catch (err) {
                classGrid.innerHTML = '<div class="col-span-full text-center text-red-500">Failed to load classes</div>';
            }
        }

        function renderClasses(classes) {
            if (!classes.length) {
                classGrid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500">No classes found. Click "Create Class" to add one.</div>';
                return;
            }

            classGrid.innerHTML = classes.map(c => `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition">
                    <div class="flex justify-between items-start mb-4">
                        <div class="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg text-xs font-bold uppercase tracking-wider">
                            Level ${c.gradeLevel}
                        </div>
                        <span class="text-xs text-gray-400 font-bold">${c.academicYear}</span>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 mb-2">${c.name}</h3>
                    <p class="text-sm text-gray-500 mb-6">Teacher: <span class="text-blue-600 font-bold">${c.classTeacher?.name || 'Unassigned'}</span></p>
                    
                    <div class="flex border-t border-gray-50 pt-4 gap-2">
                        <button class="flex-1 bg-gray-50 text-gray-700 py-2 rounded-lg font-bold text-xs hover:bg-gray-100 transition">View Students</button>
                        <button onclick="deleteClass('${c._id}')" class="w-10 h-10 bg-red-50 text-red-500 rounded-lg flex items-center justify-center hover:bg-red-500 hover:text-white transition">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        addForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(addForm);
            const data = Object.fromEntries(formData);

            try {
                const res = await fetch('/api/admin/classes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    showToast('Class created successfully');
                    document.getElementById('addClassModal').classList.add('hidden');
                    addForm.reset();
                    fetchClasses();
                } else {
                    showToast('Failed to create class', 'error');
                }
            } catch (err) {
                showToast('An error occurred', 'error');
            }
        };

        window.deleteClass = async (id) => {
            if (confirm('Are you sure you want to delete this class?')) {
                try {
                    const res = await fetch(`/api/admin/classes/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        showToast('Class deleted');
                        fetchClasses();
                    }
                } catch (err) {
                    showToast('Operation failed', 'error');
                }
            }
        };

        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                const { user } = await res.json();
                if (window.initSocket) window.initSocket(user);
                if (!res.ok || user.role !== 'admin') { window.location.href = '/'; return; }
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) navbar.renderLinks(user.role);
                fetchClasses();
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        init();
    </script>
</body>
</html>
