<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - MIFL Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Department Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Academic Departments</h2>
                <p class="text-gray-500 mt-2">Organize faculty and curriculum into structured departments.</p>
            </div>
            <button id="openDeptModal" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition flex items-center shadow-lg active:scale-95">
                <i class="fa-solid fa-plus mr-2"></i> Create Department
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider">Code</th>
                        <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider">Name</th>
                        <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider">Head of Department</th>
                        <th class="px-8 py-5 text-sm font-bold text-gray-600 uppercase tracking-wider text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="deptTableBody" class="divide-y divide-gray-100">
                    <tr>
                        <td colspan="4" class="p-10 text-center">
                            <ui-spinner text="Loading departments..."></ui-spinner>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Create/Edit Modal -->
    <div id="deptModal" data-modal-backdrop class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden" data-modal-panel>
            <div class="p-6 bg-blue-600 text-white flex justify-between items-center">
                <h3 class="text-xl font-bold" id="modalTitle">Create New Department</h3>
                <button type="button" data-close-modal="deptModal" class="text-2xl hover:text-gray-200">&times;</button>
            </div>
            <form id="deptForm" class="p-6 space-y-4">
                <input type="hidden" name="id">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Department Name</label>
                    <input type="text" name="name" required placeholder="e.g. Science & Technology" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Department Code</label>
                    <input type="text" name="code" required placeholder="e.g. SCI" class="w-full px-4 py-2 border rounded-lg outline-none uppercase font-mono">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Head of Department</label>
                    <select name="headOfDepartment" id="teacherSelect" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        <option value="">Select a teacher...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Description</label>
                    <textarea name="description" placeholder="Optional description..." class="w-full px-4 py-2 border rounded-lg outline-none h-24 focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition mt-4 shadow-md active:scale-95">Save Department</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { showToast } from '/components/ui-components.js?v=1.6';

        const tableBody = document.getElementById('deptTableBody');
        const deptForm = document.getElementById('deptForm');
        const modal = document.getElementById('deptModal');
        const openBtn = document.getElementById('openDeptModal');
        const teacherSelect = document.getElementById('teacherSelect');
        const modalTitle = document.getElementById('modalTitle');

        let allDepartments = [];

        /**
         * MODAL ACTIONS
         */
        window.closeModal = (id) => {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('hidden');
                deptForm.reset();
                deptForm.elements.id.value = '';
                modalTitle.textContent = 'Create New Department';
            }
        };

        const openAddModal = () => {
            modalTitle.textContent = 'Create New Department';
            deptForm.elements.id.value = '';
            deptForm.reset();
            modal.classList.remove('hidden');
        };

        const openEditModal = (id) => {
            const dept = allDepartments.find(d => d._id === id);
            if (!dept) return showToast('Department not found', 'error');

            modalTitle.textContent = 'Edit Department';
            deptForm.elements.id.value = dept._id;
            deptForm.elements.name.value = dept.name;
            deptForm.elements.code.value = dept.code;
            deptForm.elements.headOfDepartment.value = dept.headOfDepartment?._id || dept.headOfDepartment || '';
            deptForm.elements.description.value = dept.description || '';
            modal.classList.remove('hidden');
        };

        if (openBtn) openBtn.onclick = openAddModal;

        document.addEventListener('click', (e) => {
            const closeBtn = e.target.closest('[data-close-modal]');
            if (closeBtn) window.closeModal(closeBtn.getAttribute('data-close-modal'));
            
            const backdrop = e.target.closest('[data-modal-backdrop]');
            if (backdrop && e.target === backdrop) window.closeModal(backdrop.id);
        });

        /**
         * DATA FETCHING
         */

        async function fetchTeachers() {
            try {
                const res = await fetch('/api/admin/users?role=teacher');
                const { users } = await res.json();
                if (teacherSelect) {
                    teacherSelect.innerHTML = '<option value="">Select a teacher...</option>' + 
                        users.map(t => `<option value="${t._id}">${t.name} (${t.staffId || 'No ID'})</option>`).join('');
                }
            } catch (err) {
                console.error('Failed to fetch teachers', err);
            }
        }

        async function fetchDepartments() {
            try {
                const res = await fetch('/api/admin/departments');
                const data = await res.json();
                allDepartments = data.departments || [];
                renderDepartments(allDepartments);
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-red-500 font-bold">Failed to load department data</td></tr>';
            }
        }

        function renderDepartments(departments) {
            if (!departments.length) {
                tableBody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-gray-500 font-medium italic">No departments defined in the system.</td></tr>';
                return;
            }

            tableBody.innerHTML = departments.map(d => `
                <tr class="hover:bg-gray-50 transition border-b border-gray-50 last:border-0">
                    <td class="px-8 py-5 font-mono font-bold text-blue-600 uppercase tracking-tighter">${d.code}</td>
                    <td class="px-8 py-5 font-bold text-gray-900">${d.name}</td>
                    <td class="px-8 py-5">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center font-bold text-xs border border-indigo-100">
                                ${(d.headOfDepartment?.name || '?')[0]}
                            </div>
                            <span class="text-sm font-semibold text-gray-700">${d.headOfDepartment?.name || 'Unassigned'}</span>
                        </div>
                    </td>
                    <td class="px-8 py-5 text-right whitespace-nowrap">
                        <button type="button" data-action="edit" data-id="${d._id}" class="text-blue-600 hover:text-blue-800 transition p-2 mr-2">
                            <i class="fa-solid fa-pen-to-square text-xl pointer-events-none"></i>
                        </button>
                        <button type="button" data-action="delete" data-id="${d._id}" class="text-red-400 hover:text-red-600 transition p-2">
                            <i class="fa-solid fa-trash-can text-xl pointer-events-none"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        /**
         * EVENT LISTENERS
         */

        tableBody.addEventListener('click', async (e) => {
            const btn = e.target.closest('button[data-action]');
            if (!btn) return;
            const action = btn.getAttribute('data-action');
            const id = btn.getAttribute('data-id');

            if (action === 'edit') {
                openEditModal(id);
            } else if (action === 'delete') {
                if (!confirm('Are you sure you want to delete this department?')) return;
                try {
                    const res = await fetch(`/api/admin/departments/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        showToast('Department deleted');
                        fetchDepartments();
                    } else {
                        const err = await res.json();
                        showToast(err.message || 'Failed to delete', 'error');
                    }
                } catch (err) { showToast('Server error', 'error'); }
            }
        });

        deptForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(deptForm);
            const data = Object.fromEntries(formData.entries());
            const id = data.id;

            const url = id ? `/api/admin/departments/${id}` : '/api/admin/departments';
            const method = id ? 'PATCH' : 'POST';

            try {
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    showToast(id ? 'Department updated' : 'Department created');
                    window.closeModal('deptModal');
                    fetchDepartments();
                } else {
                    const err = await res.json();
                    showToast(err.message || 'Operation failed', 'error');
                }
            } catch (err) { showToast('An error occurred', 'error'); }
        };

        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await res.json();
                if (user.role !== 'admin') { window.location.href = '/'; return; }
                if (window.initSocket) window.initSocket(user);
                
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) navbar.renderLinks(user.role);
                
                await Promise.all([
                    fetchTeachers(),
                    fetchDepartments()
                ]);
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        init();
    </script>
</body>
</html>
