<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Management - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Batch Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Graduation Batches</h2>
                <p class="text-gray-500 mt-2">Manage student cohorts and academic graduation years.</p>
            </div>
            <button id="openBatchModal" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 transition flex items-center shadow-lg">
                <i class="fa-solid fa-layer-group mr-2"></i> Create Batch
            </button>
        </div>

        <div id="batchList" class="space-y-4">
            <div class="text-center py-20">
                <ui-spinner text="Fetching batches..."></ui-spinner>
            </div>
        </div>
    </main>

    <!-- Add Batch Modal -->
    <div id="addBatchModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden">
            <div class="p-4 bg-indigo-600 text-white flex justify-between items-center">
                <h3 class="font-bold">Register New Batch</h3>
                <button id="closeBatchModal" class="text-xl">&times;</button>
            </div>
            <form id="batchForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Batch Name</label>
                    <input type="text" name="name" placeholder="e.g. Class of 2026" required class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-700 mb-1">Start Year</label>
                        <input type="number" name="startYear" required class="w-full border rounded-lg p-2 outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-700 mb-1">End Year</label>
                        <input type="number" name="endYear" required class="w-full border rounded-lg p-2 outline-none">
                    </div>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Save Batch</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { showToast } from '/components/ui-components.js';

        const batchList = document.getElementById('batchList');
        const form = document.getElementById('batchForm');
        const modal = document.getElementById('addBatchModal');
        const openBtn = document.getElementById('openBatchModal');
        const closeBtn = document.getElementById('closeBatchModal');

        if (openBtn) openBtn.onclick = () => modal.classList.remove('hidden');
        if (closeBtn) closeBtn.onclick = () => modal.classList.add('hidden');
        window.onclick = (e) => { if (e.target === modal) modal.classList.add('hidden'); };

        async function fetchBatches() {
            try {
                const res = await fetch('/api/admin/batches');
                const { batches } = await res.json();
                renderBatches(batches);
            } catch (err) {
                batchList.innerHTML = '<p class="text-center text-red-500">Failed to load batches</p>';
            }
        }

        function renderBatches(batches) {
            if (!batches.length) {
                batchList.innerHTML = '<div class="bg-white p-10 rounded-2xl text-center text-gray-500 border border-dashed border-gray-300">No batches configured yet.</div>';
                return;
            }

            batchList.innerHTML = batches.map(b => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 ${b.isActive ? 'border-indigo-500' : 'border-gray-300'} flex justify-between items-center hover:shadow-md transition">
                    <div>
                        <h3 class="font-bold text-xl text-gray-900">${b.name}</h3>
                        <p class="text-sm text-gray-500 font-medium">${b.startYear} — ${b.endYear}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="px-3 py-1 text-[10px] font-bold rounded-full ${b.isActive ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'} uppercase">
                            ${b.isActive ? 'Active' : 'Inactive'}
                        </span>
                        <button onclick="deleteBatch('${b._id}')" class="text-red-400 hover:text-red-600 transition"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(form));
            try {
                const res = await fetch('/api/admin/batches', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    showToast('Batch created');
                    document.getElementById('addBatchModal').classList.add('hidden');
                    form.reset();
                    fetchBatches();
                }
            } catch (err) { showToast('Error', 'error'); }
        };

        window.deleteBatch = async (id) => {
            if (confirm('Delete this batch?')) {
                const res = await fetch(`/api/admin/batches/${id}`, { method: 'DELETE' });
                if (res.ok) { showToast('Deleted'); fetchBatches(); }
            }
        }

        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                const { user } = await res.json();
                if (window.initSocket) window.initSocket(user);
                if (!res.ok || user.role !== 'admin') { window.location.href = '/'; return; }
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) navbar.renderLinks(user.role);
                fetchBatches();
            } catch (err) {}
        }
        init();
    </script>
</body>
</html>
