<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Admin Dashboard"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div id="welcomeMessage" class="mb-10">
            <h2 class="text-4xl font-bold text-gray-900">Admin Control Panel</h2>
            <p class="text-gray-500 mt-2">Welcome, <span id="displayFirstName">Administrator</span>. Here is the system-wide overview.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <ui-card id="totalStudents" title="Total Students" value="..." color="blue"></ui-card>
            <ui-card id="totalTeachers" title="Total Teachers" value="..." color="green"></ui-card>
            <ui-card id="totalClasses" title="Classes" value="..." color="purple"></ui-card>
            <ui-card id="pendingFees" title="Pending Fees" value="..." color="red"></ui-card>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- System Health -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-xl font-bold text-gray-900 mb-4">Quick Management</h3>
                <div class="grid grid-cols-2 gap-4">
                    <a href="/protected/admin/students.html" class="p-4 bg-gray-50 rounded-lg hover:bg-blue-50 transition group">
                        <i class="fa-solid fa-user-graduate text-blue-500 text-2xl mb-2"></i>
                        <p class="font-bold text-gray-700 group-hover:text-blue-600">Student Directory</p>
                    </a>
                    <a href="/protected/admin/parents.html" class="p-4 bg-gray-50 rounded-lg hover:bg-orange-50 transition group">
                        <i class="fa-solid fa-children text-orange-500 text-2xl mb-2"></i>
                        <p class="font-bold text-gray-700 group-hover:text-orange-600">Parent Management</p>
                    </a>
                    <a href="/protected/admin/teachers.html" class="p-4 bg-gray-50 rounded-lg hover:bg-green-50 transition group">
                        <i class="fa-solid fa-chalkboard-teacher text-green-500 text-2xl mb-2"></i>
                        <p class="font-bold text-gray-700 group-hover:text-green-600">Faculty Management</p>
                    </a>
                    <a href="/protected/admin/classes.html" class="p-4 bg-gray-50 rounded-lg hover:bg-purple-50 transition group">
                        <i class="fa-solid fa-chalkboard text-purple-500 text-2xl mb-2"></i>
                        <p class="font-bold text-gray-700 group-hover:text-purple-600">Class Management</p>
                    </a>
                    <a href="/protected/admin/fees.html" class="p-4 bg-gray-50 rounded-lg hover:bg-red-50 transition group">
                        <i class="fa-solid fa-money-bill-wave text-red-500 text-2xl mb-2"></i>
                        <p class="font-bold text-gray-700 group-hover:text-blue-600">Financial Overview</p>
                    </a>
                    <a href="/protected/messages.html" class="p-4 bg-gray-50 rounded-lg hover:bg-indigo-50 transition group col-span-2">
                        <i class="fa-solid fa-comments text-indigo-500 text-2xl mb-2"></i>
                        <p class="font-bold text-gray-700 group-hover:text-indigo-600">Communication Center</p>
                    </a>
                </div>
            </div>

            <!-- Recent Logins or Activity -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col h-full">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-gray-900">System Notifications</h3>
                    <button id="markAllReadDash" class="text-xs text-blue-600 hover:underline font-bold">Clear All</button>
                </div>
                <div id="systemNotificationsList" class="space-y-4 overflow-y-auto flex-1 max-h-[400px] pr-2 custom-scrollbar">
                    <div class="flex flex-col items-center justify-center py-10 text-gray-400 italic">
                        <i class="fa-solid fa-spinner fa-spin mb-2"></i>
                        <p class="text-xs">Loading alerts...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { showToast } from '/components/ui-components.js';

        async function fetchAdminStats() {
            try {
                const response = await fetch('/api/admin/stats');
                if (response.ok) {
                    const stats = await response.json();
                    
                    const updateCard = (id, val) => {
                        const card = document.getElementById(id);
                        if (card) {
                            card.setAttribute('value', val);
                        }
                    };

                    updateCard('totalStudents', stats.totalStudents);
                    updateCard('totalTeachers', stats.totalTeachers);
                    updateCard('totalClasses', stats.totalClasses);
                    updateCard('pendingFees', `PKR ${stats.pendingFeesAmount.toLocaleString()}`);
                }
            } catch (err) {
                console.error('Failed to fetch admin stats:', err);
            }
        }

        async function fetchNotifications() {
            const list = document.getElementById('systemNotificationsList');
            try {
                const response = await fetch('/api/notifications?status=unread');
                if (!response.ok) throw new Error('Failed to fetch');
                const { notifications } = await response.json();

                if (notifications.length === 0) {
                    list.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-12 text-gray-300">
                            <i class="fa-solid fa-bell-slash text-3xl mb-3"></i>
                            <p class="text-sm font-medium">No pending alerts</p>
                        </div>
                    `;
                    return;
                }

                const typeStyles = {
                    SYSTEM: { bg: 'bg-blue-50', border: 'border-blue-400', text: 'text-blue-800', icon: 'fa-info-circle', iconColor: 'text-blue-600' },
                    FEE: { bg: 'bg-yellow-50', border: 'border-yellow-400', text: 'text-yellow-800', icon: 'fa-triangle-exclamation', iconColor: 'text-yellow-600' },
                    ENROLLMENT: { bg: 'bg-green-50', border: 'border-green-400', text: 'text-green-800', icon: 'fa-user-plus', iconColor: 'text-green-600' },
                    ACADEMIC: { bg: 'bg-indigo-50', border: 'border-indigo-400', text: 'text-indigo-800', icon: 'fa-book', iconColor: 'text-indigo-600' },
                    MESSAGE: { bg: 'bg-gray-50', border: 'border-gray-400', text: 'text-gray-800', icon: 'fa-comment', iconColor: 'text-gray-600' }
                };

                list.innerHTML = notifications.map(n => {
                    const style = typeStyles[n.type] || typeStyles.SYSTEM;
                    return `
                        <div class="flex items-start p-3 ${style.bg} rounded-lg border-l-4 ${style.border} group relative transition-all hover:shadow-sm">
                            <i class="fa-solid ${style.icon} ${style.iconColor} mt-1 mr-4"></i>
                            <div class="flex-1 pr-6">
                                <p class="text-xs font-black uppercase tracking-widest ${style.iconColor} mb-0.5">${n.type}</p>
                                <p class="text-sm ${style.text} font-bold leading-tight">${n.title}</p>
                                <p class="text-xs ${style.text} opacity-80 mt-1">${n.content}</p>
                            </div>
                            <button data-id="${n._id}" class="mark-read-btn absolute top-3 right-3 text-gray-400 hover:text-blue-600 opacity-0 group-hover:opacity-100 transition">
                                <i class="fa-solid fa-check"></i>
                            </button>
                        </div>
                    `;
                }).join('');

                // Attach individual mark read events
                list.querySelectorAll('.mark-read-btn').forEach(btn => {
                    btn.onclick = async (e) => {
                        const id = btn.getAttribute('data-id');
                        try {
                            const res = await fetch(`/api/notifications/${id}/read`, { method: 'PATCH' });
                            if (res.ok) fetchNotifications();
                        } catch (err) { console.error(err); }
                    };
                });

            } catch (err) {
                console.error('Failed to load notifications:', err);
                list.innerHTML = `<p class="text-center text-red-500 py-10 text-xs font-bold">Error loading alerts</p>`;
            }
        }

        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                
                // Initialize Socket.IO
                if (window.initSocket) {
                    const socket = await window.initSocket(user);
                    
                    // Real-time Activity Listener
                    socket.on('activity', (data) => {
                        console.log('[Admin] Real-time activity:', data);
                        if (data.type === 'USER_LOGIN') {
                            showToast(`${data.user.name} just logged in`, 'info');
                            fetchAdminStats();
                        }
                    });

                    // Real-time Notification listener (custom event from ui-components.ts)
                    document.addEventListener('newNotification', () => {
                        fetchNotifications();
                    });
                }

                if (user.role !== 'admin') { window.location.href = '/'; return; }
                
                customElements.whenDefined('ui-navbar').then(() => {
                    const navbar = document.querySelector('ui-navbar');
                    if (navbar && navbar.renderLinks) { 
                        navbar.renderLinks(user); 
                        navbar.userData = user; // Trigger reactivity for notifications count
                    }
                });

                document.getElementById('displayFirstName').textContent = user.name.split(' ')[0];
                
                fetchAdminStats();
                fetchNotifications();
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }

        // Global Listeners
        document.getElementById('markAllReadDash').onclick = async () => {
            try {
                const res = await fetch('/api/notifications/read-all', { method: 'PATCH' });
                if (res.ok) fetchNotifications();
            } catch (err) { console.error(err); }
        };

        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });

        fetchProfile();
    </script>
</body>
</html>
