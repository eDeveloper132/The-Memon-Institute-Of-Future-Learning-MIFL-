<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Attendance Oversight - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Faculty Oversight"></ui-navbar>

    <main class="p-8 max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Faculty Attendance Log</h2>
                <p class="text-gray-500 mt-1">Review system-wide daily presence for all teaching faculty.</p>
            </div>
            <input type="date" id="dateSelect" class="bg-white border border-gray-200 rounded-xl px-6 py-2 font-bold text-gray-700 outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <div id="logTable" class="divide-y divide-gray-100">
                <div class="p-20 text-center">
                    <ui-spinner text="Loading faculty logs..."></ui-spinner>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        const dateSelect = document.getElementById('dateSelect');
        const logTable = document.getElementById('logTable');
        dateSelect.valueAsDate = new Date();

        async function fetchLogs() {
            logTable.innerHTML = '<div class="p-20 text-center"><ui-spinner text="Fetching..."></ui-spinner></div>';
            try {
                const res = await fetch(`/api/admin/attendance?role=teacher&date=${dateSelect.value}`);
                const { records } = await res.json();
                
                if (!records.length) {
                    logTable.innerHTML = '<div class="p-20 text-center text-gray-400 font-medium italic">No attendance records found for this date.</div>';
                    return;
                }

                logTable.innerHTML = records.map(r => `
                    <div class="flex justify-between items-center p-6 hover:bg-gray-50 transition">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-green-50 text-green-600 flex items-center justify-center font-bold text-lg uppercase">${r.student?.name[0]}</div>
                            <div>
                                <h4 class="font-bold text-gray-900">${r.student?.name}</h4>
                                <p class="text-xs text-gray-400 uppercase tracking-widest font-bold">Faculty Member</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-6">
                            <span class="px-4 py-1.5 rounded-xl text-[10px] font-extrabold uppercase tracking-widest ${r.status === 'present' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                ${r.status}
                            </span>
                            <button class="text-gray-300 hover:text-blue-600 transition"><i class="fa-solid fa-circle-info text-xl"></i></button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                logTable.innerHTML = '<div class="p-20 text-center text-red-500 font-bold">Error loading logs</div>';
            }
        }

        dateSelect.addEventListener('change', fetchLogs);

        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                const { user } = await res.json();
                if (window.initSocket) window.initSocket(user);
                if (!res.ok || user.role !== 'admin') { window.location.href = '/'; return; }
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) navbar.renderLinks(user.role);
                fetchLogs();
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        init();
    </script>
</body>
</html>
