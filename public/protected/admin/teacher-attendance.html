<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Attendance Oversight - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.3" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Faculty Oversight"></ui-navbar>

    <main class="p-8 max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8 gap-4 flex-wrap">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Faculty Attendance Log</h2>
                <p class="text-gray-500 mt-1">Review system-wide daily presence with precise time tracking.</p>
            </div>
            <div class="flex gap-4 items-center">
                <button type="button" id="openManualRecordBtn" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg flex items-center">
                    <i class="fa-solid fa-calendar-check mr-2"></i> Record Attendance
                </button>
                <input type="date" id="dateSelect" class="bg-white border border-gray-200 rounded-xl px-4 py-2 font-bold text-gray-700 outline-none focus:ring-2 focus:ring-blue-500 shadow-sm bg-white cursor-pointer">
            </div>
        </div>

        <!-- Ported Filter Bar -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-wrap gap-4 border border-gray-200">
            <div class="flex-1 min-w-[300px] relative">
                <i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Search faculty by name..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <select id="statusFilter" class="px-4 py-2 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer bg-white">
                <option value="">All Statuses</option>
                <option value="present">Present</option>
                <option value="absent">Absent</option>
                <option value="late">Late</option>
                <option value="excused">Excused</option>
            </select>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <div id="logTable" class="divide-y divide-gray-100">
                <div class="p-20 text-center text-gray-400 italic">
                    Initializing faculty logs...
                </div>
            </div>
        </div>
    </main>

    <!-- Attendance Modal (Used for Add and Update) -->
    <div id="manualRecordModal" data-modal-backdrop class="fixed inset-0 bg-black/50 hidden z-50 items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden my-auto" data-modal-panel>
            <div class="p-6 bg-blue-600 text-white flex justify-between items-center">
                <h3 class="text-xl font-bold" id="modalTitle">Log Faculty Attendance</h3>
                <button type="button" data-close-modal="manualRecordModal" class="hover:text-gray-200 text-2xl leading-none">&times;</button>
            </div>
            <form id="attendanceForm" class="p-6 space-y-4">
                <input type="hidden" name="id">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Select Teacher</label>
                    <select name="userId" id="teacherSelect" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        <option value="">Select a teacher...</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Status</label>
                        <select name="status" required class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-white text-sm">
                            <option value="present">Present</option>
                            <option value="absent">Absent</option>
                            <option value="late">Late</option>
                            <option value="excused">Excused</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Check-in Time</label>
                        <input type="datetime-local" name="checkIn" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Check-out Time (Optional)</label>
                        <input type="datetime-local" name="checkOut" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Remarks</label>
                    <textarea name="remarks" class="w-full px-4 py-2 border rounded-lg outline-none h-20 focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 transition shadow-md active:scale-95">
                        Save Attendance Record
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { showToast } from '/components/ui-components.js?v=1.3';

        // DOM References
        const dateSelect = document.getElementById('dateSelect');
        const logTable = document.getElementById('logTable');
        const searchInput = document.getElementById('searchInput');
        const statusFilter = document.getElementById('statusFilter');
        const attendanceForm = document.getElementById('attendanceForm');
        const teacherSelect = document.getElementById('teacherSelect');
        const openManualBtn = document.getElementById('openManualRecordBtn');
        const modalTitle = document.getElementById('modalTitle');
        
        let allRecords = [];
        dateSelect.valueAsDate = new Date();

        /**
         * MODAL ACTIONS
         */
        window.closeModal = (id) => {
            const modal = document.getElementById(id);
            if (modal) {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                if (id === 'manualRecordModal' && attendanceForm) attendanceForm.reset();
            }
        };

        const setModalVisible = (id, visible) => {
            const modal = document.getElementById(id);
            if (!modal) return;
            modal.classList.toggle('hidden', !visible);
            modal.classList.toggle('flex', visible);
        };

        const openEditModal = (recordId) => {
            const record = allRecords.find(r => r._id === recordId);
            if (!record) return showToast('Record not found', 'error');

            if (attendanceForm) {
                attendanceForm.reset();
                attendanceForm.elements.id.value = record._id;
                attendanceForm.elements.userId.value = record.student?._id || record.student;
                attendanceForm.elements.status.value = record.status;
                attendanceForm.elements.remarks.value = record.remarks || '';
                
                const normalizeDateForInput = (dateStr) => {
                    if (!dateStr) return '';
                    const d = new Date(dateStr);
                    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
                    return d.toISOString().slice(0, 16);
                };

                attendanceForm.elements.checkIn.value = normalizeDateForInput(record.checkIn);
                attendanceForm.elements.checkOut.value = normalizeDateForInput(record.checkOut);

                modalTitle.textContent = 'Update Attendance Record';
                setModalVisible('manualRecordModal', true);
            }
        };

        const openAddModal = () => {
            if (attendanceForm) {
                attendanceForm.reset();
                attendanceForm.elements.id.value = '';
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                attendanceForm.elements.checkIn.value = now.toISOString().slice(0, 16);
                modalTitle.textContent = 'Log Faculty Attendance';
            }
            setModalVisible('manualRecordModal', true);
        };

        /**
         * DATA MANAGEMENT
         */

        async function fetchTeachers() {
            try {
                const res = await fetch('/api/admin/users?role=teacher');
                const data = await res.json();
                if (teacherSelect) {
                    teacherSelect.innerHTML = '<option value="">Select a teacher...</option>' + 
                        data.users.map(t => `<option value="${t._id}">${t.name} (${t.email})</option>`).join('');
                }
            } catch (err) {
                console.error('Failed to fetch teachers', err);
            }
        }

        async function fetchLogs() {
            logTable.innerHTML = `
                <div class="p-20 text-center">
                    <div class="flex flex-col items-center gap-3">
                        <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                        <span class="text-gray-400 font-medium">Syncing faculty logs...</span>
                    </div>
                </div>
            `;
            try {
                const res = await fetch(`/api/admin/attendance?role=teacher&date=${dateSelect.value}`);
                const data = await res.json();
                allRecords = data.records || [];
                filterAndRender();
            } catch (err) {
                logTable.innerHTML = '<div class="p-20 text-center text-red-500 font-bold">Failed to load logs</div>';
            }
        }

        function filterAndRender() {
            const searchTerm = (searchInput?.value || '').toLowerCase().trim();
            const statusTerm = statusFilter?.value || '';

            const filtered = allRecords.filter(r => {
                const name = (r.student?.name || '').toLowerCase();
                const matchesSearch = name.includes(searchTerm);
                const matchesStatus = !statusTerm || r.status === statusTerm;
                return matchesSearch && matchesStatus;
            });

            renderLogs(filtered);
        }

        function renderLogs(records) {
            if (!records.length) {
                logTable.innerHTML = '<div class="p-20 text-center text-gray-400 font-medium italic border-b border-gray-100">No attendance records found for this date.</div>';
                return;
            }

            logTable.innerHTML = records.map(r => {
                const checkInTime = r.checkIn ? new Date(r.checkIn).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '---';
                const checkOutTime = r.checkOut ? new Date(r.checkOut).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '---';
                const id = String(r._id);
                
                return `
                    <div class="flex justify-between items-center p-6 hover:bg-gray-50 transition group border-b border-gray-50 last:border-0">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 rounded-2xl bg-green-100 text-green-700 flex items-center justify-center font-bold text-xl border border-green-200 shadow-sm uppercase">
                                ${(r.student?.name || '?')[0]}
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-900 group-hover:text-green-700 transition-colors">${r.student?.name || 'Unknown Faculty'}</h4>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded font-mono font-bold tracking-tight">${r.student?.email || ''}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-8">
                            <div class="text-right hidden md:block">
                                <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-1">Precise Time</p>
                                <p class="text-xs font-bold text-gray-700">
                                    <i class="fa-solid fa-clock-rotate-left mr-1 text-green-500"></i> ${checkInTime}
                                    ${r.checkOut ? `<span class="mx-1 text-gray-300">→</span> <i class="fa-solid fa-right-from-bracket mr-1 text-red-400"></i> ${checkOutTime}` : ''}
                                </p>
                            </div>
                            <span class="px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest border shadow-sm
                                ${r.status === 'present' ? 'bg-green-50 text-green-700 border-green-200' : 
                                  r.status === 'absent' ? 'bg-red-50 text-red-700 border-red-200' : 
                                  'bg-yellow-50 text-yellow-700 border-yellow-200'}">
                                ${r.status}
                            </span>
                            <button type="button" data-action="edit" data-id="${id}" class="text-gray-300 hover:text-blue-600 transition p-2" title="Edit Record">
                                <i class="fa-solid fa-pen-to-square text-xl pointer-events-none"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        /**
         * EVENT LISTENERS
         */

        // Delegation for table actions
        logTable.addEventListener('click', (e) => {
            const btn = e.target.closest('button[data-action]');
            if (!btn) return;
            const action = btn.getAttribute('data-action');
            const id = btn.getAttribute('data-id');
            if (action === 'edit') openEditModal(id);
        });

        // Delegation for modal controls
        document.addEventListener('click', (e) => {
            const closeBtn = e.target.closest('[data-close-modal]');
            if (closeBtn) {
                window.closeModal(closeBtn.getAttribute('data-close-modal'));
                return;
            }
            const backdrop = e.target.closest('[data-modal-backdrop]');
            if (backdrop && e.target === backdrop) {
                window.closeModal(backdrop.id);
            }
        });

        if (openManualBtn) openManualBtn.addEventListener('click', openAddModal);

        if (attendanceForm) {
            attendanceForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(attendanceForm);
                const data = Object.fromEntries(formData.entries());
                const id = data.id;

                const url = id ? `/api/admin/attendance/${id}` : '/api/admin/attendance';
                const method = id ? 'PATCH' : 'POST';

                try {
                    const res = await fetch(url, {
                        method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    if (res.ok) {
                        showToast(id ? 'Record updated' : 'Attendance logged');
                        window.closeModal('manualRecordModal');
                        await fetchLogs();
                    } else {
                        const err = await res.json();
                        showToast(err.message || 'Action failed', 'error');
                    }
                } catch (err) {
                    showToast('Server error', 'error');
                }
            });
        }

        dateSelect.addEventListener('change', fetchLogs);
        if (searchInput) searchInput.addEventListener('input', filterAndRender);
        if (statusFilter) statusFilter.addEventListener('change', filterAndRender);

        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await res.json();
                
                if (user.role !== 'admin') { window.location.href = '/'; return; }
                if (window.initSocket) window.initSocket(user);
                
                const navbar = customElements.get('ui-navbar');
                if (navbar && typeof navbar.renderLinks === 'function') {
                    navbar.renderLinks(user.role);
                }

                await Promise.all([
                    fetchTeachers(),
                    fetchLogs()
                ]);
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        init();
    </script>
</body>
</html>
