<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Student Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Student Directory</h2>
                <p class="text-gray-500 mt-2">Manage all registered students in the system.</p>
            </div>
            <button id="openModalBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition flex items-center shadow-lg">
                <i class="fa-solid fa-user-plus mr-2"></i> Add Student
            </button>
        </div>

        <!-- Search and Filter -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-wrap gap-4">
            <div class="flex-1 min-w-[300px] relative">
                <i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Search by name, email or ID..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <select id="statusFilter" class="px-4 py-2 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">All Statuses</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
                <option value="suspended">Suspended</option>
            </select>
        </div>

        <!-- Student Table -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Student</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Contact</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Role</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700">Status</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-700 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody" class="divide-y divide-gray-200">
                    <tr>
                        <td colspan="5" class="px-6 py-10 text-center">
                            <ui-spinner text="Loading students..."></ui-spinner>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Simple Add Modal -->
    <div id="addStudentModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
            <div class="p-6 bg-blue-600 text-white flex justify-between items-center">
                <h3 class="text-xl font-bold">Register New Student</h3>
                <button id="closeModalBtn" class="hover:text-gray-200 text-2xl">&times;</button>
            </div>
            <form id="addStudentForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Full Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Email Address</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-700 mb-1">Phone</label>
                        <input type="text" name="phoneNumber" required class="w-full px-4 py-2 border rounded-lg outline-none">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-700 mb-1">Gender</label>
                        <select name="gender" class="w-full px-4 py-2 border rounded-lg outline-none">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Address</label>
                    <textarea name="address" required class="w-full px-4 py-2 border rounded-lg outline-none h-20"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition mt-4">Create Account</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { showToast } from '/components/ui-components.js';

        const tableBody = document.getElementById('studentTableBody');
        const addForm = document.getElementById('addStudentForm');
        const modal = document.getElementById('addStudentModal');
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');

        if (openBtn) openBtn.onclick = () => modal.classList.remove('hidden');
        if (closeBtn) closeBtn.onclick = () => modal.classList.add('hidden');
        window.onclick = (e) => { if (e.target === modal) modal.classList.add('hidden'); };

        async function fetchStudents() {
            try {
                const res = await fetch('/api/admin/users?role=student');
                const data = await res.json();
                renderStudents(data.users);
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-red-500">Failed to load students</td></tr>';
            }
        }

        function renderStudents(students) {
            if (!students.length) {
                tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-gray-500">No students found</td></tr>';
                return;
            }

            tableBody.innerHTML = students.map(s => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold mr-3">
                                ${s.name.charAt(0)}
                            </div>
                            <div>
                                <div class="font-bold text-gray-900">${s.name}</div>
                                <div class="text-xs text-gray-500">ID: ${s._id.slice(-6).toUpperCase()}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-sm">
                        <div class="text-gray-900">${s.email}</div>
                        <div class="text-gray-500">${s.phoneNumber || 'N/A'}</div>
                    </td>
                    <td class="px-6 py-4 text-sm font-medium uppercase text-gray-500">${s.role}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded-full text-xs font-bold uppercase 
                            ${s.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${s.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right space-x-2">
                        <button class="text-blue-600 hover:text-blue-800 transition"><i class="fa-solid fa-edit"></i></button>
                        <button onclick="confirmDelete('${s._id}')" class="text-red-600 hover:text-red-800 transition"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        addForm.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(addForm);
            const data = Object.fromEntries(formData);
            data.role = 'student';

            try {
                const res = await fetch('/api/admin/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    showToast('Student registered successfully');
                    document.getElementById('addStudentModal').classList.add('hidden');
                    addForm.reset();
                    fetchStudents();
                } else {
                    const err = await res.json();
                    showToast(err.message || 'Signup failed', 'error');
                }
            } catch (err) {
                showToast('An error occurred', 'error');
            }
        };

        window.confirmDelete = async (id) => {
            if (confirm('Are you sure you want to delete this student? This action cannot be undone.')) {
                try {
                    const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        showToast('Student deleted');
                        fetchStudents();
                    }
                } catch (err) {
                    showToast('Failed to delete', 'error');
                }
            }
        };

        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                const { user } = await res.json();
                if (window.initSocket) window.initSocket(user);
                if (!res.ok || user.role !== 'admin') { window.location.href = '/'; return; }
                
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) navbar.renderLinks(user.role);
                
                fetchStudents();
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }

        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });

        init();
    </script>
</body>
</html>
