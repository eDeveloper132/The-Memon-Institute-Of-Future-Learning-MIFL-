<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Oversight - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Attendance Oversight"></ui-navbar>

    <main class="p-8 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 gap-4 flex-wrap">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Student Attendance Log</h2>
                <p class="text-gray-500 mt-1 text-sm">Comprehensive daily presence history with class, course, and teacher details.</p>
            </div>
            <div class="flex items-center bg-white p-2 rounded-2xl shadow-sm border border-gray-200">
                <label for="dateSelect" class="px-3 text-xs font-black uppercase text-gray-400">Viewing Date</label>
                <input type="date" id="dateSelect" class="border-l border-gray-100 pl-4 pr-2 py-1 font-bold text-gray-700 outline-none cursor-pointer">
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex flex-wrap gap-4 border border-gray-200">
            <div class="flex-1 min-w-[300px] relative">
                <i class="fa-solid fa-search absolute left-4 top-3.5 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Search student by name or ID..." class="w-full pl-11 pr-4 py-2.5 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-gray-50/50">
            </div>
            <select id="statusFilter" class="px-4 py-2 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer bg-gray-50/50 text-sm font-semibold">
                <option value="">All Statuses</option>
                <option value="present">Present</option>
                <option value="absent">Absent</option>
                <option value="late">Late</option>
                <option value="excused">Excused</option>
            </select>
        </div>

        <!-- Attendance List -->
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <div id="logTable" class="divide-y divide-gray-100">
                <div class="p-20 text-center">
                    <div class="flex flex-col items-center gap-3">
                        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                        <span class="text-gray-400 font-medium italic">Syncing with attendance records...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { showToast } from '/components/ui-components.js?v=1.6';

        const dateSelect = document.getElementById('dateSelect');
        const logTable = document.getElementById('logTable');
        const searchInput = document.getElementById('searchInput');
        const statusFilter = document.getElementById('statusFilter');
        
        let allRecords = [];
        dateSelect.valueAsDate = new Date();

        /**
         * DATA FETCHING
         */

        async function fetchLogs() {
            logTable.innerHTML = `
                <div class="p-20 text-center">
                    <div class="flex flex-col items-center gap-3">
                        <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                        <span class="text-gray-400 font-medium">Fetching logs...</span>
                    </div>
                </div>
            `;
            try {
                const res = await fetch(`/api/admin/attendance?role=student&date=${dateSelect.value}`);
                const data = await res.json();
                allRecords = data.records || [];
                filterAndRender();
            } catch (err) {
                logTable.innerHTML = '<div class="p-20 text-center text-red-500 font-bold">Failed to sync with server</div>';
            }
        }

        function filterAndRender() {
            const searchTerm = (searchInput?.value || '').toLowerCase().trim();
            const statusTerm = statusFilter?.value || '';

            const filtered = allRecords.filter(r => {
                const name = (r.student?.name || '').toLowerCase();
                const sId = (r.student?.studentId || '').toLowerCase();
                const matchesSearch = name.includes(searchTerm) || sId.includes(searchTerm);
                const matchesStatus = !statusTerm || r.status === statusTerm;
                return matchesSearch && matchesStatus;
            });

            renderLogs(filtered);
        }

        function renderLogs(records) {
            if (!records.length) {
                logTable.innerHTML = '<div class="p-20 text-center text-gray-400 font-medium italic">No attendance data recorded for this date.</div>';
                return;
            }

            logTable.innerHTML = records.map(r => {
                const checkInTime = r.checkIn ? new Date(r.checkIn).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '---';
                const checkOutTime = r.checkOut ? new Date(r.checkOut).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '---';
                const teacherName = r.recordedBy?.name || 'System';
                const className = r.class?.name || (r.course?.title ? r.course.title : 'Direct Record');
                
                return `
                    <div class="flex justify-between items-center p-6 hover:bg-gray-50/50 transition group border-b border-gray-50 last:border-0">
                        <div class="flex items-center gap-5">
                            <div class="w-14 h-14 rounded-2xl bg-blue-50 text-blue-700 flex items-center justify-center font-black text-xl border border-blue-100 shadow-sm uppercase">
                                ${(r.student?.name || '?')[0]}
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-900 group-hover:text-blue-700 transition-colors">${r.student?.name || 'Unknown Student'}</h4>
                                <div class="flex flex-col gap-0.5 mt-0.5">
                                    <div class="flex items-center gap-2">
                                        <span class="text-[10px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded font-mono font-bold tracking-tight">ID: ${r.student?.studentId || r.student?._id.slice(-6).toUpperCase()}</span>
                                        <span class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">${className}</span>
                                    </div>
                                    <div class="text-[10px] text-gray-400">Marked by: <span class="font-semibold text-gray-500">${teacherName}</span></div>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-10">
                            <div class="text-right hidden md:block">
                                <p class="text-[10px] text-gray-300 uppercase font-black tracking-tighter mb-1">Time Log</p>
                                <div class="flex items-center gap-3 text-xs font-bold text-gray-600">
                                    <span class="flex items-center gap-1.5"><i class="fa-solid fa-right-to-bracket text-green-500 text-[10px]"></i> ${checkInTime}</span>
                                    ${r.checkOut ? `<span class="text-gray-200">|</span> <span class="flex items-center gap-1.5"><i class="fa-solid fa-right-from-bracket text-red-400 text-[10px]"></i> ${checkOutTime}</span>` : ''}
                                </div>
                            </div>
                            <span class="px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest border shadow-sm
                                ${r.status === 'present' ? 'bg-green-50 text-green-700 border-green-200' : 
                                  r.status === 'absent' ? 'bg-red-50 text-red-700 border-red-200' : 
                                  'bg-yellow-50 text-yellow-700 border-yellow-200'}">
                                ${r.status}
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        /**
         * INITIALIZATION
         */

        dateSelect.addEventListener('change', fetchLogs);
        if (searchInput) searchInput.addEventListener('input', filterAndRender);
        if (statusFilter) statusFilter.addEventListener('change', filterAndRender);

        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await res.json();
                
                if (user.role !== 'admin') { window.location.href = '/'; return; }
                if (window.initSocket) window.initSocket(user);
                
                const navbar = customElements.get('ui-navbar');
                if (navbar && typeof navbar.renderLinks === 'function') {
                    navbar.renderLinks(user.role);
                }

                await fetchLogs();
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        init();
    </script>
</body>
</html>
