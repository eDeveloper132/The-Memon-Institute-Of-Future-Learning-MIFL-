<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Communication Center"></ui-navbar>

    <main class="p-0 md:p-8 max-w-6xl mx-auto h-[calc(100vh-64px)] md:h-[calc(100vh-120px)] flex flex-col">
        <div id="headerSection" class="hidden md:flex mb-6 justify-between items-end">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Direct Messages & Groups</h2>
                <p class="text-gray-500 mt-1">Chat with teachers, administration, and students.</p>
            </div>
            <button id="createGroupBtn" class="hidden bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition shadow-sm items-center gap-2">
                <i class="fa-solid fa-users"></i> Create Group
            </button>
        </div>

        <div class="flex-1 bg-white md:rounded-3xl shadow-sm border-t md:border border-gray-100 overflow-hidden flex">
            <!-- Sidebar (Chat List) -->
            <div id="sidebarPanel" class="w-full md:w-80 border-r border-gray-100 flex flex-col bg-white z-10">
                <div class="p-4 md:p-6 border-b border-gray-100 flex justify-between items-center">
                    <h3 class="md:hidden font-black text-xl text-gray-900">Messages</h3>
                    <div class="md:hidden flex gap-2">
                        <button id="mobileCreateGroupBtn" class="hidden w-10 h-10 items-center justify-center rounded-xl bg-blue-50 text-blue-600">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
                <div class="p-4 md:p-6 border-b border-gray-100">
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i>
                        <input type="text" id="searchInput" placeholder="Search chats..." class="w-full pl-10 pr-4 py-2 bg-gray-50 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                
                <div class="flex-1 overflow-y-auto" id="chatSidebar">
                    <p class="p-6 text-center text-gray-400 text-xs italic">Loading conversations...</p>
                </div>
            </div>

            <!-- Chat Window -->
            <div id="chatPanel" class="flex-1 hidden md:flex flex-col bg-gray-50 bg-opacity-50 relative">
                <!-- Empty State -->
                <div id="emptyChatState" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-50 z-20">
                    <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center text-blue-300 text-4xl mb-4">
                        <i class="fa-solid fa-comments"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-700">Select a Conversation</h3>
                    <p class="text-gray-400 text-sm mt-2">Choose a contact or group from the sidebar to start chatting.</p>
                </div>

                <!-- Header -->
                <div class="p-4 md:p-6 bg-white border-b border-gray-100 flex justify-between items-center z-10">
                    <div class="flex items-center gap-3 md:gap-4">
                        <button id="backToListBtn" class="md:hidden w-8 h-8 flex items-center justify-center text-gray-500 hover:text-blue-600 transition">
                            <i class="fa-solid fa-chevron-left text-lg"></i>
                        </button>
                        <div id="activeChatAvatar" class="w-9 h-9 md:w-10 md:h-10 rounded-xl bg-blue-100 text-blue-600 flex items-center justify-center font-bold"></div>
                        <div>
                            <h4 id="activeChatName" class="font-bold text-gray-900 leading-none text-sm md:text-base"></h4>
                            <span id="activeChatRole" class="text-[9px] md:text-[10px] text-gray-500 font-bold uppercase tracking-widest"></span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button id="editGroupBtn" class="hidden w-9 h-9 md:w-10 md:h-10 items-center justify-center rounded-xl bg-gray-50 text-gray-400 hover:bg-blue-50 hover:text-blue-600 transition active:scale-90">
                            <i class="fa-solid fa-gear"></i>
                        </button>
                    </div>
                </div>

                <!-- Messages area -->
                <div id="messageArea" class="flex-1 p-4 md:p-8 overflow-y-auto space-y-4 md:space-y-6">
                    <!-- Messages injected here -->
                </div>

                <!-- Input -->
                <div class="p-4 md:p-6 bg-white border-t border-gray-100">
                    <form id="messageForm" class="flex gap-3 md:gap-4 items-center">
                        <label class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-xl bg-gray-50 text-gray-500 hover:bg-gray-100 cursor-pointer transition active:scale-95">
                            <i class="fa-solid fa-paperclip"></i>
                            <input type="file" id="fileInput" class="hidden">
                        </label>
                        <input type="text" id="messageInput" placeholder="Type your message..." class="flex-1 px-4 md:px-6 py-2 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" disabled>
                        <button type="submit" id="sendBtn" class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-blue-600 text-white hover:bg-blue-700 transition shadow-lg active:scale-95 disabled:opacity-50" disabled>
                            <i class="fa-solid fa-paper-plane text-sm md:text-base"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Create Group Modal -->
    <div id="groupModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 bg-blue-600 text-white flex justify-between items-center">
                <h3 class="text-xl font-bold">Create New Group</h3>
                <button id="closeGroupModal" class="text-2xl leading-none">&times;</button>
            </div>
            <form id="groupForm" class="p-6 space-y-4 overflow-y-auto flex-1">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1 font-black uppercase tracking-tight text-[10px]">Group Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1 font-black uppercase tracking-tight text-[10px]">Description</label>
                    <input type="text" name="description" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1 font-black uppercase tracking-tight text-[10px]">Select Members</label>
                    <div id="memberSelection" class="border rounded-lg p-2 max-h-48 overflow-y-auto bg-gray-50 space-y-1">
                        <p class="text-xs text-gray-400 text-center py-2">Loading contacts...</p>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold hover:bg-blue-700 transition mt-4 shadow-md active:scale-95">Create Group</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initSocket, showToast } from '/components/ui-components.js?v=1.6';

        let currentUser = null;
        let activeChat = null; // { type: 'user' | 'group', id, name, role }
        let socket = null;
        let allContacts = [];
        let allGroups = [];
        let unreadCounts = { dmUnread: {}, groupUnread: {} };

        // DOM Elements
        const chatSidebar = document.getElementById('chatSidebar');
        const messageArea = document.getElementById('messageArea');
        const messageForm = document.getElementById('messageForm');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const emptyChatState = document.getElementById('emptyChatState');
        const searchInput = document.getElementById('searchInput');

        // Modal Elements
        const createGroupBtn = document.getElementById('createGroupBtn');
        const mobileCreateGroupBtn = document.getElementById('mobileCreateGroupBtn');
        const groupModal = document.getElementById('groupModal');
        const closeGroupModal = document.getElementById('closeGroupModal');
        const groupForm = document.getElementById('groupForm');
        const memberSelection = document.getElementById('memberSelection');

        // Responsive Panels
        const sidebarPanel = document.getElementById('sidebarPanel');
        const chatPanel = document.getElementById('chatPanel');
        const backToListBtn = document.getElementById('backToListBtn');

        // View Switching Logic
        function toggleMobileView(view) {
            const isMobile = window.innerWidth < 768;
            if (!isMobile) return;

            if (view === 'chat') {
                sidebarPanel.classList.add('hidden');
                chatPanel.classList.remove('hidden');
                chatPanel.classList.add('flex');
            } else {
                sidebarPanel.classList.remove('hidden');
                chatPanel.classList.add('hidden');
                chatPanel.classList.remove('flex');
                activeChat = null;
                renderSidebar(searchInput.value);
            }
        }

        backToListBtn.addEventListener('click', () => toggleMobileView('list'));

        // Modals Logic
        const handleCreateGroupClick = () => {
            renderMemberSelection();
            groupModal.classList.remove('hidden');
        };
        createGroupBtn.addEventListener('click', handleCreateGroupClick);
        mobileCreateGroupBtn.addEventListener('click', handleCreateGroupClick);
        closeGroupModal.addEventListener('click', () => {
            groupModal.classList.add('hidden');
            // Reset modal title if it was edited
            groupModal.querySelector('h3').textContent = 'Create New Group';
            groupModal.querySelector('button[type="submit"]').textContent = 'Create Group';
            groupForm.reset();
            const idField = groupForm.querySelector('input[name="groupId"]');
            if (idField) idField.remove();
        });

        function renderMemberSelection() {
            if (!allContacts.length) {
                memberSelection.innerHTML = '<p class="text-xs text-gray-400 text-center py-2">No contacts available.</p>';
                return;
            }
            memberSelection.innerHTML = allContacts.map(c => `
                <label class="flex items-center gap-3 p-2 hover:bg-white rounded cursor-pointer transition">
                    <input type="checkbox" name="members" value="${c._id}" class="rounded text-blue-600 focus:ring-blue-500">
                    <div class="w-8 h-8 rounded bg-gray-200 text-gray-600 flex items-center justify-center text-xs font-bold uppercase">${c.name[0]}</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold text-gray-900 truncate">${c.name}</p>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest">${c.role}</p>
                    </div>
                </label>
            `).join('');
        }

        const editGroupBtn = document.getElementById('editGroupBtn');
        
        editGroupBtn.addEventListener('click', () => {
            if (!activeChat || activeChat.type !== 'group') return;
            
            const group = allGroups.find(g => String(g._id) === String(activeChat.id));
            if (!group) return;

            // Update Modal for Editing
            groupModal.querySelector('h3').textContent = 'Edit Group Settings';
            groupModal.querySelector('button[type="submit"]').textContent = 'Update Group';
            
            groupForm.name.value = group.name;
            groupForm.description.value = group.description || '';
            
            renderMemberSelection();
            
            // Pre-check members
            const checkboxes = groupForm.querySelectorAll('input[name="members"]');
            checkboxes.forEach(cb => {
                cb.checked = group.members.some(mId => String(mId) === String(cb.value));
            });

            // Add a temporary hidden field for ID
            let idField = groupForm.querySelector('input[name="groupId"]');
            if (!idField) {
                idField = document.createElement('input');
                idField.type = 'hidden';
                idField.name = 'groupId';
                groupForm.appendChild(idField);
            }
            idField.value = group._id;

            groupModal.classList.remove('hidden');
        });

        groupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(groupForm);
            const groupId = formData.get('groupId');
            
            const data = {
                name: formData.get('name'),
                description: formData.get('description'),
                members: formData.getAll('members')
            };

            try {
                const url = groupId ? `/api/chat/groups/${groupId}` : '/api/chat/groups';
                const method = groupId ? 'PATCH' : 'POST';
                
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    showToast(groupId ? 'Group updated' : 'Group created');
                    groupModal.classList.add('hidden');
                    groupForm.reset();
                    // Remove hidden field if it exists
                    const idField = groupForm.querySelector('input[name="groupId"]');
                    if (idField) idField.remove();
                    
                    await fetchSidebarData();
                    if (groupId) {
                         const updatedGroup = allGroups.find(g => g._id === groupId);
                         if (updatedGroup) selectChat('group', updatedGroup._id, updatedGroup.name, 'Group');
                    }
                } else {
                    const err = await res.json();
                    showToast(err.message || 'Action failed', 'error');
                }
            } catch (err) {
                showToast('Server error', 'error');
            }
        });

        // Delete Message logic (Global delegation)
        messageArea.addEventListener('click', async (e) => {
            const deleteBtn = e.target.closest('.delete-msg-btn');
            if (!deleteBtn) return;

            const msgId = deleteBtn.dataset.msgId;
            if (!confirm('Are you sure you want to delete this message?')) return;

            try {
                const res = await fetch(`/api/chat/messages/${msgId}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('Message deleted');
                    // Find and remove the message element
                    const msgElement = deleteBtn.closest('.message-bubble-container');
                    if (msgElement) msgElement.remove();
                } else {
                    const err = await res.json();
                    showToast(err.message || 'Delete failed', 'error');
                }
            } catch (err) {
                showToast('Server error', 'error');
            }
        });

        // Core Data Fetching
        async function fetchSidebarData() {
            try {
                const [contactsRes, groupsRes, unreadRes] = await Promise.all([
                    fetch('/api/chat/contacts'),
                    fetch('/api/chat/groups'),
                    fetch('/api/chat/unread')
                ]);

                if (contactsRes.ok) {
                    const { contacts } = await contactsRes.json();
                    allContacts = contacts;
                }
                
                if (groupsRes.ok) {
                    const { groups } = await groupsRes.json();
                    allGroups = groups;
                    // Join group rooms automatically
                    if (socket) {
                        groups.forEach(g => socket.emit('joinGroup', g._id));
                    }
                }

                if (unreadRes.ok) {
                    unreadCounts = await unreadRes.json();
                }

                renderSidebar();
            } catch (err) {
                chatSidebar.innerHTML = '<p class="p-6 text-center text-red-400 text-xs font-bold">Failed to load chats.</p>';
            }
        }

        function renderSidebar(filter = '') {
            let html = '';
            
            const filteredGroups = allGroups.filter(g => g.name.toLowerCase().includes(filter.toLowerCase()));
            const filteredContacts = allContacts.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()));

            if (filteredGroups.length > 0) {
                html += '<div class="px-6 pt-4 pb-2 text-[10px] font-black uppercase tracking-widest text-gray-400">Groups</div>';
                html += filteredGroups.map(g => {
                    const unread = unreadCounts.groupUnread[g._id] || 0;
                    return `
                    <div data-chat-type="group" data-chat-id="${g._id}" data-chat-name="${g.name}" data-chat-role="Group" class="chat-sidebar-item p-4 mx-2 rounded-xl hover:bg-gray-50 flex gap-4 cursor-pointer transition ${activeChat?.id === g._id ? 'bg-blue-50 text-blue-700' : ''}">
                        <div class="w-10 h-10 rounded-xl bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-lg relative">
                            <i class="fa-solid fa-users"></i>
                            ${unread ? `<div class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center border-2 border-white">${unread}</div>` : ''}
                        </div>
                        <div class="flex-1 min-w-0 flex flex-col justify-center">
                            <h4 class="font-bold truncate text-sm">${g.name}</h4>
                            <p class="text-[10px] text-gray-400 truncate">${g.members.length} members</p>
                        </div>
                    </div>
                `}).join('');
            }

            if (filteredContacts.length > 0) {
                html += '<div class="px-6 pt-4 pb-2 text-[10px] font-black uppercase tracking-widest text-gray-400">Direct Messages</div>';
                html += filteredContacts.map(c => {
                    const unread = unreadCounts.dmUnread[c._id] || 0;
                    return `
                    <div data-chat-type="user" data-chat-id="${c._id}" data-chat-name="${c.name}" data-chat-role="${c.role}" class="chat-sidebar-item p-4 mx-2 rounded-xl hover:bg-gray-50 flex gap-4 cursor-pointer transition ${activeChat?.id === c._id ? 'bg-blue-50 text-blue-700' : ''}">
                        <div class="w-10 h-10 rounded-xl bg-gray-100 text-gray-600 flex items-center justify-center font-bold uppercase text-sm relative">
                            ${c.name[0]}
                            ${unread ? `<div class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center border-2 border-white">${unread}</div>` : ''}
                        </div>
                        <div class="flex-1 min-w-0 flex flex-col justify-center">
                            <h4 class="font-bold truncate text-sm">${c.name}</h4>
                            <p class="text-[10px] text-gray-400 uppercase tracking-widest truncate">${c.role}</p>
                        </div>
                    </div>
                `}).join('');
            }

            if (!html) {
                html = '<p class="p-6 text-center text-gray-400 text-xs italic">No conversations found.</p>';
            }

            chatSidebar.innerHTML = html;
        }

        searchInput.addEventListener('input', (e) => renderSidebar(e.target.value));

        chatSidebar.addEventListener('click', (e) => {
            const item = e.target.closest('.chat-sidebar-item');
            if (item) {
                const type = item.dataset.chatType;
                const id = item.dataset.chatId;
                const name = item.dataset.chatName;
                const role = item.dataset.chatRole;
                selectChat(type, id, name, role);
            }
        });

        const selectChat = async (type, id, name, role) => {
            activeChat = { type, id, name, role };
            
            // Update UI State
            emptyChatState.classList.add('hidden');
            messageInput.disabled = false;
            sendBtn.disabled = false;
            
            document.getElementById('activeChatName').textContent = name;
            document.getElementById('activeChatRole').textContent = role;
            const avatar = document.getElementById('activeChatAvatar');
            avatar.innerHTML = type === 'user' ? name[0].toUpperCase() : '<i class="fa-solid fa-users"></i>';

            // Show/Hide Edit Group button
            if (type === 'group') {
                const group = allGroups.find(g => g._id === id);
                if (group && (group.creator === currentUser._id || currentUser.role === 'admin')) {
                    editGroupBtn.classList.remove('hidden');
                    editGroupBtn.classList.add('flex');
                } else {
                    editGroupBtn.classList.add('hidden');
                }
            } else {
                editGroupBtn.classList.add('hidden');
            }

            // Clear unread count locally and re-render sidebar
            if (type === 'group') {
                unreadCounts.groupUnread[id] = 0;
            } else {
                unreadCounts.dmUnread[id] = 0;
            }
            renderSidebar(searchInput.value);
            
            await fetchMessages(type, id);
        };

        async function fetchMessages(type, id) {
            console.log(`[Chat] Fetching history for ${type}: ${id}`);
            try {
                const query = type === 'group' ? `groupId=${id}` : `partnerId=${id}`;
                const res = await fetch(`/api/chat/messages?${query}`);
                if (res.ok) {
                    const { messages } = await res.json();
                    console.log(`[Chat] Received ${messages.length} messages`);
                    renderMessages(messages);
                    
                    // Mark as read
                    const unreadMessageIds = messages
                        .filter(m => {
                            const currentUserId = String(currentUser._id || currentUser.id);
                            const mSenderId = String(m.sender._id || m.sender);
                            if (mSenderId === currentUserId) return false;
                            if (type === 'group') {
                                return !m.readBy?.includes(currentUserId);
                            }
                            return !m.isRead;
                        })
                        .map(m => m._id);

                    if (unreadMessageIds.length > 0 && socket) {
                        socket.emit('messagesRead', {
                            messageIds: unreadMessageIds,
                            groupId: type === 'group' ? id : undefined,
                            userId: currentUser._id || currentUser.id
                        });
                    }
                }
            } catch (err) {
                messageArea.innerHTML = '<p class="text-center text-red-400 text-sm">Failed to load history.</p>';
            }
        }

        function renderMessages(messages) {
            messageArea.innerHTML = messages.map(m => {
                const currentUserId = String(currentUser._id || currentUser.id);
                const mSenderId = String(m.sender._id || m.sender);
                const isSent = mSenderId === currentUserId;
                const senderName = isSent ? 'You' : (m.sender.name || 'Unknown');
                
                // Determine read status for UI
                let readStatusHtml = '';
                if (isSent) {
                    const isRead = m.group ? (m.readBy && m.readBy.length > 0) : m.isRead;
                    readStatusHtml = `<i class="fa-solid fa-check-double ml-1 ${isRead ? 'text-blue-300' : 'text-blue-500 opacity-50'}" data-msg-id="${m._id}"></i>`;
                }
                
                return `
                    <div class="flex gap-4 max-w-[80%] message-bubble-container ${isSent ? 'ml-auto flex-row-reverse' : ''}">
                        ${!isSent ? `<div class="w-8 h-8 rounded-lg bg-gray-200 text-gray-600 flex-shrink-0 flex items-center justify-center font-bold text-xs mt-auto uppercase" title="${senderName}">${senderName[0]}</div>` : ''}
                        
                        <div class="flex flex-col group ${isSent ? 'items-end' : 'items-start'}">
                            ${activeChat.type === 'group' && !isSent ? `<span class="text-[10px] text-gray-400 font-bold ml-1 mb-1">${senderName}</span>` : ''}
                            <div class="bg-${isSent ? 'blue-600 text-white' : 'white text-gray-700'} p-4 rounded-2xl ${isSent ? 'rounded-br-none shadow-lg' : 'rounded-bl-none shadow-sm border border-gray-100'} text-sm break-words relative">
                                ${m.content}
                                ${m.attachments && m.attachments.length > 0 ? renderAttachments(m.attachments, isSent) : ''}
                                <p class="text-[9px] ${isSent ? 'text-blue-200' : 'text-gray-400'} mt-2 font-bold uppercase flex items-center justify-${isSent ? 'end' : 'start'}">
                                    ${new Date(m.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                                    ${readStatusHtml}
                                </p>
                            </div>
                        </div>
                        ${!isSent && currentUser.role === 'admin' ? `<button class="delete-msg-btn opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition self-center" data-msg-id="${m._id}"><i class="fa-solid fa-trash-can text-xs"></i></button>` : ''}
                    </div>
                `;
            }).join('');
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        function renderAttachments(attachments, isSent) {
            return `<div class="mt-2 space-y-2">` + attachments.map(url => {
                const isImg = /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(url);
                if (isImg) {
                    return `<a href="${url}" target="_blank"><img src="${url}" class="max-w-full rounded-lg border border-gray-100 shadow-sm hover:opacity-90 transition"></a>`;
                }
                
                const btnClasses = isSent 
                    ? 'bg-blue-700 text-white hover:bg-blue-800' 
                    : 'bg-gray-100 text-blue-600 hover:bg-blue-50';

                return `<a href="${url}" target="_blank" class="flex items-center gap-2 p-3 rounded-xl transition border border-black/5 text-xs font-bold ${btnClasses}">
                    <i class="fa-solid fa-file-arrow-down text-base"></i>
                    <span>Download Attachment</span>
                </a>`;
            }).join('') + `</div>`;
        }

        // Typing Indicators logic
        let typingTimeout;
        const typingIndicator = document.createElement('div');
        typingIndicator.id = 'typingIndicator';
        typingIndicator.className = 'text-xs text-gray-400 italic mb-2 hidden px-2 transition-all duration-300 opacity-0';
        typingIndicator.innerHTML = '<i class="fa-solid fa-pen mr-1"></i> <span id="typingText">Someone is typing...</span>';
        messageArea.parentElement.insertBefore(typingIndicator, messageArea.nextElementSibling);

        messageInput.addEventListener('input', () => {
            if (!activeChat || !socket) return;
            
            // Emit typing
            socket.emit('typing', {
                userId: currentUser._id || currentUser.id,
                userName: currentUser.name.split(' ')[0],
                groupId: activeChat.type === 'group' ? activeChat.id : undefined,
                receiverId: activeChat.type === 'user' ? activeChat.id : undefined
            });

            // Clear previous timeout and set new one for stopTyping
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('stopTyping', {
                    userId: currentUser._id || currentUser.id,
                    groupId: activeChat.type === 'group' ? activeChat.id : undefined,
                    receiverId: activeChat.type === 'user' ? activeChat.id : undefined
                });
            }, 2000);
        });

        const fileInput = document.getElementById('fileInput');
        
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                showToast('Uploading file...');
                const res = await fetch('/api/chat/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (res.ok) {
                    const { url } = await res.json();
                    
                    // Send message immediately with the attachment
                    const payload = {
                        sender: currentUser._id || currentUser.id,
                        content: `Shared a file: ${file.name}`,
                        attachments: [url]
                    };

                    if (activeChat.type === 'group') {
                        payload.groupId = activeChat.id;
                    } else {
                        payload.receiver = activeChat.id;
                    }

                    console.log(`[Chat] Sending message via socket. connected: ${socket.connected}`, payload);
            socket.emit('sendMessage', payload);
                    showToast('File sent');
                } else {
                    const err = await res.json();
                    showToast(err.message || 'Upload failed', 'error');
                }
            } catch (err) {
                showToast('Upload error', 'error');
            }
            
            // Reset input
            fileInput.value = '';
        });

        messageForm.onsubmit = (e) => {
            e.preventDefault();
            const content = messageInput.value.trim();
            if (!content || !activeChat) return;

            const payload = {
                sender: currentUser._id || currentUser.id,
                content
            };

            if (activeChat.type === 'group') {
                payload.groupId = activeChat.id;
            } else {
                payload.receiver = activeChat.id;
            }

            console.log(`[Chat] Sending message via socket. connected: ${socket.connected}`, payload);
            socket.emit('sendMessage', payload);
            
            // Stop typing immediately when sending
            socket.emit('stopTyping', {
                userId: currentUser._id || currentUser.id,
                groupId: activeChat.type === 'group' ? activeChat.id : undefined,
                receiverId: activeChat.type === 'user' ? activeChat.id : undefined
            });
            clearTimeout(typingTimeout);

            messageInput.value = '';
        };

        function setupSocketListeners(s) {
            // Helper to handle a new message regardless of source (Socket or Polling)
            const handleIncomingMessage = (msg) => {
                const mSenderId = String(msg.sender._id || msg.sender);
                const mGroupId = msg.group ? String(msg.group._id || msg.group) : null;
                const mReceiverId = msg.receiver ? String(msg.receiver._id || msg.receiver) : null;
                const currentUserId = String(currentUser._id || currentUser.id);

                const isRelevantGroup = activeChat?.type === 'group' && mGroupId === String(activeChat.id);
                const isRelevantDM = activeChat?.type === 'user' && !mGroupId && (mSenderId === String(activeChat.id) || mReceiverId === String(activeChat.id));
                const isSelf = mSenderId === currentUserId;
                
                if (isRelevantGroup || isRelevantDM) {
                    appendMessage(msg);
                    // Hide typing indicator if a message comes in from them
                    typingIndicator.classList.add('hidden', 'opacity-0');
                } else if (!isSelf) {
                    showToast(`New message from ${msg.sender.name || 'someone'}`, 'info');
                    // Refresh unread counts
                    fetchSidebarData();
                }
            };

            // Listen to Socket.IO (for local/persistent environments)
            s.on('receiveMessage', handleIncomingMessage);

            // Listen to Polling Fallback (for Vercel environment)
            document.addEventListener('newMessage', (e) => {
                handleIncomingMessage(e.detail);
            });

            s.on('messageSent', (msg) => {
                const isRelevantDM = activeChat?.type === 'user' && !msg.group && String(msg.receiver) === String(activeChat.id);
                if (isRelevantDM) {
                    appendMessage(msg);
                }
            });

            // Typing listeners (Socket.IO only)
            s.on('userTyping', (data) => {
                const currentUserId = String(currentUser._id || currentUser.id);
                if (String(data.userId) === currentUserId) return; // Ignore own typing broadcast

                const isRelevantGroup = activeChat?.type === 'group' && String(data.groupId) === String(activeChat.id);
                const isRelevantDM = activeChat?.type === 'user' && !data.groupId && String(data.userId) === String(activeChat.id);

                if (isRelevantGroup || isRelevantDM) {
                    document.getElementById('typingText').textContent = `${data.userName || 'Someone'} is typing...`;
                    typingIndicator.classList.remove('hidden');
                    // slight delay for transition
                    setTimeout(() => typingIndicator.classList.remove('opacity-0'), 10);
                }
            });

            s.on('userStoppedTyping', (data) => {
                const isRelevantGroup = activeChat?.type === 'group' && String(data.groupId) === String(activeChat.id);
                const isRelevantDM = activeChat?.type === 'user' && !data.groupId;

                if (isRelevantGroup || isRelevantDM) {
                    typingIndicator.classList.add('opacity-0');
                    setTimeout(() => typingIndicator.classList.add('hidden'), 300);
                }
            });

            // Read Receipt listener
            s.on('readReceipt', (data) => {
                const { messageIds, groupId } = data;
                // Only update if it's the active chat
                const isRelevantGroup = activeChat?.type === 'group' && String(groupId) === String(activeChat.id);
                const isRelevantDM = activeChat?.type === 'user' && !groupId;

                if (isRelevantGroup || isRelevantDM) {
                    messageIds.forEach(id => {
                        const icon = document.querySelector(`i[data-msg-id="${id}"]`);
                        if (icon) {
                            icon.classList.remove('text-blue-500', 'opacity-50');
                            icon.classList.add('text-blue-300'); // Indicate 'read'
                        }
                    });
                }
            });
        }

        function appendMessage(m) {
            const currentUserId = String(currentUser._id || currentUser.id);
            const mSenderId = String(m.sender._id || m.sender);
            const isSent = mSenderId === currentUserId;
            const senderName = isSent ? 'You' : (m.sender.name || 'Unknown');
            
            // Render attachments
            const attachmentsHtml = m.attachments && m.attachments.length > 0 ? renderAttachments(m.attachments) : '';

            const div = document.createElement('div');
            div.className = `flex gap-4 max-w-[80%] message-bubble-container ${isSent ? 'ml-auto flex-row-reverse' : ''}`;
            
            // Delete button for admins
            const deleteBtnHtml = !isSent && currentUser.role === 'admin' ? `
                <button class="delete-msg-btn opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition self-center" data-msg-id="${m._id}">
                    <i class="fa-solid fa-trash-can text-xs"></i>
                </button>
            ` : '';

            div.innerHTML = `
                ${!isSent ? `<div class="w-8 h-8 rounded-lg bg-gray-200 text-gray-600 flex-shrink-0 flex items-center justify-center font-bold text-xs mt-auto uppercase" title="${senderName}">${senderName[0]}</div>` : ''}
                
                <div class="flex flex-col group ${isSent ? 'items-end' : 'items-start'}">
                    ${activeChat.type === 'group' && !isSent ? `<span class="text-[10px] text-gray-400 font-bold ml-1 mb-1">${senderName}</span>` : ''}
                    <div class="bg-${isSent ? 'blue-600 text-white' : 'white text-gray-700'} p-4 rounded-2xl ${isSent ? 'rounded-br-none shadow-lg' : 'rounded-bl-none shadow-sm border border-gray-100'} text-sm break-words relative">
                        ${m.content}
                        ${attachmentsHtml}
                        <p class="text-[9px] ${isSent ? 'text-blue-200' : 'text-gray-400'} mt-2 font-bold uppercase ${isSent ? 'text-right' : ''}">${new Date(m.createdAt || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</p>
                    </div>
                </div>
                ${deleteBtnHtml}
            `;
            messageArea.appendChild(div);
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        async function init() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                
                socket = await initSocket(user);
                setupSocketListeners(socket);
                
                currentUser = user;
                
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) navbar.renderLinks(user.role);

                if (user.role === 'admin' || user.role === 'teacher') {
                    createGroupBtn.classList.remove('hidden');
                    createGroupBtn.classList.add('flex');
                    mobileCreateGroupBtn.classList.remove('hidden');
                    mobileCreateGroupBtn.classList.add('flex');
                }

                await fetchSidebarData();
                
                // Initialize Mobile View
                toggleMobileView('list');
            } catch (err) {
                console.error('[Chat] Init error:', err);
                window.location.href = '/api/auth/login';
            }
        }
        init();
    </script>
</body>
</html>
