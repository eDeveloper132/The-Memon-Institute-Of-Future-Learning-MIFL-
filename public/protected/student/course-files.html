<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Materials - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="My Course Files & Materials"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Course Materials</h2>
            <p class="text-gray-500 mt-2">Access outlines, lecture notes, and files posted by your teachers.</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-6 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h3 class="font-bold text-gray-800">Mathematics 101 - Prof. Smith</h3>
                <span class="text-sm text-gray-500">4 Files Available</span>
            </div>
            <div class="divide-y divide-gray-100">
                <!-- File Entry -->
                <div class="p-4 flex justify-between items-center hover:bg-gray-50 transition">
                    <div class="flex items-center">
                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center mr-4">
                            <i class="fa-solid fa-file-pdf text-xl"></i>
                        </div>
                        <div>
                            <p class="font-bold text-gray-900">Course Outline - Spring 2026.pdf</p>
                            <p class="text-xs text-gray-500">Uploaded: May 12 | 1.2 MB</p>
                        </div>
                    </div>
                    <button class="text-blue-600 hover:text-blue-800 p-2">
                        <i class="fa-solid fa-download text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (user.role !== 'student' && user.role !== 'admin') { window.location.href = '/'; return; }
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) { navbar.renderLinks(user.role); }
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });
        fetchProfile();
    </script>
</body>
</html>
