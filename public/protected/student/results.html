<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Results - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="My Academic Results"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Academic Results</h2>
            <p class="text-gray-500 mt-2">View your performance across all enrolled courses.</p>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20">
                <ui-spinner text="Loading your results..."></ui-spinner>
            </div>
        </div>
    </main>

    <script type="module">
        const resultsGrid = document.getElementById('resultsGrid');

        async function fetchResults() {
            try {
                const response = await fetch('/api/student/results');
                if (response.ok) {
                    const { results } = await response.json();
                    renderResults(results);
                }
            } catch (err) {
                resultsGrid.innerHTML = '<div class="col-span-full text-center text-red-500">Failed to load results</div>';
            }
        }

        function renderResults(results) {
            if (!results.length) {
                resultsGrid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500">No results published yet.</div>';
                return;
            }

            resultsGrid.innerHTML = results.map(r => {
                const percentage = (r.obtainedMarks / r.exam.maxMarks) * 100;
                const status = percentage >= 40 ? 'Passed' : 'Failed';
                const statusColor = percentage >= 40 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700';

                return `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-2 py-1 ${statusColor} rounded text-xs font-bold uppercase">${status}</span>
                            <span class="text-sm font-bold text-gray-900">Score: ${r.obtainedMarks}/${r.exam.maxMarks}</span>
                        </div>
                        <h3 class="text-xl font-bold text-gray-900 mb-1">${r.exam.course.title}</h3>
                        <p class="text-gray-500 text-sm mb-4">${r.exam.title}</p>
                        <div class="w-full bg-gray-200 rounded-full h-2 mb-4">
                            <div class="bg-blue-600 h-2 rounded-full" style="width: ${percentage}%"></div>
                        </div>
                        <div class="flex justify-between text-sm font-bold">
                            <span class="text-gray-600">${percentage.toFixed(1)}%</span>
                            <button class="text-blue-600 hover:text-blue-800">View Feedback</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function fetchProfile() {
            try {
                const response = await fetch('/api/student/profile');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (window.initSocket) window.initSocket(user);

                customElements.whenDefined('ui-navbar').then(() => {
                    const navbar = document.querySelector('ui-navbar');
                    if (navbar && navbar.renderLinks) {
                        navbar.renderLinks(user);
                    }
                });

                fetchResults();
                
                fetchResults();
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });
        fetchProfile();
    </script>
</body>
</html>
