<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Results - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="My Academic Results"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Academic Results</h2>
            <p class="text-gray-500 mt-2">Detailed breakdown of your performance across all assessments.</p>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <ui-spinner text="Loading your results..."></ui-spinner>
        </div>
    </main>

    <script type="module">
        import { showToast } from '/components/ui-components.js?v=1.6';

        // Helper: Grading Logic (Aligned with services/grading.service.ts)
        function calculateLetterGrade(score, total = 100) {
            const percentage = (score / total) * 100;
            if (percentage >= 90) return 'A';
            if (percentage >= 80) return 'B';
            if (percentage >= 70) return 'C';
            if (percentage >= 60) return 'D';
            return 'F';
        }

        function getGradeStyle(grade) {
            switch (grade) {
                case 'A': return 'bg-green-100 text-green-700';
                case 'B': return 'bg-blue-100 text-blue-700';
                case 'C': return 'bg-yellow-100 text-yellow-700';
                case 'D': return 'bg-orange-100 text-orange-700';
                case 'F': return 'bg-red-100 text-red-700';
                default: return 'bg-gray-100 text-gray-700';
            }
        }

        async function fetchResults() {
            try {
                const res = await fetch('/api/student/results');
                if (!res.ok) throw new Error();
                const { results } = await res.json();
                renderResults(results);
            } catch (err) {
                document.getElementById('resultsGrid').innerHTML = '<p class="col-span-full text-center text-red-500 py-10 font-bold">Failed to load academic results.</p>';
            }
        }

        function renderResults(results) {
            const grid = document.getElementById('resultsGrid');
            if (!results.length) {
                grid.innerHTML = '<p class="col-span-full text-center py-20 text-gray-400 italic">No results have been published yet.</p>';
                return;
            }

            grid.innerHTML = results.map(r => {
                const score = r.obtainedMarks;
                const total = r.exam?.maxMarks || 100;
                const percentage = ((score / total) * 100).toFixed(1);
                const grade = calculateLetterGrade(score, total);
                const gradeStyle = getGradeStyle(grade);

                return `
                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex flex-col h-full hover:border-blue-200 transition group">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <span class="px-2.5 py-1 rounded-lg text-xs font-black uppercase tracking-widest ${gradeStyle}">
                                    Grade ${grade}
                                </span>
                            </div>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-tighter">${new Date(r.exam?.date || Date.now()).toLocaleDateString()}</p>
                        </div>

                        <div class="mb-6">
                            <h3 class="text-xl font-bold text-gray-900 group-hover:text-blue-600 transition mb-1">${r.exam?.course?.title || 'Course'}</h3>
                            <p class="text-sm text-gray-500 font-medium">${r.exam?.title || 'Examination'}</p>
                        </div>

                        <div class="mt-auto">
                            <div class="flex justify-between items-end mb-2">
                                <p class="text-3xl font-black text-gray-900">${score}<span class="text-sm text-gray-400 font-bold ml-1">/ ${total}</span></p>
                                <p class="text-sm font-bold text-blue-600">${percentage}%</p>
                            </div>
                            <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                                <div class="bg-blue-600 h-full rounded-full transition-all duration-1000" style="width: ${percentage}%"></div>
                            </div>
                            
                            ${r.comments ? `
                                <div class="mt-6 p-4 bg-gray-50 rounded-xl border border-dashed border-gray-200">
                                    <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-1">Teacher Feedback</p>
                                    <p class="text-sm text-gray-600 italic">"${r.comments}"</p>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function fetchProfile() {
            try {
                const response = await fetch('/api/student/profile');
                const { user } = await response.json();
                if (window.initSocket) window.initSocket(user);
                customElements.whenDefined('ui-navbar').then(() => {
                    document.querySelector('ui-navbar').renderLinks(user);
                });
            } catch (err) {}
        }

        fetchProfile();
        fetchResults();
    </script>
</body>
</html>
