<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Quizzes - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.3" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="My Academic Quizzes"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Quizzes</h2>
            <p class="text-gray-500 mt-2">Take upcoming quizzes and view your past performance.</p>
        </div>

        <div id="quizGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-gray-500">
                <ui-spinner text="Fetching active quizzes..."></ui-spinner>
            </div>
        </div>
    </main>

    <script type="module">
        const quizGrid = document.getElementById('quizGrid');

        async function fetchQuizzes() {
            try {
                const res = await fetch('/api/student/quizzes');
                if (res.ok) {
                    const { quizzes, attempts } = await res.json();
                    renderQuizzes(quizzes, attempts);
                }
            } catch (err) {
                quizGrid.innerHTML = '<p class="text-center text-red-500 py-10 font-bold">Failed to load quizzes.</p>';
            }
        }

        function renderQuizzes(quizzes, attempts) {
            if (!quizzes.length) {
                quizGrid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500 font-bold italic">No active quizzes at the moment.</div>';
                return;
            }

            quizGrid.innerHTML = quizzes.map(q => {
                const attempt = attempts.find(a => a.quiz === q._id);
                const isAttempted = !!attempt;

                return `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col h-full">
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-2 py-1 ${isAttempted ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'} rounded text-[10px] font-bold uppercase">
                                ${isAttempted ? 'Completed' : 'Upcoming'}
                            </span>
                            <span class="text-[10px] text-gray-400 font-bold">Time: ${q.duration} mins</span>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900 mb-1 truncate">${q.title}</h3>
                        <p class="text-gray-500 text-xs mb-4">Course: ${q.course?.title || 'General'}</p>
                        <div class="flex-1">
                            <p class="text-sm text-gray-600 mb-2 font-medium">Starts: ${new Date(q.startTime).toLocaleString()}</p>
                            ${isAttempted ? `<p class="text-sm font-bold text-blue-600 mt-2">Score: ${attempt.score}/${q.questions.length}</p>` : ''}
                        </div>
                        <div class="flex border-t border-gray-50 pt-4 mt-4">
                            <button class="w-full ${isAttempted ? 'bg-gray-100 text-gray-500' : 'bg-blue-600 text-white hover:bg-blue-700'} py-2 rounded-lg font-bold transition text-xs uppercase tracking-wider" ${isAttempted ? 'disabled' : ''}>
                                ${isAttempted ? 'Results Locked' : 'Enter Quiz'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (window.initSocket) window.initSocket(user);
                document.getElementById('userName').textContent = user.name;
                const navbar = customElements.get('ui-navbar');
                if (navbar && navbar.renderLinks) { navbar.renderLinks(user.role); }
                fetchQuizzes();
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });
        fetchProfile();
    </script>
</body>
</html>
