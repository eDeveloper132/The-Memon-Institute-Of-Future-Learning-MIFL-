<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice Board - MIFL Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Academic Announcements"></ui-navbar>

    <main class="p-8 max-w-5xl mx-auto">
        <div class="mb-10 flex items-center justify-between flex-wrap gap-4">
            <div>
                <h2 class="text-4xl font-black text-gray-900 tracking-tight">Academic Notice Board</h2>
                <p class="text-gray-500 mt-1 font-medium">Stay updated with the latest school and class announcements.</p>
            </div>
            <div class="flex items-center gap-3">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="noticeSearch" placeholder="Search notices..." class="pl-12 pr-6 py-3 bg-white border border-gray-100 rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition w-64">
                </div>
                <select id="typeFilter" class="px-6 py-3 bg-white border border-gray-100 rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition font-bold text-gray-700">
                    <option value="all">All Categories</option>
                    <option value="academic">Academic</option>
                    <option value="exam">Exams</option>
                    <option value="holiday">Holidays</option>
                    <option value="event">Events</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
        </div>

        <div id="noticesList" class="space-y-6">
            <!-- Loading State -->
            <div class="text-center py-20">
                <ui-spinner text="Fetching academic updates..."></ui-spinner>
            </div>
        </div>
    </main>

    <script type="module">
        import { showToast } from '/components/ui-components.js?v=1.6';

        const noticesList = document.getElementById('noticesList');
        const noticeSearch = document.getElementById('noticeSearch');
        const typeFilter = document.getElementById('typeFilter');
        
        let allNotices = [];

        const typeIcons = {
            academic: { icon: 'fa-book', color: 'blue' },
            exam: { icon: 'fa-file-pen', color: 'red' },
            holiday: { icon: 'fa-calendar-day', color: 'green' },
            event: { icon: 'fa-star', color: 'purple' },
            admin: { icon: 'fa-bullhorn', color: 'indigo' }
        };

        async function fetchNotices() {
            try {
                const response = await fetch('/api/student/notices');
                if (response.ok) {
                    const { notices } = await response.json();
                    allNotices = notices;
                    renderNotices(allNotices);
                } else if (response.status === 403) {
                    noticesList.innerHTML = '<div class="bg-red-50 p-10 rounded-3xl text-center text-red-600 font-bold border border-red-100 shadow-sm">Access Denied: You do not have permission to view these notices.</div>';
                }
            } catch (err) {
                console.error('Fetch error:', err);
            }
        }

        function renderNotices(notices) {
            if (!notices.length) {
                noticesList.innerHTML = '<div class="bg-white p-20 rounded-[3rem] text-center shadow-xl shadow-blue-500/5 border border-gray-100">' +
                    '<div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-6 text-gray-300">' +
                    '<i class="fa-solid fa-inbox text-4xl"></i></div>' +
                    '<h3 class="text-xl font-bold text-gray-900 mb-2">No notices found</h3>' +
                    '<p class="text-gray-400">Try adjusting your filters or check back later.</p></div>';
                return;
            }

            noticesList.innerHTML = notices.map(n => {
                const config = typeIcons[n.type] || typeIcons.admin;
                const date = new Date(n.createdAt).toLocaleDateString('en-PK', { 
                    day: 'numeric', month: 'long', year: 'numeric' 
                });

                return `
                    <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 p-8 hover:shadow-xl hover:shadow-blue-500/5 transition duration-300 group relative overflow-hidden">
                        ${n.isPinned ? `
                            <div class="absolute top-0 right-0">
                                <div class="bg-orange-500 text-white text-[10px] font-black uppercase tracking-widest px-6 py-1 rotate-45 translate-x-4 translate-y-3 shadow-sm">Pinned</div>
                            </div>
                        ` : ''}
                        
                        <div class="flex items-start gap-6">
                            <div class="w-14 h-14 rounded-2xl bg-${config.color}-50 text-${config.color}-600 flex items-center justify-center text-xl shrink-0 group-hover:scale-110 transition duration-300">
                                <i class="fa-solid ${config.icon}"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-[10px] font-black uppercase tracking-[0.2em] text-${config.color}-600 bg-${config.color}-50 px-3 py-1 rounded-full">${n.type || 'Announcement'}</span>
                                    <span class="text-xs text-gray-400 font-bold">${date}</span>
                                </div>
                                <h3 class="text-2xl font-black text-gray-900 mb-3 group-hover:text-blue-600 transition truncate">${n.title}</h3>
                                <p class="text-gray-600 leading-relaxed mb-6 whitespace-pre-wrap">${n.content}</p>
                                
                                ${n.attachments && n.attachments.length > 0 ? `
                                    <div class="mb-6 p-4 bg-gray-50 rounded-2xl border border-dashed border-gray-200">
                                        <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3">Attachments</h4>
                                        <div class="flex flex-wrap gap-3">
                                            ${n.attachments.map(url => `
                                                <a href="${url}" target="_blank" class="flex items-center gap-2 px-4 py-2 bg-white border border-gray-100 rounded-xl text-xs font-bold text-gray-700 hover:text-blue-600 hover:border-blue-200 transition shadow-sm">
                                                    <i class="fa-solid fa-paperclip opacity-50"></i>
                                                    <span>${url.split('/').pop()}</span>
                                                </a>
                                            `).join('')}
                                        </div>
                                    </div>
                                ` : ''}

                                <div class="flex items-center gap-3 border-t border-gray-50 pt-6">
                                    <div class="w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center text-xs font-black border border-blue-100">
                                        ${n.author?.name ? n.author.name.charAt(0) : 'A'}
                                    </div>
                                    <div>
                                        <p class="text-xs font-black text-gray-900">${n.author?.name || 'Academic Administration'}</p>
                                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">Official Notice</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterAndSearch() {
            const searchTerm = noticeSearch.value.toLowerCase();
            const filterType = typeFilter.value;

            const filtered = allNotices.filter(n => {
                const matchesSearch = n.title.toLowerCase().includes(searchTerm) || 
                                     n.content.toLowerCase().includes(searchTerm);
                const matchesType = filterType === 'all' || n.type === filterType;
                return matchesSearch && matchesType;
            });

            renderNotices(filtered);
        }

        noticeSearch.oninput = filterAndSearch;
        typeFilter.onchange = filterAndSearch;

        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (window.initSocket) window.initSocket(user);
                
                customElements.whenDefined('ui-navbar').then(() => {
                    const navbar = document.querySelector('ui-navbar');
                    if (navbar && navbar.renderLinks) {
                        navbar.renderLinks(user);
                    }
                });
                
                fetchNotices();
            } catch (err) {}
        }
        fetchProfile();
    </script>
</body>
</html>
