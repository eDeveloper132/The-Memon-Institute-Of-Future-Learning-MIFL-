<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Vouchers - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="My Fee Vouchers"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Fee Vouchers</h2>
            <p class="text-gray-500 mt-2">Generate and view your academic fee vouchers.</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-900">Your Academic Vouchers</h3>
                <button class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 transition">Request New Voucher</button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-3 text-sm font-bold text-gray-700 uppercase">Voucher ID</th>
                            <th class="px-6 py-3 text-sm font-bold text-gray-700 uppercase">Description</th>
                            <th class="px-6 py-3 text-sm font-bold text-gray-700 uppercase">Amount</th>
                            <th class="px-6 py-3 text-sm font-bold text-gray-700 uppercase">Status</th>
                            <th class="px-6 py-3 text-sm font-bold text-gray-700 uppercase text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="voucherTableBody" class="divide-y">
                        <tr>
                            <td colspan="5" class="px-6 py-10 text-center text-gray-500">
                                <ui-spinner text="Fetching vouchers..."></ui-spinner>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        const tableBody = document.getElementById('voucherTableBody');

        async function fetchVouchers() {
            try {
                const response = await fetch('/api/student/fees');
                if (response.ok) {
                    const { vouchers } = await response.json();
                    renderVouchers(vouchers);
                }
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-red-500">Failed to load vouchers</td></tr>';
            }
        }

        function renderVouchers(vouchers) {
            if (!vouchers.length) {
                tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-gray-500">No vouchers found.</td></tr>';
                return;
            }

            tableBody.innerHTML = vouchers.map(v => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4 font-mono text-sm uppercase">${v._id.slice(-8)}</td>
                    <td class="px-6 py-4">${v.type || 'Semester Fee'}</td>
                    <td class="px-6 py-4 font-bold text-gray-900">$${v.amount.toLocaleString()}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded text-xs font-bold uppercase 
                            ${v.status === 'paid' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${v.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button class="text-blue-600 hover:text-blue-800 font-bold"><i class="fa-solid fa-download mr-1"></i> PDF</button>
                    </td>
                </tr>
            `).join('');
        }

        async function fetchProfile() {
            try {
                const response = await fetch('/api/student/profile');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (window.initSocket) window.initSocket(user);

                customElements.whenDefined('ui-navbar').then(() => {
                    const navbar = document.querySelector('ui-navbar');
                    if (navbar && navbar.renderLinks) {
                        navbar.renderLinks(user);
                    }
                });

                fetchVouchers();
                
                fetchVouchers();
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });
        fetchProfile();
    </script>
</body>
</html>
