<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Vouchers - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Fee Vouchers"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Fee Vouchers</h2>
            <p class="text-gray-500 mt-2">Manage your tuition payments and download formal receipts.</p>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-8 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 class="text-xl font-bold text-gray-900">Payment History</h3>
                <button class="bg-white text-blue-600 border border-blue-100 px-6 py-3 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-blue-50 transition active:scale-95 shadow-sm">
                    Request Support
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-400 text-[10px] uppercase font-black tracking-widest">
                        <tr>
                            <th class="px-8 py-4">Voucher ID</th>
                            <th class="px-8 py-4">Description</th>
                            <th class="px-8 py-4">Due Date</th>
                            <th class="px-8 py-4">Amount</th>
                            <th class="px-8 py-4">Status</th>
                            <th class="px-8 py-4 text-right">Receipt</th>
                        </tr>
                    </thead>
                    <tbody id="voucherTableBody" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="6" class="px-8 py-20 text-center">
                                <ui-spinner text="Loading financial records..."></ui-spinner>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div id="noVouchers" class="hidden p-20 text-center text-gray-400 italic">
                    <i class="fa-solid fa-receipt text-5xl mb-4 text-gray-100"></i>
                    <p class="font-bold">No fee vouchers found.</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { showToast } from '/components/ui-components.js?v=1.6';

        const tableBody = document.getElementById('voucherTableBody');
        const noVouchers = document.getElementById('noVouchers');

        async function fetchVouchers() {
            try {
                const response = await fetch('/api/student/fees');
                if (response.ok) {
                    const { vouchers } = await response.json();
                    renderVouchers(vouchers);
                }
            } catch (err) {
                tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-20 text-red-500 font-bold">Failed to load vouchers.</td></tr>';
            }
        }

        function renderVouchers(vouchers) {
            if (!vouchers.length) {
                tableBody.innerHTML = '';
                noVouchers.classList.remove('hidden');
                return;
            }

            noVouchers.classList.add('hidden');
            tableBody.innerHTML = vouchers.map(v => `
                <tr class="hover:bg-gray-50 transition group">
                    <td class="px-8 py-6">
                        <span class="font-mono text-xs text-gray-400 font-bold uppercase">#${v._id.slice(-8)}</span>
                    </td>
                    <td class="px-8 py-6">
                        <p class="font-bold text-gray-900">${v.type || 'Semester Tuition'}</p>
                    </td>
                    <td class="px-8 py-6">
                        <p class="text-sm text-gray-500 font-medium">${new Date(v.dueDate).toLocaleDateString()}</p>
                    </td>
                    <td class="px-8 py-6">
                        <p class="text-lg font-black text-gray-900">PKR ${v.amount.toLocaleString()}</p>
                    </td>
                    <td class="px-8 py-6">
                        <span class="px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest 
                            ${v.status === 'paid' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${v.status}
                        </span>
                    </td>
                    <td class="px-8 py-6 text-right">
                        <button class="w-10 h-10 inline-flex items-center justify-center rounded-xl bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition active:scale-95 shadow-sm shadow-blue-100">
                            <i class="fa-solid fa-file-invoice-dollar text-lg"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function fetchProfile() {
            try {
                const response = await fetch('/api/student/profile');
                const { user } = await response.json();
                if (window.initSocket) window.initSocket(user);
                customElements.whenDefined('ui-navbar').then(() => {
                    document.querySelector('ui-navbar').renderLinks(user);
                });
            } catch (err) {}
        }

        fetchProfile();
        fetchVouchers();
    </script>
</body>
</html>
