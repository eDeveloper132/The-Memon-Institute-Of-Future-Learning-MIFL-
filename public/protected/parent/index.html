<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Children - MIFL Parent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Parent Portal"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-10">
            <h2 class="text-4xl font-bold text-gray-900">My Children</h2>
            <p class="text-gray-500 mt-2">Quick overview of your children enrolled in the institution.</p>
        </div>

        <div id="childrenGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Loading State -->
            <div class="col-span-full text-center py-20">
                <ui-spinner text="Fetching children profiles..."></ui-spinner>
            </div>
        </div>

        <!-- System Alerts -->
        <section class="mt-12 bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-900 flex items-center gap-3">
                    <i class="fa-solid fa-bell text-blue-600"></i> Recent Alerts
                </h3>
                <button id="markAllReadDash" class="text-xs text-blue-600 font-bold hover:underline">Clear All</button>
            </div>
            <div id="notificationsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <p class="col-span-full text-center text-gray-400 py-10 italic">Checking for updates...</p>
            </div>
        </section>
    </main>

    <script type="module">
        import { showToast } from '/components/ui-components.js';

        const childrenGrid = document.getElementById('childrenGrid');

        async function fetchChildren() {
            try {
                const response = await fetch('/api/parent/children');
                if (response.ok) {
                    const { children } = await response.json();
                    renderChildren(children);
                }
            } catch (err) {
                childrenGrid.innerHTML = '<div class="col-span-full text-center text-red-500">Failed to load children profiles.</div>';
            }
        }

        async function fetchNotifications() {
            const list = document.getElementById('notificationsList');
            try {
                const response = await fetch('/api/notifications?status=unread');
                if (response.ok) {
                    const { notifications } = await response.json();
                    if (notifications.length === 0) {
                        list.innerHTML = '<p class="col-span-full text-center text-gray-400 py-10 italic">No new alerts for your account.</p>';
                        return;
                    }

                    const typeIcons = { SYSTEM: 'fa-info-circle', FEE: 'fa-credit-card', ACADEMIC: 'fa-book' };

                    list.innerHTML = notifications.map(n => `
                        <div class="p-4 rounded-2xl bg-gray-50 border border-gray-100 hover:bg-white hover:shadow-lg transition-all group relative">
                            <div class="flex items-center gap-3 mb-2">
                                <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-sm">
                                    <i class="fa-solid ${typeIcons[n.type] || 'fa-bell'}"></i>
                                </div>
                                <h4 class="font-bold text-gray-800 text-sm truncate">${n.title}</h4>
                            </div>
                            <p class="text-xs text-gray-500 line-clamp-2">${n.content}</p>
                            <button data-id="${n._id}" class="mark-read-btn absolute top-4 right-4 text-gray-300 hover:text-blue-600 opacity-0 group-hover:opacity-100 transition">
                                <i class="fa-solid fa-check-double"></i>
                            </button>
                        </div>
                    `).join('');

                    list.querySelectorAll('.mark-read-btn').forEach(btn => {
                        btn.onclick = async () => {
                            const res = await fetch(`/api/notifications/${btn.dataset.id}/read`, { method: 'PATCH' });
                            if (res.ok) fetchNotifications();
                        };
                    });
                }
            } catch (err) { console.error(err); }
        }

        function renderChildren(children) {
            if (!children.length) {
                childrenGrid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500 font-bold">No children linked to your account. Please contact administration.</div>';
                return;
            }

            childrenGrid.innerHTML = children.map(child => {
                const initials = child.name.split(' ').map(n => n[0]).join('');
                return `
                    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl transition-all duration-300">
                        <div class="bg-blue-600 p-6 flex items-center gap-4">
                            <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center text-blue-600 text-2xl font-bold uppercase">
                                ${initials}
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-white">${child.name}</h3>
                                <p class="text-blue-100 text-sm">ID: ${child.studentId || child._id.slice(-6).toUpperCase()}</p>
                            </div>
                        </div>
                        <div class="p-6 space-y-4">
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-500 font-medium">Current Class</span>
                                <span class="text-gray-900 font-bold">${child.currentClass?.name || 'Not Assigned'}</span>
                            </div>
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-500 font-medium">Class Teacher</span>
                                <span class="text-blue-600 font-bold">${child.parentName || 'N/A'}</span>
                            </div>
                            <div class="flex justify-between items-center text-sm border-t pt-4">
                                <span class="text-gray-500 font-medium">Status</span>
                                <span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-[10px] font-bold uppercase tracking-wider">${child.status}</span>
                            </div>
                            <div class="pt-4 flex gap-2">
                                <a href="/protected/parent/results.html?childId=${child._id}" class="flex-1 text-center bg-gray-50 text-gray-700 py-2 rounded-xl font-bold text-xs hover:bg-gray-100 transition">Academic History</a>
                                <a href="/protected/parent/attendance.html?childId=${child._id}" class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center hover:bg-blue-100 transition">
                                    <i class="fa-solid fa-calendar-check"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function fetchProfile() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (window.initSocket) window.initSocket(user);
                if (user.role !== 'parent' && user.role !== 'admin') { window.location.href = '/'; return; }
                
                customElements.whenDefined('ui-navbar').then(() => {
                    const navbar = document.querySelector('ui-navbar');
                    if (navbar && navbar.renderLinks) {
                        navbar.renderLinks(user);
                    }
                });
                
                fetchChildren();
                fetchNotifications();
                document.addEventListener('newNotification', () => fetchNotifications());
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }

        document.getElementById('markAllReadDash').onclick = async () => {
            try {
                const res = await fetch('/api/notifications/read-all', { method: 'PATCH' });
                if (res.ok) fetchNotifications();
            } catch (err) { console.error(err); }
        };

        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });
        fetchProfile();
    </script>
</body>
</html>
