<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management - MIFL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="/components/ui-components.js?v=1.6" type="module" defer></script>
</head>
<body class="bg-gray-100 min-h-screen">
    
    <ui-navbar title="Inventory Management"></ui-navbar>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-3xl font-bold text-gray-900">Resource Inventory</h2>
                <p class="text-gray-500 mt-2">Track and manage laboratory equipment, books, and stationaries.</p>
            </div>
            <button class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700 transition flex items-center shadow-lg active:scale-95">
                <i class="fa-solid fa-plus mr-2"></i> Add Item
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-12 text-center border border-gray-100">
            <div class="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center text-blue-300 text-5xl mx-auto mb-6 shadow-inner">
                <i class="fa-solid fa-boxes-stacked"></i>
            </div>
            <h3 class="text-2xl font-light text-gray-700">Inventory Module Initializing</h3>
            <p class="text-gray-500 text-sm mt-3 max-w-md mx-auto leading-relaxed">
                We are currently cataloging the system resources. This module will allow you to request items, track stock levels, and manage distributions.
            </p>
            <div class="mt-8 pt-8 border-t border-gray-50 flex items-center justify-center gap-2 text-gray-400 text-xs font-medium">
                <i class="fa-solid fa-info-circle text-[10px]"></i>
                <span>Module coming soon in v1.1</span>
            </div>
        </div>
    </main>

    <script type="module">
        async function init() {
            try {
                const response = await fetch('/api/auth/me');
                if (!response.ok) { window.location.href = '/api/auth/login'; return; }
                const { user } = await response.json();
                if (window.initSocket) window.initSocket(user);
                
                customElements.whenDefined('ui-navbar').then(() => {
                    const navbar = document.querySelector('ui-navbar');
                    if (navbar && navbar.renderLinks) {
                        navbar.renderLinks(user);
                    }
                });
            } catch (err) {
                window.location.href = '/api/auth/login';
            }
        }
        document.addEventListener('click', async (e) => {
            if (e.target.closest('#logoutBtn')) {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/api/auth/login';
            }
        });
        init();
    </script>
</body>
</html>
